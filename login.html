<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Login • CashClique</title>

<!-- Favicon -->
<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome for Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

:root {
    --primary: #ff7a00;
    --primary-dark: #e96c00;
    --primary-light: #fff5eb;
    --text-dark: #1a1a2e;
    --text-light: #666;
    --text-lighter: #999;
    --white: #fff;
    --error: #e74c3c;
    --success: #27ae60;
    --border: #e0e0e0;
    --shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    --shadow-hover: 0 15px 50px rgba(0, 0, 0, 0.15);
}

html, body {
    height: 100%;
    overflow-x: hidden;
}

body {
    background: linear-gradient(135deg, #fff5eb 0%, #ffe6d5 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    position: relative;
}

/* Background Decorations */
body::before {
    content: '';
    position: fixed;
    top: -50%;
    right: -50%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,122,0,0.05) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
}

body::after {
    content: '';
    position: fixed;
    bottom: -50%;
    left: -50%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,122,0,0.05) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
}

/* Main Container */
.container {
    width: 100%;
    max-width: 420px;
    background: var(--white);
    border-radius: 20px;
    padding: 40px 35px;
    box-shadow: var(--shadow);
    text-align: center;
    position: relative;
    z-index: 1;
    transition: box-shadow 0.3s ease;
}

.container:hover {
    box-shadow: var(--shadow-hover);
}

/* Logo */
.logo-container {
    margin-bottom: 20px;
}

.logo {
    width: 70px;
    height: 70px;
    border-radius: 18px;
    object-fit: cover;
    box-shadow: 0 5px 20px rgba(255, 122, 0, 0.2);
    transition: transform 0.3s ease;
}

.logo:hover {
    transform: scale(1.05);
}

/* Header */
.header {
    margin-bottom: 25px;
}

h2 {
    color: var(--primary);
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 5px;
}

.tag {
    font-size: 14px;
    color: var(--text-light);
    font-weight: 400;
}

/* Messages */
.message-container {
    min-height: 40px;
    margin-bottom: 10px;
}

.message {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.3s ease;
}

.message.show {
    opacity: 1;
    transform: translateY(0);
}

.message.error {
    background: rgba(231, 76, 60, 0.1);
    color: var(--error);
    border: 1px solid rgba(231, 76, 60, 0.2);
}

.message.success {
    background: rgba(39, 174, 96, 0.1);
    color: var(--success);
    border: 1px solid rgba(39, 174, 96, 0.2);
}

/* Form */
.form {
    margin-bottom: 20px;
}

/* Input Groups */
.input-group {
    position: relative;
    margin-bottom: 16px;
}

.input-group label {
    display: block;
    text-align: left;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dark);
    margin-bottom: 6px;
}

.input-wrapper {
    position: relative;
}

.input-wrapper input {
    width: 100%;
    padding: 14px 45px;
    border-radius: 12px;
    border: 2px solid var(--border);
    font-size: 16px;
    color: var(--text-dark);
    outline: none;
    transition: all 0.3s ease;
    background: var(--white);
    -webkit-appearance: none;
}

.input-wrapper input::placeholder {
    color: var(--text-lighter);
}

.input-wrapper input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(255, 122, 0, 0.1);
}

.input-wrapper input.error {
    border-color: var(--error);
    box-shadow: 0 0 0 4px rgba(231, 76, 60, 0.1);
}

.input-icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-lighter);
    font-size: 16px;
    transition: color 0.3s ease;
}

.input-wrapper input:focus ~ .input-icon {
    color: var(--primary);
}

.toggle-password {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-lighter);
    font-size: 16px;
    padding: 8px;
    transition: color 0.3s ease;
    -webkit-tap-highlight-color: transparent;
}

.toggle-password:hover,
.toggle-password:active {
    color: var(--primary);
}

/* Options Row */
.options-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 14px;
}

.remember-me {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--text-light);
    -webkit-tap-highlight-color: transparent;
}

.remember-me input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--primary);
    cursor: pointer;
}

.remember-me span {
    font-size: 13px;
}

.forgot-password a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.3s ease;
    font-size: 13px;
}

.forgot-password a:hover,
.forgot-password a:active {
    color: var(--primary-dark);
    text-decoration: underline;
}

/* Login Button */
.login-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    border: none;
    padding: 15px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

.login-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s ease;
}

.login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(255, 122, 0, 0.3);
}

.login-btn:hover::before {
    left: 100%;
}

.login-btn:active {
    transform: translateY(0);
}

.login-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
}

.spinner {
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-top: 3px solid white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Divider */
.divider {
    display: flex;
    align-items: center;
    margin: 20px 0;
    color: var(--text-lighter);
    font-size: 12px;
}

.divider::before,
.divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
}

.divider span {
    padding: 0 12px;
}

/* Social Login */
.social-login {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
}

.social-btn {
    flex: 1;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: var(--white);
    cursor: pointer;
    font-size: 18px;
    color: var(--text-dark);
    transition: all 0.3s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

.social-btn:hover,
.social-btn:active {
    border-color: var(--primary);
    color: var(--primary);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
}

.social-btn.google:hover,
.social-btn.google:active {
    border-color: #ea4335;
    color: #ea4335;
}

.social-btn.apple:hover,
.social-btn.apple:active {
    border-color: #000;
    color: #000;
}

/* Register Link */
.register-link {
    font-size: 13px;
    color: var(--text-light);
}

.register-link a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
}

.register-link a:hover,
.register-link a:active {
    color: var(--primary-dark);
    text-decoration: underline;
}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 480px) {
    html, body {
        height: auto;
        min-height: 100%;
    }
    
    body {
        padding: 15px;
        align-items: flex-start;
        padding-top: 30px;
        padding-bottom: 30px;
    }
    
    .container {
        padding: 25px 20px;
        border-radius: 16px;
    }
    
    .logo {
        width: 60px;
        height: 60px;
    }
    
    .logo-container {
        margin-bottom: 15px;
    }
    
    .header {
        margin-bottom: 20px;
    }
    
    h2 {
        font-size: 22px;
    }
    
    .tag {
        font-size: 13px;
    }
    
    .message-container {
        min-height: 36px;
    }
    
    .input-group {
        margin-bottom: 14px;
    }
    
    .input-wrapper input {
        padding: 12px 40px;
    }
    
    .options-row {
        margin-bottom: 18px;
    }
    
    .remember-me span,
    .forgot-password a {
        font-size: 12px;
    }
    
    .login-btn {
        padding: 14px;
        font-size: 15px;
    }
    
    .divider {
        margin: 16px 0;
    }
    
    .social-login {
        margin-bottom: 16px;
    }
    
    .register-link {
        font-size: 12px;
    }
}

@media (max-width: 360px) {
    body {
        padding: 12px;
        padding-top: 20px;
        padding-bottom: 20px;
    }
    
    .container {
        padding: 22px 18px;
    }
    
    .logo {
        width: 55px;
        height: 55px;
    }
    
    h2 {
        font-size: 20px;
    }
}

/* Shake Animation */
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
    20%, 40%, 60%, 80% { transform: translateX(5px); }
}

.shake {
    animation: shake 0.5s ease;
}
</style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img class="logo" src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg" alt="CashClique Logo">
    </div>

    <div class="header">
        <h2>Welcome Back</h2>
        <p class="tag">Sign in to continue to CashClique</p>
    </div>

    <div class="message-container">
        <div class="message" id="message" role="alert"></div>
    </div>

    <form class="form" id="loginForm" onsubmit="return false;">
        <div class="input-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
                <input 
                    type="email" 
                    id="email" 
                    placeholder="Enter your email"
                    autocomplete="email"
                    aria-label="Email address"
                >
                <i class="fas fa-envelope input-icon"></i>
            </div>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    aria-label="Password"
                >
                <i class="fas fa-lock input-icon"></i>
                <button type="button" class="toggle-password" onclick="togglePassword()" aria-label="Toggle password visibility">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <div class="options-row">
            <label class="remember-me">
                <input type="checkbox" id="rememberMe">
                <span>Remember me</span>
            </label>
            <div class="forgot-password">
                <a href="forgot-password.html">Forgot password?</a>
            </div>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
            <span id="btnText">Sign In</span>
            <div class="spinner" id="spinner"></div>
        </button>
    </form>

    <div class="divider">
        <span>or continue with</span>
    </div>

    <div class="social-login">
        <button type="button" class="social-btn google" onclick="signInWithGoogle()" aria-label="Sign in with Google">
            <i class="fab fa-google"></i>
        </button>
        <button type="button" class="social-btn apple" onclick="signInWithApple()" aria-label="Sign in with Apple">
            <i class="fab fa-apple"></i>
        </button>
    </div>

    <div class="register-link">
        Don't have an account? <a href="register.html">Create one</a>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
    getAuth, 
    signInWithEmailAndPassword,
    GoogleAuthProvider,
    signInWithPopup,
    OAuthProvider
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// Firebase Configuration
const firebaseConfig = {
    apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
    authDomain: "cashclique-31718.firebaseapp.com",
    projectId: "cashclique-31718",
    storageBucket: "cashclique-31718.firebasestorage.app",
    messagingSenderId: "1064282591269",
    appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc",
    measurementId: "G-V5WHJB6LS0"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// DOM Elements
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const loginBtn = document.getElementById("loginBtn");
const spinner = document.getElementById("spinner");
const btnText = document.getElementById("btnText");
const message = document.getElementById("message");
const rememberMe = document.getElementById("rememberMe");

// Check for remembered email
const rememberedEmail = localStorage.getItem("rememberedEmail");
if (rememberedEmail) {
    emailInput.value = rememberedEmail;
    rememberMe.checked = true;
}

// Show Message Function
function showMessage(text, type) {
    message.textContent = text;
    message.className = `message ${type} show`;
    
    if (type === 'success') {
        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1500);
    }
    
    setTimeout(() => {
        message.classList.remove("show");
    }, 5000);
}

// Hide Message Function
function hideMessage() {
    message.classList.remove("show");
}

// Email Validation
function isValidEmail(email) {
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return emailRegex.test(email);
}

// Set Loading State
function setLoading(isLoading) {
    if (isLoading) {
        spinner.style.display = "inline-block";
        btnText.textContent = "Signing in...";
        loginBtn.disabled = true;
    } else {
        spinner.style.display = "none";
        btnText.textContent = "Sign In";
        loginBtn.disabled = false;
    }
}

// Google Sign In
window.signInWithGoogle = async () => {
    const provider = new GoogleAuthProvider();
    setLoading(true);
    hideMessage();
    
    try {
        const result = await signInWithPopup(auth, provider);
        showMessage(`Welcome back, ${result.user.displayName}!`, "success");
    } catch (error) {
        setLoading(false);
        if (error.code !== 'auth/popup-closed-by-user') {
            showMessage(getErrorMessage(error.code), "error");
        }
    }
};

// Apple Sign In
window.signInWithApple = async () => {
    const provider = new OAuthProvider('apple.com');
    provider.addScope('email');
    provider.addScope('name');
    setLoading(true);
    hideMessage();
    
    try {
        const result = await signInWithPopup(auth, provider);
        showMessage(`Welcome back, ${result.user.displayName || 'User'}!`, "success");
    } catch (error) {
        setLoading(false);
        if (error.code !== 'auth/popup-closed-by-user') {
            showMessage(getErrorMessage(error.code), "error");
        }
    }
};

// Get User-Friendly Error Message
function getErrorMessage(errorCode) {
    const errorMessages = {
        'auth/user-not-found': 'No account found with this email address.',
        'auth/wrong-password': 'Incorrect password. Please try again.',
        'auth/invalid-email': 'Please enter a valid email address.',
        'auth/too-many-requests': 'Too many failed attempts. Please try again later.',
        'auth/invalid-credential': 'Invalid email or password. Please check your credentials.',
        'auth/network-request-failed': 'Network error. Please check your connection.',
        'auth/user-disabled': 'This account has been disabled.',
        'auth/operation-not-allowed': 'Email/password sign-in is not enabled.'
    };
    return errorMessages[errorCode] || 'Login failed. Please try again.';
}

// Login Handler
loginBtn.addEventListener("click", async (e) => {
    e.preventDefault();
    
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    
    if (!email || !password) {
        showMessage("Please enter both email and password.", "error");
        emailInput.classList.add("error");
        passwordInput.classList.add("error");
        document.querySelector(".container").classList.add("shake");
        setTimeout(() => document.querySelector(".container").classList.remove("shake"), 500);
        return;
    }
    
    if (!isValidEmail(email)) {
        showMessage("Please enter a valid email address.", "error");
        emailInput.classList.add("error");
        return;
    }
    
    emailInput.classList.remove("error");
    passwordInput.classList.remove("error");
    hideMessage();
    
    if (rememberMe.checked) {
        localStorage.setItem("rememberedEmail", email);
    } else {
        localStorage.removeItem("rememberedEmail");
    }
    
    setLoading(true);
    
    try {
        await signInWithEmailAndPassword(auth, email, password);
        showMessage(`Welcome back! Signing you in...`, "success");
    } catch (error) {
        setLoading(false);
        showMessage(getErrorMessage(error.code), "error");
        document.querySelector(".container").classList.add("shake");
        setTimeout(() => document.querySelector(".container").classList.remove("shake"), 500);
    }
});

emailInput.addEventListener("input", () => emailInput.classList.remove("error"));
passwordInput.addEventListener("input", () => passwordInput.classList.remove("error"));

document.addEventListener("keypress", (e) => {
    if (e.key === "Enter" && !loginBtn.disabled) loginBtn.click();
});

window.togglePassword = function() {
    const eyeIcon = document.getElementById("eyeIcon");
    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        eyeIcon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        passwordInput.type = "password";
        eyeIcon.classList.replace("fa-eye-slash", "fa-eye");
    }
};
</script>

</body>
</html>
