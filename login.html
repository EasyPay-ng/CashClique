<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login • CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

:root {
    --primary: #ff7a00;
    --primary-dark: #e96c00;
    --text-dark: #1a1a2e;
    --text-light: #666;
    --text-lighter: #999;
    --white: #fff;
    --error: #e74c3c;
    --success: #27ae60;
    --border: #e0e0e0;
}

body {
    background: #fff5eb;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 15px;
}

.container {
    width: 100%;
    max-width: 340px;
    background: var(--white);
    border-radius: 14px;
    padding: 25px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.logo {
    width: 55px;
    height: 55px;
    border-radius: 12px;
    display: block;
    margin: 0 auto 10px;
}

h2 {
    color: var(--primary);
    font-size: 20px;
    font-weight: 700;
    text-align: center;
}

.tag {
    font-size: 12px;
    color: var(--text-light);
    text-align: center;
    margin-bottom: 15px;
}

.message {
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 12px;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-bottom: 12px;
}

.message.show { display: flex; }

.message.error {
    background: rgba(231, 76, 60, 0.1);
    color: var(--error);
}

.message.success {
    background: rgba(39, 174, 96, 0.1);
    color: var(--success);
}

.input-group { margin-bottom: 12px; }

.input-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dark);
    margin-bottom: 4px;
}

.input-wrapper { position: relative; }

.input-wrapper input {
    width: 100%;
    padding: 10px 35px 10px 35px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    font-size: 13px;
    color: var(--text-dark);
    outline: none;
    transition: all 0.2s;
}

.input-wrapper input::placeholder { color: var(--text-lighter); }

.input-wrapper input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(255, 122, 0, 0.1);
}

.input-wrapper input.error { border-color: var(--error); }

.input-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-lighter);
    font-size: 12px;
}

.input-wrapper input:focus ~ .input-icon { color: var(--primary); }

.toggle-password {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-lighter);
    font-size: 12px;
    padding: 4px;
}

.toggle-password:hover { color: var(--primary); }

.options-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-size: 11px;
}

.remember-me {
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--text-light);
    cursor: pointer;
}

.remember-me input { accent-color: var(--primary); }

.forgot-password a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
    font-size: 11px;
}

.forgot-password a:hover { text-decoration: underline; }

.login-btn {
    width: 100%;
    background: var(--primary);
    color: white;
    border: none;
    padding: 11px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
}

.login-btn:hover { background: var(--primary-dark); }

.login-btn:disabled { opacity: 0.7; cursor: not-allowed; }

.spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top: 2px solid white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
}

@keyframes spin { to { transform: rotate(360deg); } }

.divider {
    display: flex;
    align-items: center;
    margin: 12px 0;
    color: var(--text-lighter);
    font-size: 10px;
}

.divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
}

.divider span { padding: 0 8px; }

.social-login {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
}

.social-btn {
    flex: 1;
    padding: 8px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--white);
    cursor: pointer;
    font-size: 14px;
    color: var(--text-dark);
    transition: all 0.2s;
}

.social-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
}

.register-link {
    text-align: center;
    font-size: 11px;
    color: var(--text-light);
}

.register-link a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
}

.register-link a:hover { text-decoration: underline; }

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-4px); }
    40%, 80% { transform: translateX(4px); }
}

.shake { animation: shake 0.4s ease; }
</style>
</head>

<body>

<div class="container">
    <img class="logo" src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg" alt="CashClique">

    <h2>Welcome Back</h2>
    <p class="tag">Sign in to continue</p>

    <div class="message" id="message"></div>

    <form id="loginForm">
        <div class="input-group">
            <label for="email">Email</label>
            <div class="input-wrapper">
                <input type="email" id="email" placeholder="Enter email" autocomplete="email">
                <i class="fas fa-envelope input-icon"></i>
            </div>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
                <i class="fas fa-lock input-icon"></i>
                <button type="button" class="toggle-password" onclick="togglePassword()">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <div class="options-row">
            <label class="remember-me">
                <input type="checkbox" id="rememberMe">
                <span>Remember</span>
            </label>
            <div class="forgot-password">
                <a href="forgot-password.html">Forgot?</a>
            </div>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
            <span id="btnText">Sign In</span>
            <div class="spinner" id="spinner"></div>
        </button>
    </form>

    <div class="divider"><span>or with</span></div>

    <div class="social-login">
        <button type="button" class="social-btn" onclick="signInWithGoogle()">
            <i class="fab fa-google"></i>
        </button>
        <button type="button" class="social-btn" onclick="signInWithApple()">
            <i class="fab fa-apple"></i>
        </button>
    </div>

    <div class="register-link">
        No account? <a href="register.html">Register</a>
    </div>
</div>

    measurementId: "G-V5WHJB6LS0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const loginBtn = document.getElementById("loginBtn");
const spinner = document.getElementById("spinner");
const btnText = document.getElementById("btnText");
const message = document.getElementById("message");
const rememberMe = document.getElementById("rememberMe");

const rememberedEmail = localStorage.getItem("rememberedEmail");
if (rememberedEmail) { emailInput.value = rememberedEmail; rememberMe.checked = true; }

function showMessage(text, type) {
    message.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${text}`;
    message.className = `message ${type} show`;
    if (type === 'success') setTimeout(() => window.location.href = "dashboard.html", 1500);
    setTimeout(() => message.classList.remove("show"), 5000);
}

function setLoading(isLoading) {
    spinner.style.display = isLoading ? "inline-block" : "none";
    btnText.textContent = isLoading ? "Signing in..." : "Sign In";
    loginBtn.disabled = isLoading;
}

function getErrorMessage(code) {
    const errors = {
        'auth/user-not-found': 'No account found.',
        'auth/wrong-password': 'Incorrect password.',
        'auth/invalid-email': 'Invalid email.',
        'auth/too-many-requests': 'Too many attempts.',
        'auth/invalid-credential': 'Invalid credentials.',
        'auth/network-request-failed': 'Network error.',
        'auth/user-disabled': 'Account disabled.'
    };
    return errors[code] || 'Login failed.';
}

window.signInWithGoogle = async () => {
    setLoading(true);
    try { await signInWithPopup(auth, new GoogleAuthProvider()); showMessage("Welcome back!", "success"); }
    catch (e) { setLoading(false); if (e.code !== 'auth/popup-closed-by-user') showMessage(getErrorMessage(e.code), "error"); }
};

window.signInWithApple = async () => {
    setLoading(true);
    try { await signInWithPopup(auth, new OAuthProvider('apple.com')); showMessage("Welcome back!", "success"); }
    catch (e) { setLoading(false); if (e.code !== 'auth/popup-closed-by-user') showMessage(getErrorMessage(e.code), "error"); }
};
