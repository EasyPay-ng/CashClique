<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;min-height:100vh;color:#333;}

.login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#ff6a00,#e65100);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:white;padding:40px;border-radius:16px;width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center;}
.login-title{font-size:26px;font-weight:700;color:#333;margin-bottom:10px;}
.error-msg{color:#d32f2f;margin:15px 0;font-size:14px;min-height:20px;}
.login-input{width:100%;padding:14px;margin:10px 0;border:2px solid #ddd;border-radius:10px;font-size:16px;}
.login-btn{width:100%;background:#ff6a00;color:white;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-top:10px;}
.login-btn:hover{background:#e55d00;}

.sidebar{width:260px;background:#2d2d2d;color:white;padding:25px;position:fixed;height:100%;z-index:100;}
.main{margin-left:260px;padding:30px;}

.header h1{font-size:28px;font-weight:700;}
.stat-card{background:white;padding:20px;border-radius:12px;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;}
th, td{padding:15px;text-align:left;border-bottom:1px solid #eee;}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:600;}
.btn-primary{background:#ff6a00;color:white;}
.btn-success{background:#4caf50;color:white;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:2000;}
.modal-content{background:white;padding:25px;border-radius:12px;width:400px;}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div class="login-overlay" id="login-screen">
    <div class="login-box">
        <h2 class="login-title">Admin Login</h2>
        <p style="color:#666;margin-bottom:20px;">Only authorized admins can enter</p>
        
        <div class="error-msg" id="error-msg"></div>
        
        <input type="email" class="login-input" id="email" placeholder="Email" autocomplete="email">
        <input type="password" class="login-input" id="password" placeholder="Password">
        
        <button class="login-btn" onclick="attemptLogin()">LOGIN</button>
        
        <p style="margin-top:20px;font-size:12px;color:#888;">
            Allowed emails:<br>
            <strong>beniwealth70@gmail.com</strong><br>
            <strong>cashclique@gmail.com</strong>
        </p>
    </div>
</div>

<!-- ADMIN DASHBOARD (hidden until login) -->
<div id="dashboard" style="display:none;">
    <div class="sidebar">
        <h2>CashClique Admin</h2>
        <a href="#" onclick="switchTab(0)" class="active">Users & Balance</a>
        <a href="#" onclick="switchTab(1)">Withdrawals</a>
        <a href="#" onclick="switchTab(2)">Assign Earnings</a>
        <a href="#" onclick="logout()" style="margin-top:auto;color:#ff6a00;">Logout</a>
    </div>

    <div class="main">
        <div class="header"><h1 id="title">User Management</h1></div>
        
        <div id="content">
            <!-- Tables will be loaded by JS -->
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, doc, onSnapshot, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
    authDomain: "cashclique-31718.firebaseapp.com",
    projectId: "cashclique-31718",
    storageBucket: "cashclique-31718.firebasestorage.app",
    messagingSenderId: "1064282591269",
    appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ALLOWED_EMAILS = ["beniwealth70@gmail.com", "cashclique@gmail.com"];

// Login Function
window.attemptLogin = async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorBox = document.getElementById("error-msg");

    errorBox.style.display = "none";

    if (!ALLOWED_EMAILS.includes(email)) {
        errorBox.innerHTML = "❌ This email is not authorized as admin";
        errorBox.style.display = "block";
        return;
    }

    try {
        console.log("Attempting login with:", email);
        await signInWithEmailAndPassword(auth, email, password);
        console.log("✅ Login successful");
    } catch (err) {
        console.error("Login error:", err);
        errorBox.innerHTML = "❌ " + err.message;
        errorBox.style.display = "block";
    }
};

// Show dashboard after successful login
onAuthStateChanged(auth, (user) => {
    if (user && ALLOWED_EMAILS.includes(user.email)) {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        loadAdminData();
    }
});

function loadAdminData() {
    // Load users
    onSnapshot(collection(db, "users"), (snap) => {
        let html = `<h3>Users (${snap.size})</h3><table><tr><th>Name</th><th>Balance</th><th>Action</th></tr>`;
        snap.forEach(d => {
            const u = d.data();
            html += `<tr>
                <td>${u.username || 'No name'}</td>
                <td>$${(u.balance||0).toFixed(2)}</td>
                <td><button class="btn btn-primary" onclick="editBalance('${d.id}')">Edit</button></td>
            </tr>`;
        });
        html += `</table>`;
        document.getElementById("content").innerHTML = html;
    });
}

window.editBalance = (uid) => {
    const amount = prompt("Enter amount to add (use negative to subtract):");
    if (amount === null) return;
    
    updateDoc(doc(db, "users", uid), {
        balance: increment(parseFloat(amount)),
        updatedAt: serverTimestamp()
    }).then(() => alert("Balance updated!"))
      .catch(err => alert("Error: " + err.message));
};

window.logout = () => {
    signOut(auth).then(() => location.reload());
};

window.switchTab = (n) => {
    alert("Tab " + (n+1) + " clicked - functionality coming in next update");
};
</script>
</body>
</html>
