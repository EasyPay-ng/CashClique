<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#fff7f0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
padding:20px;
}

/* CARD */

.container{
background:white;
padding:40px;
width:100%;
max-width:420px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
text-align:center;
}

.logo{
width:70px;
border-radius:12px;
margin-bottom:10px;
}

h2{
color:#ff6a00;
margin-bottom:10px;
}

p{
font-size:14px;
color:#666;
margin-bottom:25px;
}

/* INPUT */

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:15px;
font-size:14px;
outline:none;
}

input:focus{
border-color:#ff6a00;
}

/* BUTTON */

button{
width:100%;
padding:12px;
border:none;
background:#ff6a00;
color:white;
border-radius:8px;
font-size:15px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
transition:0.3s;
}

button:hover{
background:#e65c00;
}

/* SPINNER */

.spinner{
width:16px;
height:16px;
border:2px solid white;
border-top:2px solid transparent;
border-radius:50%;
animation:spin 0.7s linear infinite;
display:none;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* MESSAGE */

.message{
margin-top:15px;
font-size:14px;
}

.success{
color:green;
}

.error{
color:red;
}

/* LOGIN LINK */

.login-link{
margin-top:20px;
font-size:14px;
}

.login-link a{
color:#ff6a00;
text-decoration:none;
font-weight:500;
}

.login-link a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<img class="logo" src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">

<h2>Forgot Password</h2>

<p>Enter your email address and we'll send you a password reset link.</p>

<input type="email" id="email" placeholder="Enter your email">

<button id="resetBtn">

<span id="btnText">Send Reset Link</span>

<div class="spinner" id="spinner"></div>

</button>

<div class="message" id="message"></div>

<div class="login-link">
Remember your password? <a href="login.html">Login</a>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { 
getAuth,
sendPasswordResetEmail
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
authDomain: "cashclique-31718.firebaseapp.com",
projectId: "cashclique-31718",
storageBucket: "cashclique-31718.firebasestorage.app",
messagingSenderId: "1064282591269",
appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc",
measurementId: "G-V5WHJB6LS0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const btn = document.getElementById("resetBtn");
const spinner = document.getElementById("spinner");
const btnText = document.getElementById("btnText");
const message = document.getElementById("message");

btn.addEventListener("click",()=>{

const email = document.getElementById("email").value;

if(!email){
message.innerHTML = "Please enter your email.";
message.className="message error";
return;
}

spinner.style.display="inline-block";
btnText.innerText="Sending...";
btn.disabled=true;

sendPasswordResetEmail(auth,email)

.then(()=>{

spinner.style.display="none";
btnText.innerText="Send Reset Link";
btn.disabled=false;

message.innerHTML="Password reset email sent. Check your inbox.";
message.className="message success";

})

.catch((error)=>{

spinner.style.display="none";
btnText.innerText="Send Reset Link";
btn.disabled=false;

message.innerHTML=error.message;
message.className="message error";

});

});

</script>

</body>
</html>
