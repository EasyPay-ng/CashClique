<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Videos | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
html, body { height: 100%; overflow: hidden; background: #000; }

/* Mobile Header */
.mobile-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 50px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    z-index: 100;
    color: white;
}
.mobile-header h1 {
    font-size: 18px;
    font-weight: 600;
}
.menu-btn, .search-btn {
    background: none;
    border: none;
    color: white;
    font-size: 22px;
    cursor: pointer;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Video Container */
.video-container {
    height: 100vh;
    width: 100vw;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
    position: relative;
}
.video-container::-webkit-scrollbar { display: none; }

/* Individual Video Item */
.video-item {
    height: 100vh;
    width: 100vw;
    scroll-snap-align: start;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
}

/* Video Element */
.video-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}
.video-player {
    width: 100%;
    height: 100%;
    object-fit: cover;
    max-height: 100vh;
}

/* Video Overlay Info */
.video-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 100px 30px 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    color: white;
    z-index: 10;
}
.video-author {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    cursor: pointer;
}
.video-author img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid #ff6a00;
    object-fit: cover;
}
.video-author-info {
    display: flex;
    flex-direction: column;
}
.video-author-name {
    font-weight: 600;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 5px;
}
.verified-badge {
    background: #1DA1F2;
    color: white;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
}
.video-caption {
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 10px;
    max-height: 60px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
}
.video-music {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    opacity: 0.9;
}
.music-icon {
    animation: spin 3s linear infinite;
}
@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* Right Side Actions */
.video-actions {
    position: absolute;
    right: 10px;
    bottom: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    z-index: 20;
}
.action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}
.action-btn i {
    font-size: 32px;
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
}
.action-btn:hover i {
    background: rgba(255,106,0,0.3);
    transform: scale(1.1);
}
.action-btn.liked i {
    background: #ff4757;
    color: white;
}
.action-btn.liked {
    color: #ff4757;
}
.action-count {
    font-size: 12px;
    font-weight: 600;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}

/* Profile Button on Actions */
.action-profile {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 2px solid white;
    overflow: hidden;
    cursor: pointer;
    position: relative;
}
.action-profile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.follow-mini {
    position: absolute;
    bottom: -5px;
    left: 50%;
    transform: translateX(-50%);
    background: #ff6a00;
    color: white;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    border: 2px solid #000;
}

/* Progress Bar */
.video-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: rgba(255,255,255,0.3);
    z-index: 30;
}
.progress-bar {
    height: 100%;
    background: #ff6a00;
    width: 0%;
    transition: width 0.1s linear;
}

/* Play/Pause Overlay */
.play-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80px;
    height: 80px;
    background: rgba(0,0,0,0.6);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 40px;
    opacity: 0;
    transition: 0.3s;
    pointer-events: none;
    z-index: 15;
}
.play-overlay.show {
    opacity: 1;
}
.video-item.paused .play-overlay {
    opacity: 1;
}

/* Comments Drawer */
.comments-drawer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-radius: 20px 20px 0 0;
    max-height: 70vh;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    z-index: 200;
    display: flex;
    flex-direction: column;
}
.comments-drawer.active {
    transform: translateY(0);
}
.comments-header {
    padding: 15px 20px;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.comments-count {
    font-weight: 600;
    font-size: 16px;
}
.close-comments {
    background: none;
    border: none;
    font-size: 24px;
    color: #64748b;
    cursor: pointer;
}
.comments-list {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    max-height: 50vh;
}
.comment-item {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #f1f5f9;
}
.comment-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
}
.comment-body {
    flex: 1;
}
.comment-username {
    font-weight: 600;
    font-size: 14px;
    color: #1e2937;
    margin-bottom: 4px;
}
.comment-text {
    font-size: 14px;
    color: #475569;
    line-height: 1.4;
}
.comment-time {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 4px;
}
.comment-input-area {
    padding: 15px;
    border-top: 1px solid #e2e8f0;
    display: flex;
    gap: 10px;
}
.comment-input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 25px;
    outline: none;
    font-size: 14px;
}
.comment-input:focus {
    border-color: #ff6a00;
}
.comment-submit {
    background: #ff6a00;
    color: white;
    border: none;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Drawer Backdrop */
.drawer-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    z-index: 150;
}
.drawer-backdrop.active {
    display: block;
}

/* Loading State */
.loading-videos {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    gap: 20px;
}
.loading-videos i {
    font-size: 50px;
    color: #ff6a00;
    animation: pulse 1.5s infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
}

/* Empty State */
.empty-videos {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    padding: 40px;
}
.empty-videos i {
    font-size: 80px;
    color: #ff6a00;
    margin-bottom: 20px;
    opacity: 0.5;
}
.empty-videos h2 {
    font-size: 24px;
    margin-bottom: 10px;
}
.empty-videos p {
    color: #94a3b8;
    margin-bottom: 30px;
}
.upload-video-btn {
    background: linear-gradient(135deg, #ff6a00, #ff8a00);
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 25px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* Sidebar (for desktop) */
.sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 240px;
    background: #ff6a00;
    color: white;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    z-index: 300;
    transform: translateX(-100%);
    transition: 0.3s;
}
.sidebar.active {
    transform: translateX(0);
}
.sidebar-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    z-index: 250;
}
.sidebar-overlay.active {
    display: block;
}
.sidebar-close {
    position: absolute;
    top: 15px;
    right: 15px;
    background: none;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
}
.sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 18px;
    margin-bottom: 10px;
}
.sidebar-logo img {
    width: 45px;
    border-radius: 10px;
}
.sidebar a {
    color: white;
    text-decoration: none;
    padding: 12px 15px;
    border-radius: 8px;
    transition: 0.3s;
    display: flex;
    align-items: center;
    gap: 10px;
}
.sidebar a:hover, .sidebar a.active {
    background: rgba(255,255,255,0.2);
}

/* Toast */
.toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #333;
    color: white;
    padding: 12px 24px;
    border-radius: 25px;
    font-size: 14px;
    z-index: 1000;
    opacity: 0;
    transition: all 0.3s;
}
.toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}

/* Desktop Adjustments */
@media (min-width: 768px) {
    .video-container {
        max-width: 500px;
        margin: 0 auto;
    }
    .video-item {
        border-radius: 0;
    }
}

/* Hide on very small screens adjustment */
@media (max-height: 600px) {
    .video-actions {
        bottom: 60px;
        gap: 15px;
    }
    .action-btn i {
        width: 45px;
        height: 45px;
        font-size: 24px;
    }
}
</style>
</head>
<body>

<!-- Mobile Header -->
<div class="mobile-header">
    <button class="menu-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>
    <h1><i class="fas fa-play-circle" style="color: #ff6a00;"></i> Videos</h1>
    <button class="search-btn" onclick="showToast('Search coming soon!', 'info')">
        <i class="fas fa-search"></i>
    </button>
</div>

<!-- Sidebar -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
    <button class="sidebar-close" onclick="toggleSidebar()">
        <i class="fas fa-times"></i>
    </button>
    <div class="sidebar-logo">
        <img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
        CashClique
    </div>
    <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
    <a href="#" class="active"><i class="fas fa-play-circle"></i> Videos</a>
    <a href="my-content.html"><i class="fas fa-file-alt"></i> My Content</a>
    <a href="earnings.html"><i class="fas fa-dollar-sign"></i> Earnings</a>
    <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
    <a href="#" id="logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- Video Container -->
<div class="video-container" id="video-container">
    <div class="loading-videos" id="loading">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Loading videos...</p>
    </div>
</div>

<!-- Comments Drawer -->
<div class="drawer-backdrop" id="drawer-backdrop" onclick="closeComments()"></div>
<div class="comments-drawer" id="comments-drawer">
    <div class="comments-header">
        <span class="comments-count" id="comments-count">0 comments</span>
        <button class="close-comments" onclick="closeComments()">
            <i class="fas fa-times"></i>
        </button>
    </div>
    <div class="comments-list" id="comments-list"></div>
    <div class="comment-input-area">
        <input type="text" class="comment-input" id="comment-input" placeholder="Add a comment...">
        <button class="comment-submit" onclick="submitComment()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, query, where, orderBy, getDocs, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
    authDomain: "cashclique-31718.firebaseapp.com",
    projectId: "cashclique-31718",
    storageBucket: "cashclique-31718.firebasestorage.app",
    messagingSenderId: "1064282591269",
    appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let videos = [];
let currentVideoIndex = 0;
let currentVideoId = null;
let isPlaying = true;
let userCache = {};

// Auth check
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }
    currentUser = user;
    loadVideos();
});

// Load videos from Firestore
async function loadVideos() {
    const container = document.getElementById('video-container');
    
    try {
        // Query posts that have videoUrl
        const q = query(
            collection(db, "posts"),
            where("videoUrl", "!=", null),
            orderBy("videoUrl"),
            orderBy("timestamp", "desc")
        );
        
        onSnapshot(q, async (snapshot) => {
            videos = [];
            
            if (snapshot.empty) {
                showEmptyState();
                return;
            }
            
            // Get all unique user IDs
            const userIds = new Set();
            snapshot.docs.forEach(doc => {
                const data = doc.data();
                userIds.add(data.userId);
                videos.push({
                    id: doc.id,
                    ...data
                });
            });
            
            // Cache user data
            for (const uid of userIds) {
                if (!userCache[uid]) {
                    const userDoc = await getDoc(doc(db, "users", uid));
                    if (userDoc.exists()) {
                        userCache[uid] = userDoc.data();
                    }
                }
            }
            
            renderVideos();
        });
        
    } catch (error) {
        console.error("Error loading videos:", error);
        showToast("Failed to load videos", "error");
    }
}

function showEmptyState() {
    const container = document.getElementById('video-container');
    container.innerHTML = `
        <div class="empty-videos">
            <i class="fas fa-video-slash"></i>
            <h2>No Videos Yet</h2>
            <p>Be the first to upload a video!</p>
            <button class="upload-video-btn" onclick="window.location.href='post.html'">
                <i class="fas fa-plus"></i> Upload Video
            </button>
        </div>
    `;
}

function renderVideos() {
    const container = document.getElementById('video-container');
    container.innerHTML = '';
    
    videos.forEach((video, index) => {
        const user = userCache[video.userId] || {};
        const isLiked = video.likedBy && video.likedBy.includes(currentUser.uid);
        const isFollowing = user.followers && user.followers.includes(currentUser.uid);
        
        const videoEl = document.createElement('div');
        videoEl.className = 'video-item';
        videoEl.dataset.index = index;
        videoEl.dataset.id = video.id;
        
        videoEl.innerHTML = `
            <div class="video-wrapper">
                <video 
                    class="video-player" 
                    src="${video.videoUrl}" 
                    loop 
                    playsinline
                    preload="metadata"
                    poster=""
                ></video>
                
                <div class="play-overlay" id="play-overlay-${index}">
                    <i class="fas fa-play"></i>
                </div>
                
                <div class="video-progress">
                    <div class="progress-bar" id="progress-${index}"></div>
                </div>
                
                <div class="video-overlay">
                    <div class="video-author" onclick="goToProfile('${video.userId}')">
                        <img src="${user.avatar || `https://ui-avatars.com/api/?name=${video.username}&background=ff6a00&color=fff`}" alt="">
                        <div class="video-author-info">
                            <div class="video-author-name">
                                @${video.username || 'user'}
                                ${user.isVerified ? '<span class="verified-badge"><i class="fas fa-check"></i></span>' : ''}
                            </div>
                        </div>
                    </div>
                    <div class="video-caption">${video.content || ''}</div>
                    <div class="video-music">
                        <i class="fas fa-music music-icon"></i>
                        <span>Original Sound - ${video.username || 'Unknown'}</span>
                    </div>
                </div>
                
                <div class="video-actions">
                    <div class="action-profile" onclick="goToProfile('${video.userId}')">
                        <img src="${user.avatar || `https://ui-avatars.com/api/?name=${video.username}&background=ff6a00&color=fff`}" alt="">
                        ${!isFollowing && video.userId !== currentUser.uid ? '<div class="follow-mini"><i class="fas fa-plus"></i></div>' : ''}
                    </div>
                    
                    <div class="action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${video.id}', this)">
                        <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i>
                        <span class="action-count" id="likes-${video.id}">${video.likes || 0}</span>
                    </div>
                    
                    <div class="action-btn" onclick="openComments('${video.id}')">
                        <i class="fas fa-comment-dots"></i>
                        <span class="action-count" id="comments-count-${video.id}">${video.commentCount || 0}</span>
                    </div>
                    
                    <div class="action-btn" onclick="shareVideo('${video.id}')">
                        <i class="fas fa-share"></i>
                        <span class="action-count">Share</span>
                    </div>
                    
                    <div class="action-btn" onclick="showToast('Saved to favorites!', 'success')">
                        <i class="fas fa-bookmark"></i>
                    </div>
                </div>
            </div>
        `;
        
        container.appendChild(videoEl);
        
        // Add click to play/pause
        const videoPlayer = videoEl.querySelector('.video-player');
        const playOverlay = videoEl.querySelector('.play-overlay');
        
        videoEl.addEventListener('click', (e) => {
            if (e.target.closest('.video-actions') || e.target.closest('.video-author')) return;
            
            if (videoPlayer.paused) {
                videoPlayer.play();
                playOverlay.classList.remove('show');
                isPlaying = true;
            } else {
                videoPlayer.pause();
                playOverlay.classList.add('show');
                isPlaying = false;
            }
        });
        
        // Update progress bar
        videoPlayer.addEventListener('timeupdate', () => {
            const progress = (videoPlayer.currentTime / videoPlayer.duration) * 100;
            document.getElementById(`progress-${index}`).style.width = progress + '%';
        });
    });
    
    // Setup intersection observer for auto-play
    setupIntersectionObserver();
}

function setupIntersectionObserver() {
    const options = {
        root: document.getElementById('video-container'),
        threshold: 0.6
    };
    
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const video = entry.target.querySelector('.video-player');
            const index = entry.target.dataset.index;
            
            if (entry.isIntersecting) {
                currentVideoIndex = parseInt(index);
                currentVideoId = entry.target.dataset.id;
                video.play();
                video.muted = false;
                entry.target.classList.remove('paused');
            } else {
                video.pause();
                video.currentTime = 0;
                entry.target.classList.add('paused');
            }
        });
    }, options);
    
    document.querySelectorAll('.video-item').forEach(item => {
        observer.observe(item);
    });
}

// Actions
window.toggleLike = async (videoId, btn) => {
    const isLiked = btn.classList.contains('liked');
    const countEl = document.getElementById(`likes-${videoId}`);
    let currentLikes = parseInt(countEl.textContent) || 0;
    
    try {
        if (isLiked) {
            // Unlike
            await updateDoc(doc(db, "posts", videoId), {
                likes: increment(-1),
                likedBy: arrayRemove(currentUser.uid)
            });
            btn.classList.remove('liked');
            btn.querySelector('i').classList.replace('fas', 'far');
            countEl.textContent = Math.max(0, currentLikes - 1);
        } else {
            // Like
            await updateDoc(doc(db, "posts", videoId), {
                likes: increment(1),
                likedBy: arrayUnion(currentUser.uid)
            });
            btn.classList.add('liked');
            btn.querySelector('i').classList.replace('far', 'fas');
            countEl.textContent = currentLikes + 1;
            
            // Animation effect
            btn.style.transform = 'scale(1.3)';
            setTimeout(() => btn.style.transform = 'scale(1)', 200);
        }
    } catch (error) {
        console.error("Like error:", error);
    }
};

// Comments
let currentCommentVideoId = null;

window.openComments = async (videoId) => {
    currentCommentVideoId = videoId;
    document.getElementById('drawer-backdrop').classList.add('active');
    document.getElementById('comments-drawer').classList.add('active');
    
    // Pause current video
    const currentVideo = document.querySelectorAll('.video-player')[currentVideoIndex];
    if (currentVideo) currentVideo.pause();
    
    // Load comments
    loadComments(videoId);
};

window.closeComments = () => {
    document.getElementById('drawer-backdrop').classList.remove('active');
    document.getElementById('comments-drawer').classList.remove('active');
    
    // Resume video
    const currentVideo = document.querySelectorAll('.video-player')[currentVideoIndex];
    if (currentVideo) currentVideo.play();
};

async function loadComments(videoId) {
    const list = document.getElementById('comments-list');
    list.innerHTML = '<div style="text-align:center;padding:20px;"><i class="fas fa-spinner fa-spin"></i></div>';
    
    const q = query(
        collection(db, "posts", videoId, "comments"),
        orderBy("timestamp", "desc")
    );
    
    onSnapshot(q, (snapshot) => {
        list.innerHTML = '';
        document.getElementById('comments-count').textContent = `${snapshot.size} comments`;
        document.getElementById(`comments-count-${videoId}`).textContent = snapshot.size;
        
        if (snapshot.empty) {
            list.innerHTML = '<div style="text-align:center;padding:40px;color:#94a3b8;">No comments yet. Be the first!</div>';
            return;
        }
        
        snapshot.forEach(doc => {
            const comment = doc.data();
            const item = document.createElement('div');
            item.className = 'comment-item';
            item.innerHTML = `
                <img src="${comment.userAvatar || `https://ui-avatars.com/api/?name=${comment.username}&background=ff6a00&color=fff`}" class="comment-avatar">
                <div class="comment-body">
                    <div class="comment-username">@${comment.username || 'user'}</div>
                    <div class="comment-text">${escapeHtml(comment.text)}</div>
                    <div class="comment-time">${formatTime(comment.timestamp?.toDate())}</div>
                </div>
            `;
            list.appendChild(item);
        });
    });
}

window.submitComment = async () => {
    const input = document.getElementById('comment-input');
    const text = input.value.trim();
    if (!text || !currentCommentVideoId) return;
    
    try {
        await addDoc(collection(db, "posts", currentCommentVideoId, "comments"), {
            userId: currentUser.uid,
            username: currentUser.displayName || 'User',
            userAvatar: userCache[currentUser.uid]?.avatar || '',
            text: text,
            timestamp: serverTimestamp()
        });
        
        input.value = '';
    } catch (error) {
        console.error("Comment error:", error);
        showToast("Failed to post comment", "error");
    }
};

// Handle Enter key in comment input
document.getElementById('comment-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') submitComment();
});

// Share
window.shareVideo = async (videoId) => {
    const video = videos.find(v => v.id === videoId);
    if (!video) return;
    
    if (navigator.share) {
        try {
            await navigator.share({
                title: 'Check out this video on CashClique',
                text: video.content || 'Watch this video!',
                url: window.location.href + '?video=' + videoId
            });
        } catch (err) {
            // User cancelled
        }
    } else {
        // Copy to clipboard
        navigator.clipboard.writeText(window.location.href + '?video=' + videoId);
        showToast('Link copied to clipboard!', 'success');
    }
};

// Navigation
window.goToProfile = (userId) => {
    window.location.href = `profile.html?uid=${userId}`;
};

window.toggleSidebar = () => {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('sidebar-overlay').classList.toggle('active');
};

// Logout
document.getElementById('logout').addEventListener('click', (e) => {
    e.preventDefault();
    signOut(auth).then(() => window.location.href = "login.html");
});

// Utilities
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatTime(date) {
    if (!date) return 'Just now';
    const diff = Math.floor((new Date() - date) / 1000);
    if (diff < 60) return 'Just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return `${Math.floor(diff/86400)}d ago`;
}

function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast show ${type}`;
    setTimeout(() => toast.classList.remove('show'), 3000);
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        scrollToVideo(currentVideoIndex + 1);
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        scrollToVideo(currentVideoIndex - 1);
    } else if (e.key === ' ') {
        e.preventDefault();
        const video = document.querySelectorAll('.video-player')[currentVideoIndex];
        if (video) {
            if (video.paused) video.play();
            else video.pause();
        }
    }
});

function scrollToVideo(index) {
    if (index < 0 || index >= videos.length) return;
    const container = document.getElementById('video-container');
    const videoEl = document.querySelectorAll('.video-item')[index];
    if (videoEl) {
        videoEl.scrollIntoView({ behavior: 'smooth' });
    }
}
</script>
