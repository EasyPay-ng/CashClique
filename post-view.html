<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post View | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;min-height:100vh;padding:20px;}

.back-btn{margin-bottom:20px;background:white;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:500;box-shadow:0 3px 10px rgba(0,0,0,0.05);transition:0.2s;display:flex;align-items:center;gap:6px;}
.back-btn:hover{transform:translateY(-1px);box-shadow:0 5px 15px rgba(0,0,0,0.1);}

.container{max-width:600px;margin:0 auto;background:white;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.08);overflow:hidden;}

.post-header{display:flex;align-items:center;gap:12px;padding:20px;border-bottom:1px solid #f0f0f0;}
.post-header img{width:45px;height:45px;border-radius:50%;cursor:pointer;transition:0.2s;}
.post-header img:hover{transform:scale(1.05);}
.post-header strong{font-size:16px;cursor:pointer;}
.post-header strong:hover{color:#ff6a00;}

.post-content{padding:20px;font-size:16px;line-height:1.6;}
.post-image{width:100%;max-height:500px;object-fit:cover;}

.post-actions{padding:0 20px 20px;display:flex;gap:35px;border-bottom:1px solid #f0f0f0;padding-bottom:20px;}
.action-item{cursor:pointer;font-size:16px;transition:0.2s;display:flex;align-items:center;gap:6px;color:#555;}
.action-item:hover{color:#ff6a00;}
.like-btn.liked{color:#ff4444;}
.like-btn.liked i{font-weight:900;}

.comments-section{padding:20px;}
.comments-title{font-weight:600;margin-bottom:15px;font-size:15px;color:#444;}

.comment-list{display:flex;flex-direction:column;gap:15px;margin-bottom:20px;}
.comment{background:#f8f8f8;padding:15px;border-radius:10px;transition:0.2s;}
.comment:hover{background:#f0f0f0;}
.comment-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.comment-header strong{font-size:14px;color:#ff6a00;}
.comment-header small{font-size:11px;color:#888;}
.comment-text{font-size:14px;color:#333;line-height:1.5;margin-bottom:10px;}
.comment-actions{display:flex;gap:15px;font-size:13px;color:#666;}
.comment-actions span{cursor:pointer;display:flex;align-items:center;gap:4px;}
.comment-actions span:hover{color:#ff6a00;}

.reply-list{margin-top:12px;margin-left:30px;display:flex;flex-direction:column;gap:12px;}
.reply{background:#ffffff;padding:12px;border-radius:8px;border-left:2px solid #ff6a00;}
.reply .comment-header strong{font-size:13px;}
.reply .comment-text{font-size:13px;}

.reply-input-wrapper{margin-top:12px;display:flex;gap:8px;align-items:flex-end;}
.reply-input{flex:1;padding:10px 12px;border:1px solid #ddd;border-radius:8px;resize:none;font-size:13px;outline:none;min-height:40px;}
.reply-input:focus{border-color:#ff6a00;}
.reply-btn{background:#ff6a00;color:white;border:none;padding:10px 16px;border-radius:8px;font-weight:500;cursor:pointer;transition:0.2s;font-size:13px;white-space:nowrap;}
.reply-btn:hover{background:#e55d00;transform:translateY(-1px);}
.reply-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

.comment-input-wrapper{display:flex;gap:10px;align-items:flex-end;}
.comment-input{flex:1;padding:12px 15px;border:1px solid #ddd;border-radius:10px;resize:none;font-size:14px;outline:none;transition:0.2s;min-height:48px;}
.comment-input:focus{border-color:#ff6a00;}
.comment-btn{background:#ff6a00;color:white;border:none;padding:12px 20px;border-radius:10px;font-weight:500;cursor:pointer;transition:0.2s;white-space:nowrap;}
.comment-btn:hover{background:#e55d00;transform:translateY(-1px);}
.comment-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

.spinner{border:3px solid rgba(255,255,255,0.3);border-top:3px solid white;border-radius:50%;width:18px;height:18px;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

.loading{text-align:center;padding:50px;color:#888;}

@media(max-width:600px){
    body{padding:10px;}
    .post-header, .post-content, .post-actions, .comments-section{padding:15px;}
    .post-actions{gap:25px;}
    .reply-list{margin-left:20px;}
}
</style>
</head>

<body>

<button class="back-btn" onclick="history.back()">
    <i class="fa-solid fa-arrow-left"></i> Back
</button>

<div class="container">
  <div class="post-header">
    <img id="poster-pic" src="https://i.pravatar.cc/150?img=3">
    <strong id="poster-name">Username</strong>
  </div>

  <div class="post-content" id="post-text"></div>
  <img id="post-img" class="post-image" style="display:none;">

  <div class="post-actions">
    <span id="view-count" class="action-item">
        <i class="fa-regular fa-eye"></i> <span>0</span>
    </span>
    <span id="like-btn" class="like-btn action-item">
        <i class="fa-regular fa-heart"></i> <span>0</span>
    </span>
    <span id="comment-action" class="action-item">
        <i class="fa-regular fa-comment"></i> <span id="comment-count">0</span>
    </span>
  </div>

  <div class="comments-section">
    <div class="comments-title">Comments</div>
    <div class="comment-list" id="comment-list"></div>
    <div class="comment-input-wrapper">
      <textarea id="comment-input" class="comment-input" placeholder="Write a comment..." rows="1"></textarea>
      <button id="comment-btn" class="comment-btn" disabled>Post</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, collection, getDoc, onSnapshot, addDoc, updateDoc, increment, serverTimestamp, arrayUnion, arrayRemove, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
authDomain:"cashclique-31718.firebaseapp.com",
projectId:"cashclique-31718",
storageBucket:"cashclique-31718.firebasestorage.app",
messagingSenderId:"1064282591269",
appId:"1:1064282591269:web:17fbaf9b683d5b0dfbafcc",
measurementId:"G-V5WHJB6LS0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const postId = urlParams.get('postId');

const posterPic = document.getElementById("poster-pic");
const posterName = document.getElementById("poster-name");
const postText = document.getElementById("post-text");
const postImg = document.getElementById("post-img");
const likeBtn = document.getElementById("like-btn");
const likeCountSpan = likeBtn.querySelector('span');
const viewCountSpan = document.getElementById('view-count').querySelector('span');
const commentList = document.getElementById("comment-list");
const commentInput = document.getElementById("comment-input");
const commentBtn = document.getElementById("comment-btn");
const commentCount = document.getElementById("comment-count");

let currentUser=null;
let currentUsername = "User";
let isLiked = false;

onAuthStateChanged(auth, async user=>{
  if(!user) window.location.href="login.html";
  currentUser=user;

  // Get current user's username
  const userDoc = await getDoc(doc(db, "users", user.uid));
  if(userDoc.exists()){
    currentUsername = userDoc.data().username || user.email.split('@')[0];
  }

  loadPost();
  loadComments();
});

// Load post data with real-time updates
function loadPost(){
  const postRef = doc(db,"posts",postId);
  
  // Track views (only increment once per user)
  getDoc(postRef).then(async postSnap => {
    if(postSnap.exists()){
      const post = postSnap.data();
      if(!post.viewedBy || !post.viewedBy.includes(currentUser.uid)){
        await updateDoc(postRef, {
          views: increment(1),
          viewedBy: arrayUnion(currentUser.uid)
        });
      }
    }
  });

  // Real-time post updates
  onSnapshot(postRef, postSnap => {
    if(!postSnap.exists()){ alert("Post not found"); return; }
    const post = postSnap.data();

    posterName.innerText = post.username;
    posterPic.src = `https://i.pravatar.cc/150?u=${post.userId}`;
    postText.innerText = post.content || '';
    if(post.imageBase64){ 
      postImg.src = post.imageBase64; 
      postImg.style.display='block'; 
    }

    posterPic.onclick = ()=>{ window.location.href=`profile.html?uid=${post.userId}`; }
    posterName.onclick = ()=>{ window.location.href=`profile.html?uid=${post.userId}`; }

    // Update view count
    viewCountSpan.innerText = post.views || 0;

    // Update like state and count
    isLiked = post.likedBy?.includes(currentUser.uid) || false;
    likeCountSpan.innerText = post.likes || 0;
    if(isLiked) likeBtn.classList.add('liked');
    else likeBtn.classList.remove('liked');
  });
}

// Like/Unlike functionality
likeBtn.onclick = async () => {
  const postRef = doc(db,"posts",postId);
  if(isLiked){
    // Unlike
    await updateDoc(postRef, {
      likes: increment(-1),
      likedBy: arrayRemove(currentUser.uid)
    });
  } else {
    // Like
    await updateDoc(postRef, {
      likes: increment(1),
      likedBy: arrayUnion(currentUser.uid)
    });
  }
};

// Load comments with replies
function loadComments(){
  const commentsRef = collection(db,"posts",postId,"comments");
  const q = query(commentsRef, orderBy("timestamp", "asc"));

  onSnapshot(q, snap => {
    commentCount.innerText = snap.size;
    commentList.innerHTML="";

    if(snap.empty){
      commentList.innerHTML = `<div style="text-align:center;color:#888;padding:20px;">No comments yet. Be the first!</div>`;
      return;
    }

    // Separate top-level comments and replies
    const comments = [];
    const replies = new Map();

    snap.forEach(doc => {
      const data = doc.data();
      data.id = doc.id;
      if(data.parentCommentId){
        if(!replies.has(data.parentCommentId)) replies.set(data.parentCommentId, []);
        replies.get(data.parentCommentId).push(data);
      } else {
        comments.push(data);
      }
    });

    // Render top-level comments and their replies
    comments.forEach(comment => {
      renderComment(comment, replies.get(comment.id) || []);
    });
  });
}

// Render a single comment with its replies
function renderComment(comment, replies=[]){
  const div = document.createElement("div");
  div.className = "comment";
  div.dataset.commentId = comment.id;

  const time = comment.timestamp ? timeAgo(comment.timestamp.toDate()) : "Just now";

  div.innerHTML = `
    <div class="comment-header">
      <strong>${comment.username}</strong>
      <small>${time}</small>
    </div>
    <div class="comment-text">${comment.text}</div>
    <div class="comment-actions">
      <span class="reply-btn" data-comment-id="${comment.id}">
        <i class="fa-regular fa-reply"></i> Reply
      </span>
    </div>
  `;

  // Add reply input container
  const replyInputContainer = document.createElement("div");
  replyInputContainer.className = "reply-input-wrapper";
  replyInputContainer.style.display = "none";
  replyInputContainer.innerHTML = `
    <textarea class="reply-input" placeholder="Write a reply..." rows="1"></textarea>
    <button class="reply-btn-submit" data-comment-id="${comment.id}">Post</button>
  `;
  div.appendChild(replyInputContainer);

  // Add reply list
  const replyList = document.createElement("div");
  replyList.className = "reply-list";
  div.appendChild(replyList);

  // Render replies
  replies.forEach(reply => {
    const replyDiv = document.createElement("div");
    replyDiv.className = "reply";
    replyDiv.innerHTML = `
      <div class="comment-header">
        <strong>${reply.username}</strong>
        <small>${timeAgo(reply.timestamp.toDate())}</small>
      </div>
      <div class="comment-text">${reply.text}</div>
      <div class="comment-actions">
        <span class="reply-btn" data-comment-id="${reply.id}">
          <i class="fa-regular fa-reply"></i> Reply
        </span>
      </div>
    `;
    replyList.appendChild(replyDiv);

    // Add reply input for replies
    const replyReplyContainer = document.createElement("div");
    replyReplyContainer.className = "reply-input-wrapper";
    replyReplyContainer.style.display = "none";
    replyReplyContainer.innerHTML = `
      <textarea class="reply-input" placeholder="Write a reply..." rows="1"></textarea>
      <button class="reply-btn-submit" data-comment-id="${reply.id}">Post</button>
    `;
    replyDiv.appendChild(replyReplyContainer);
  });

  commentList.appendChild(div);

  // Add reply button event listeners
  div.querySelector(".reply-btn").addEventListener("click", (e) => {
    const container = e.target.closest(".comment").querySelector(".reply-input-wrapper");
    container.style.display = container.style.display === "none" ? "flex" : "none";
    if(container.style.display === "flex"){
      container.querySelector(".reply-input").focus();
    }
  });

  // Add reply submit listener
  div.querySelector(".reply-btn-submit").addEventListener("click", async (e) => {
    const commentId = e.target.dataset.commentId;
    const input = e.target.previousElementSibling;
    const text = input.value.trim();
    if(!text) return;

    e.target.disabled = true;
    e.target.innerHTML = `<div class="spinner" style="width:14px;height:14px;"></div>`;

    await addDoc(collection(db,"posts",postId,"comments"),{
      userId: currentUser.uid,
      username: currentUsername,
      text: text,
      parentCommentId: commentId,
      timestamp: serverTimestamp()
    });

    input.value="";
    e.target.disabled = false;
    e.target.innerHTML = "Post";
    e.target.closest(".reply-input-wrapper").style.display = "none";
  });
}

// Enable/disable comment button
commentInput.addEventListener("input", () => {
  commentBtn.disabled = commentInput.value.trim().length === 0;
});

// Add comment
commentBtn.onclick=async()=>{
  const text = commentInput.value.trim();
  if(!text) return;

  commentBtn.disabled = true;
  commentBtn.innerHTML = `<div class="spinner"></div>`;

  await addDoc(collection(db,"posts",postId,"comments"),{
    userId: currentUser.uid,
    username: currentUsername,
    text: text,
    timestamp: serverTimestamp()
  });

  commentInput.value="";
  commentBtn.innerHTML = "Post";
  commentBtn.disabled = true;
};

// Time ago helper
function timeAgo(date) {
  const seconds = Math.floor((new Date() - date) / 1000);
  if (seconds < 60) return "Just now";
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `${minutes}m ago`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours}h ago`;
  const days = Math.floor(hours / 24);
  if (days < 7) return `${days}d ago`;
  return date.toLocaleDateString();
}
</script>

</body>
</html>
