<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earnings | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;min-height:100vh;padding:0;}

/* Mobile Header */
.mobile-header{display:none;background:#ff6a00;color:white;padding:15px 20px;align-items:center;gap:15px;position:sticky;top:0;z-index:100;}
.mobile-header h1{font-size:18px;font-weight:600;flex:1;}
.menu-btn{background:none;border:none;color:white;font-size:24px;cursor:pointer;padding:5px;}

/* Sidebar */
.sidebar{width:240px;background:#ff6a00;color:white;padding:20px;display:flex;flex-direction:column;gap:20px;position:fixed;height:100%;z-index:999;transition:0.3s;transform:translateX(0);}
.sidebar img{width:45px;border-radius:10px;}
.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:18px;margin-bottom:10px;}
.sidebar a{color:white;text-decoration:none;padding:12px 15px;border-radius:8px;transition:0.3s;display:flex;align-items:center;gap:10px;}
.sidebar a:hover, .sidebar a.active{background:rgba(255,255,255,0.2);}

/* Main Content */
.main{margin-left:240px;padding:20px;transition:0.3s;}
.container{background:white;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.08);overflow:hidden;}
.header{padding:30px;text-align:center;border-bottom:1px solid #f0f0f0;}
.header h1{font-size:28px;font-weight:700;color:#333;margin-bottom:8px;}
.balance-display{font-size:48px;font-weight:700;background:linear-gradient(135deg,#ff6a00,#ff8a00);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px;}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;padding:20px;}
.stat-card{background:#f8f9fa;padding:20px;border-radius:12px;text-align:center;border:2px solid transparent;transition:0.3s;}
.stat-card:hover{transform:translateY(-3px);border-color:#ff6a00;box-shadow:0 8px 20px rgba(255,106,0,0.1);}
.stat-label{font-size:12px;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.stat-value{font-size:20px;font-weight:700;color:#333;}

/* Table Container - Horizontal Scroll */
.table-container{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:20px;border:1px solid #eee;border-radius:12px;}
.content-table{width:100%;border-collapse:collapse;min-width:600px;}
.table-header{font-weight:600;background:#fafafa;text-align:left;padding:15px;font-size:13px;color:#555;border-bottom:2px solid #eee;white-space:nowrap;}
.table-row{cursor:pointer;border-bottom:1px solid #f0f0f0;transition:0.2s;}
.table-row:hover{background:#f8f9fa;}
.table-row td{padding:15px;font-size:14px;vertical-align:middle;}
.post-preview{width:50px;height:50px;border-radius:8px;overflow:hidden;flex-shrink:0;}
.post-preview img{width:100%;height:100%;object-fit:cover;}
.post-info{flex:1;}
.post-title{font-weight:600;font-size:14px;margin-bottom:3px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.post-stats{display:flex;gap:10px;font-size:12px;color:#666;flex-wrap:wrap;}
.earning-amount{font-weight:600;color:#ff6a00;font-size:15px;white-space:nowrap;}

/* Withdraw Section */
.withdraw-section{padding:25px;border-top:1px solid #f0f0f0;text-align:center;background:#f9f9f9;margin:20px;border-radius:0 0 16px 16px;}
.withdraw-btn{background:#ff6a00;color:white;border:none;padding:14px 35px;border-radius:10px;font-weight:600;font-size:15px;cursor:pointer;transition:0.3s;box-shadow:0 4px 12px rgba(255,106,0,0.2);}
.withdraw-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,106,0,0.3);}
.withdraw-btn:disabled{opacity:0.5;cursor:not-allowed;background:#ccc;transform:none;}
.min-withdraw{font-size:12px;color:#666;margin-top:8px;}

/* Empty State */
.empty-state{text-align:center;padding:40px 20px;color:#888;}
.empty-state h3{font-size:18px;margin-bottom:8px;}
.empty-state p{font-size:14px;margin-bottom:20px;}

/* Mobile Responsive */
@media(max-width:900px){
  .mobile-header{display:flex;}
  .sidebar{transform:translateX(-100%);}
  .sidebar.active{transform:translateX(0);}
  .main{margin-left:0;padding:10px;padding-top:70px;}
  .container{border-radius:12px;}
  .header{padding:20px;}
  .header h1{font-size:22px;}
  .balance-display{font-size:36px;}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}
  .stat-card{padding:15px;}
  .stat-value{font-size:18px;}
  .table-container{margin:10px;border-radius:8px;}
  .table-header, .table-row td{padding:12px 10px;font-size:13px;}
  .post-preview{width:40px;height:40px;}
  .post-title{max-width:150px;font-size:13px;}
  .post-stats{gap:8px;}
  .withdraw-section{margin:10px;padding:20px;}
  .withdraw-btn{padding:12px 30px;font-size:14px;}
}

/* Very small screens */
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr;}
  .mobile-header h1{font-size:16px;}
  .balance-display{font-size:28px;}
  .post-preview{width:35px;height:35px;}
  .post-title{max-width:120px;font-size:12px;}
  .post-stats{font-size:11px;}
}
</style>
</head>

<body>

<!-- Mobile Header -->
<div class="mobile-header">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  <h1>Your Earnings</h1>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
<div class="logo">
<img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
CashClique
</div>
<a href="dashboard.html">🏠 Dashboard</a>
<a href="my-content.html">📝 My Content</a>
<a href="earnings.html" class="active">💰 Earnings</a>
<a href="opportunities.html">🔥 Opportunities</a>
<a href="settings.html">⚙ Settings</a>
<a href="#" id="logout">🚪 Logout</a>
</div>

<!-- Main Content -->
<div class="main">
<div class="container">
  <div class="header">
    <h1>Your Earnings</h1>
    <div class="balance-display" id="total-balance">$0.00</div>
  </div>
  
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Posts</div>
      <div class="stat-value" id="total-posts">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Likes</div>
      <div class="stat-value" id="total-likes">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Paid Posts</div>
      <div class="stat-value" id="paid-posts">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg $/Post</div>
      <div class="stat-value" id="avg-earning">$0.00</div>
    </div>
  </div>
  
  <div class="table-container">
    <table class="content-table">
      <thead>
        <tr>
          <th class="table-header">Post</th>
          <th class="table-header">Stats</th>
          <th class="table-header">Earning</th>
        </tr>
      </thead>
      <tbody id="content-table-body">
        <tr><td colspan="3" class="empty-state"><h3>No earnings yet</h3><p>Create content and get likes to start earning!</p></td></tr>
      </tbody>
    </table>
  </div>
  
  <div class="withdraw-section">
    <button class="withdraw-btn" id="withdraw-btn" disabled>Withdraw Earnings</button>
    <div class="min-withdraw">Minimum withdrawal: $25.00</div>
  </div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, query, where, onSnapshot, doc, orderBy, getDoc, updateDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
    authDomain: "cashclique-31718.firebaseapp.com",
    projectId: "cashclique-31718",
    storageBucket: "cashclique-31718.firebasestorage.app",
    messagingSenderId: "1064282591269",
    appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc",
    measurementId: "G-V5WHJB6LS0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const totalBalanceEl = document.getElementById('total-balance');
const totalPostsEl = document.getElementById('total-posts');
const totalLikesEl = document.getElementById('total-likes');
const paidPostsEl = document.getElementById('paid-posts');
const avgEarningEl = document.getElementById('avg-earning');
const contentTableBody = document.getElementById('content-table-body');
const withdrawBtn = document.getElementById('withdraw-btn');

let currentUser = null;
let balance = 0;

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }
    currentUser = user;
    
    loadEarnings();
});

function loadEarnings() {
    // User balance
    const userRef = doc(db, "users", currentUser.uid);
    onSnapshot(userRef, (snap) => {
        if (snap.exists()) {
            const data = snap.data();
            balance = data.balance || 0;
            totalBalanceEl.textContent = `$${balance.toFixed(2)}`;
            
            withdrawBtn.disabled = balance < 25;
            withdrawBtn.textContent = balance >= 25 ? `Withdraw $${balance.toFixed(2)}` : `$${balance.toFixed(2)} (Min $25)`;
        }
    });

    // User posts stats
    const postsQuery = query(collection(db, "posts"), where("userId", "==", currentUser.uid));
    let totalLikes = 0;
    let paidPostsCount = 0;
    
    onSnapshot(postsQuery, (postsSnap) => {
        totalPostsEl.textContent = postsSnap.size;
        
        totalLikes = 0;
        paidPostsCount = 0;
        contentTableBody.innerHTML = "";
        
        if (postsSnap.empty) {
            contentTableBody.innerHTML = '<tr><td colspan="3" class="empty-state"><h3>No posts yet</h3><p>Create content to start earning!</p></td></tr>';
            updateStats(0, 0);
            return;
        }
        
        // Sort by earning (highest first) for top 10
        const sortedPosts = postsSnap.docs.sort((a, b) => {
            const earnA = a.data().earning || 0;
            const earnB = b.data().earning || 0;
            return earnB - earnA;
        });
        
        let contentCount = 0;
        sortedPosts.forEach((postDoc) => {
            const post = postDoc.data();
            const likes = post.likes || 0;
            const earning = post.earning || 0;
            
            totalLikes += likes;
            if (earning > 0) paidPostsCount++;
            
            // Add to table (only first 10)
            if (contentCount < 10) {
                const row = document.createElement('tr');
                row.className = 'table-row';
                row.onclick = () => window.location.href = `post-view.html?postId=${postDoc.id}`;
                
                const imgHtml = post.imageBase64 
                    ? `<img src="${post.imageBase64}" class="post-preview" alt="Post">`
                    : `<div class="post-preview" style="background:#ff6a00;display:flex;align-items:center;justify-content:center;color:white;font-size:10px;">${(post.content?.substring(0,2) || 'P').toUpperCase()}</div>`;
                
                row.innerHTML = `
                    <td>
                        <div style="display:flex;align-items:center;gap:10px;">
                            ${imgHtml}
                            <div class="post-info">
                                <div class="post-title">${post.content?.substring(0, 50) || 'No text'}${post.content?.length > 50 ? '...' : ''}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="post-stats">
                            <span>❤️ ${likes}</span>
                            <span>💬 ${post.commentCount || 0}</span>
                        </div>
                    </td>
                    <td class="earning-amount">$${earning.toFixed(2)}</td>
                `;
                contentTableBody.appendChild(row);
                contentCount++;
            }
        });
        
        if (contentCount === 0 && postsSnap.size > 0) {
            contentTableBody.innerHTML = '<tr><td colspan="3" class="empty-state"><h3>No paid posts yet</h3><p>Admin hasn\'t assigned earnings to your posts</p></td></tr>';
        }
        
        updateStats(totalLikes, paidPostsCount);
    });
}

function updateStats(totalLikes, paidPosts) {
    totalLikesEl.textContent = totalLikes;
    paidPostsEl.textContent = paidPosts;
    
    const avgEarning = balance > 0 && totalPostsEl.textContent > 0 ? 
        (balance / parseInt(totalPostsEl.textContent)).toFixed(2) : 
        '0.00';
    avgEarningEl.textContent = `$${avgEarning}`;
}

// Withdraw button
withdrawBtn.onclick = async () => {
    if (balance < 25) {
        alert('Minimum withdrawal is $25.00. You need $' + (25 - balance).toFixed(2) + ' more.');
        return;
    }
    
    if (!confirm(`Withdraw $${balance.toFixed(2)} to your payment method?`)) return;
    
    try {
        // Create withdrawal request
        await addDoc(collection(db, "withdrawals"), {
            userId: currentUser.uid,
            username: currentUser.displayName || currentUser.email?.split('@')[0] || 'User',
            amount: balance,
            status: 'pending',
            timestamp: serverTimestamp()
        });
        
        // Set balance to 0
        await updateDoc(doc(db, "users", currentUser.uid), {
            balance: 0,
            lastWithdrawal: serverTimestamp()
        });
        
        alert('✅ Withdrawal request submitted! You\'ll be notified when processed.');
        withdrawBtn.disabled = true;
    } catch (error) {
        console.error('Withdraw failed:', error);
        alert('Failed to submit withdrawal. Please try again.');
    }
};

// Logout
document.getElementById('logout').onclick = async () => {
    await signOut(auth);
    window.location.href = "login.html";
};

// Mobile menu toggle
window.toggleMenu = function() {
    document.getElementById('sidebar').classList.toggle('active');
};

// Close sidebar when clicking outside on mobile
document.addEventListener('click', (e) => {
    if (window.innerWidth <= 900) {
        const sidebar = document.getElementById('sidebar');
        const menuBtn = document.querySelector('.menu-btn');
        if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
            sidebar.classList.remove('active');
        }
    }
});
</script>

</body>
</html>
