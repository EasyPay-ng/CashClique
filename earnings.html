<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earnings | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;min-height:100vh;padding:20px;}
.sidebar{width:240px;background:#ff6a00;color:white;padding:20px;display:flex;flex-direction:column;gap:20px;position:fixed;height:100%;z-index:999;transition:0.3s;}
.sidebar img{width:45px;border-radius:10px;}
.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:18px;}
.sidebar a{color:white;text-decoration:none;padding:10px;border-radius:8px;transition:0.3s;}
.sidebar a:hover{background:rgba(255,255,255,0.2);}
.main{margin-left:240px;width:calc(100vw - 240px);padding:20px;}
.container{background:white;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.08);overflow:hidden;}
.header{padding:30px;text-align:center;border-bottom:1px solid #f0f0f0;}
.header h1{font-size:28px;font-weight:700;color:#333;margin-bottom:8px;}
.balance-display{font-size:48px;font-weight:700;background:linear-gradient(135deg,#ff6a00,#ff8a00);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:25px;padding:30px;}
.stat-card{background:#f8f9fa;padding:25px;border-radius:16px;text-align:center;border:2px solid transparent;transition:0.3s;}
.stat-card:hover{transform:translateY(-5px);border-color:#ff6a00;box-shadow:0 15px 35px rgba(255,106,0,0.15);}
.stat-label{font-size:13px;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.stat-value{font-size:24px;font-weight:700;color:#333;}
.earnings-primary{color:#ff6a00 !important;}

.content-table{width:100%;border-collapse:collapse;margin:30px 0;}
.table-header{font-weight:600;background:#f8f9fa;text-align:left;padding:15px 20px;font-size:14px;color:#555;border-bottom:2px solid #e0e0e0;}
.table-row{cursor:pointer;padding:18px 20px;border-bottom:1px solid #f0f0f0;transition:0.2s;display:flex;align-items:center;gap:15px;}
.table-row:hover{background:#f8f9fa;}
.post-preview{width:50px;height:50px;border-radius:8px;overflow:hidden;flex-shrink:0;}
.post-preview img{width:100%;height:100%;object-fit:cover;}
.post-info{flex:1;}
.post-title{font-weight:600;font-size:15px;margin-bottom:3px;}
.post-stats{display:flex;gap:15px;font-size:13px;color:#666;}
.earning-amount{font-weight:600;color:#ff6a00;font-size:16px;flex-shrink:0;}

.withdraw-section{padding:30px;border-top:1px solid #f0f0f0;text-align:center;background:#f9f9f9;}
.withdraw-btn{background:#ff6a00;color:white;border:none;padding:16px 40px;border-radius:12px;font-weight:600;font-size:16px;cursor:pointer;transition:0.3s;box-shadow:0 4px 15px rgba(255,106,0,0.3);}
.withdraw-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(255,106,0,0.4);}
.withdraw-btn:disabled{opacity:0.5;cursor:not-allowed;background:#ccc;transform:none;}
.min-withdraw{font-size:13px;color:#666;margin-top:10px;}

.empty-state{text-align:center;padding:60px 30px;color:#888;}
.empty-state h3{font-size:22px;margin-bottom:10px;}
.empty-state p{font-size:15px;margin-bottom:25px;}

@media(max-width:900px){
.sidebar{transform:translateX(-100%);}
.sidebar.active{transform:translateX(0);}
.main{margin-left:0;width:100%;}
.stats-grid{grid-template-columns:repeat(2,1fr);}
.table-row{flex-direction:column;gap:12px;text-align:center;}
}
</style>
</head>

<body>
<!-- Sidebar -->
<div class="sidebar" id="sidebar">
<div class="logo">
<img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
CashClique
</div>
<a href="dashboard.html">🏠 Dashboard</a>
<a href="my-content.html">📝 My Content</a>
<a href="earnings.html">💰 Earnings</a>
<a href="opportunities.html">🔥 Opportunities</a>
<a href="settings.html">⚙ Settings</a>
<a href="#" id="logout">🚪 Logout</a>
</div>

<!-- Main Content -->
<div class="main">
<div class="container">
  <div class="header">
    <h1>Your Earnings</h1>
    <div class="balance-display" id="total-balance">$0.00</div>
  </div>
  
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Posts</div>
      <div class="stat-value" id="total-posts">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Likes</div>
      <div class="stat-value" id="total-likes">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Paid Posts</div>
      <div class="stat-value" id="paid-posts">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg $/Post</div>
      <div class="stat-value" id="avg-earning">$0.00</div>
    </div>
  </div>
  
  <div style="padding:30px;">
    <h3 style="font-size:17px;font-weight:600;margin-bottom:20px;color:#333;">Content Performance</h3>
    <table class="content-table">
      <thead>
        <tr>
          <th class="table-header">Post</th>
          <th class="table-header">Stats</th>
          <th class="table-header">Earning</th>
        </tr>
      </thead>
      <tbody id="content-table-body">
        <tr><td colspan="3" class="empty-state"><h3>No earnings yet</h3><p>Create content and get likes to start earning!</p></td></tr>
      </tbody>
    </table>
  </div>
  
  <div class="withdraw-section">
    <button class="withdraw-btn" id="withdraw-btn" disabled>Withdraw Earnings</button>
    <div class="min-withdraw">Minimum withdrawal: $25.00</div>
  </div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, query, where, onSnapshot, doc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
    authDomain: "cashclique-31718.firebaseapp.com",
    projectId: "cashclique-31718",
    storageBucket: "cashclique-31718.firebasestorage.app",
    messagingSenderId: "1064282591269",
    appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc",
    measurementId: "G-V5WHJB6LS0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const totalBalanceEl = document.getElementById('total-balance');
const totalPostsEl = document.getElementById('total-posts');
const totalLikesEl = document.getElementById('total-likes');
const paidPostsEl = document.getElementById('paid-posts');
const avgEarningEl = document.getElementById('avg-earning');
const contentTableBody = document.getElementById('content-table-body');
const withdrawBtn = document.getElementById('withdraw-btn');

let currentUser = null;
let balance = 0;

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }
    currentUser = user;
    
    loadEarnings();
});

function loadEarnings() {
    // User earnings (you'll populate this in admin panel)
    const userRef = doc(db, "users", currentUser.uid);
    onSnapshot(userRef, (snap) => {
        if (snap.exists()) {
            const data = snap.data();
            balance = data.balance || 0;
            totalBalanceEl.textContent = `$${balance.toFixed(2)}`;
            
            withdrawBtn.disabled = balance < 25;
            withdrawBtn.textContent = `Withdraw $${balance.toFixed(2)}`;
        }
    });

    // User stats
    const postsQuery = query(collection(db, "posts"), where("userId", "==", currentUser.uid));
    let totalLikes = 0;
    let paidPostsCount = 0;
    
    onSnapshot(postsQuery, (postsSnap) => {
        totalPostsEl.textContent = postsSnap.size;
        
        totalLikes = 0;
        paidPostsCount = 0;
        contentTableBody.innerHTML = "";
        
        if (postsSnap.empty) {
            contentTableBody.innerHTML = '<tr><td colspan="3" class="empty-state"><h3>No posts yet</h3><p>Create content to start earning!</p></td></tr>';
            updateStats(0, 0);
            return;
        }
        
        let contentCount = 0;
        postsSnap.docs.forEach((postDoc) => {
            const post = postDoc.data();
            const likes = post.likes || 0;
            const earning = post.earning || 0; // Admin sets this
            
            totalLikes += likes;
            if (earning > 0) paidPostsCount++;
            
            // Add to table
            const row = document.createElement('tr');
            row.className = 'table-row';
            row.onclick = () => window.location.href = `post-view.html?postId=${postDoc.id}`;
            row.innerHTML = `
                <td>
                    <div class="post-preview" style="background:${post.imageBase64 ? `url(${post.imageBase64}) center/cover` : '#ff6a00'};background-size:cover;">
                        ${!post.imageBase64 ? '<div style="color:white;font-size:11px;padding:8px;">' + (post.content?.substring(0,20) || 'Post') + '</div>' : ''}
                    </div>
                    <div class="post-info">
                        <div class="post-title">${post.content?.substring(0, 35)}${post.content?.length > 35 ? '...' : ''}</div>
                    </div>
                </td>
                <td><div class="post-stats"><span>❤️ ${likes}</span><span>💬 12</span></div></td>
                <td class="earning-amount">$${earning.toFixed(2)}</td>
            `;
            contentTableBody.appendChild(row);
            contentCount++;
            
            if (contentCount >= 10) return; // Show top 10
        });
        
        updateStats(totalLikes, paidPostsCount);
    });
}

function updateStats(totalLikes, paidPosts) {
    totalLikesEl.textContent = totalLikes;
    paidPostsEl.textContent = paidPosts;
    
    const avgEarning = balance > 0 && totalPostsEl.textContent > 0 ? 
        (balance / parseInt(totalPostsEl.textContent)).toFixed(2) : 
        '0.00';
    avgEarningEl.textContent = `$${avgEarning}`;
}

// Withdraw button
withdrawBtn.onclick = async () => {
    if (balance < 25) {
        alert('Minimum withdrawal is $25.00');
        return;
    }
    
    if (!confirm(`Withdraw $${balance.toFixed(2)}?`)) return;
    
    try {
        // Update balance to 0 (admin will handle payout)
        await updateDoc(doc(db, "users", currentUser.uid), {
            balance: 0,
            lastWithdrawal: new Date()
        });
        alert('Withdrawal request submitted! Check your email for payout details.');
    } catch (error) {
        console.error('Withdraw failed:', error);
        alert('Failed to process withdrawal.');
    }
};

// Logout
document.getElementById('logout').onclick = async () => {
    await signOut(auth);
    window.location.href = "login.html";
};

// Mobile sidebar toggle
document.querySelector('.back-btn').addEventListener('click', (e) => {
    if (window.innerWidth <= 900) {
        e.stopPropagation();
        document.getElementById('sidebar').classList.toggle('active');
    }
});
</script>
</body>
</html>
