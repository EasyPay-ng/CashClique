<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Post | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px;}
.container{width:100%;max-width:700px;background:white;padding:30px;border-radius:20px;box-shadow:0 15px 30px rgba(0,0,0,0.08);}
header{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;}
header h1{font-size:26px;color:#ff6a00;}
header h1 small{font-size:16px;color:#555;font-weight:400;}
textarea{width:100%;height:150px;padding:15px;font-size:16px;border-radius:12px;border:1px solid #ddd;resize:none;margin-bottom:15px;box-shadow:0 5px 15px rgba(0,0,0,0.05);}
input[type=file]{margin-bottom:15px;}
button{background:#ff6a00;color:white;border:none;padding:12px 25px;font-size:16px;border-radius:12px;cursor:pointer;transition:0.3s;box-shadow:0 5px 15px rgba(0,0,0,0.1);margin-right:10px;display:flex;align-items:center;justify-content:center;}
button:hover{transform:scale(1.05);}
.logout{background:#555;}
.preview{max-width:100%;max-height:400px;margin-bottom:15px;border-radius:12px;object-fit:cover;display:none;}
label{font-weight:500;margin-bottom:8px;display:block;color:#333;}
.spinner{border:3px solid rgba(255,255,255,0.3);border-top:3px solid white;border-radius:50%;width:18px;height:18px;animation:spin 1s linear infinite;margin-left:8px;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
@media(max-width:768px){body{padding:15px;}textarea{height:130px;}}
</style>
</head>

<body>

<div class="container">
<header>
<h1>Create a New Post <small>Share your thoughts or images</small></h1>
<button id="logout" class="logout">Logout</button>
</header>

<label for="post-content">Post Text</label>
<textarea id="post-content" placeholder="Write something amazing..."></textarea>

<label for="post-image">Attach Image (optional)</label>
<input type="file" id="post-image" accept="image/*">
<img id="preview" class="preview">

<button id="post-btn">Post</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
apiKey:"AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
authDomain:"cashclique-31718.firebaseapp.com",
projectId:"cashclique-31718",
storageBucket:"cashclique-31718.firebasestorage.app",
messagingSenderId:"1064282591269",
appId:"1:1064282591269:web:17fbaf9b683d5b0dfbafcc",
measurementId:"G-V5WHJB6LS0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
const postContent = document.getElementById("post-content");
const postImage = document.getElementById("post-image");
const preview = document.getElementById("preview");
const postBtn = document.getElementById("post-btn");

// Ensure user is logged in
onAuthStateChanged(auth, user => {
  if(!user) window.location.href="login.html";
  else currentUser = user;
});

// Image preview
postImage.addEventListener("change", ()=>{
  const file = postImage.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = (e)=>{
      preview.src = e.target.result;
      preview.style.display = "block";
    }
    reader.readAsDataURL(file);
  } else preview.style.display = "none";
});

// Logout
document.getElementById("logout").addEventListener("click",()=>{
  signOut(auth).then(()=>{ window.location.href="login.html"; });
});

// Convert file to Base64
function toBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => {
      const base64 = reader.result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = error => reject(error);
  });
}

// Post button
postBtn.addEventListener("click", async ()=>{
  const text = postContent.value.trim();
  const file = postImage.files[0];

  if(!text && !file){ alert("Please write something or select an image."); return; }

  postBtn.disabled = true;
  const originalText = postBtn.innerHTML;
  postBtn.innerHTML = 'Posting <div class="spinner"></div>';

  let imageURL = null;

  if(file){
    try{
      const base64 = await toBase64(file);

      const res = await fetch("https://api.imgur.com/3/image",{
        method:"POST",
        headers:{
          Authorization:"Client-ID fb5333db21a59486",
          Accept:"application/json"
        },
        body: JSON.stringify({ image: base64, type: "base64" })
      });

      const data = await res.json();
      if(data.success) imageURL = data.data.link;
      else { throw new Error(data.data.error); }
    } catch(e){
      console.error(e);
      alert("Image upload error: "+e.message);
      postBtn.disabled = false;
      postBtn.innerHTML = originalText;
      return;
    }
  }

  try{
    await addDoc(collection(db,"posts"),{
      userId: currentUser.uid,
      username: currentUser.email,
      content: text,
      imageURL: imageURL,
      likes:0,
      timestamp: serverTimestamp()
    });

    // Redirect to dashboard
    window.location.href="dashboard.html";
  } catch(e){
    console.error(e);
    alert("Failed to post. Try again.");
    postBtn.disabled = false;
    postBtn.innerHTML = originalText;
  }
});
</script>

</body>
</html>
