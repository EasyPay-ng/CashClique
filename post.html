<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Post | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
  min-height: 100vh;
  padding: 0;
}

/* Mobile Header */
.mobile-header {
  display: none;
  background: #ff6a00;
  color: white;
  padding: 15px 20px;
  align-items: center;
  gap: 15px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.mobile-header h1 {
  font-size: 18px;
  font-weight: 600;
  flex: 1;
}

.menu-btn {
  background: none;
  border: none;
  color: white;
  font-size: 24px;
  cursor: pointer;
  padding: 5px;
}

/* Sidebar */
.sidebar {
  width: 240px;
  background: #ff6a00;
  color: white;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  position: fixed;
  height: 100%;
  z-index: 999;
  transition: 0.3s;
  transform: translateX(0);
}

.sidebar img {
  width: 45px;
  border-radius: 10px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  font-size: 18px;
  margin-bottom: 10px;
}

.sidebar a {
  color: white;
  text-decoration: none;
  padding: 12px 15px;
  border-radius: 8px;
  transition: 0.3s;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar a:hover,
.sidebar a.active {
  background: rgba(255, 255, 255, 0.2);
}

/* Main Content */
.main {
  margin-left: 240px;
  padding: 20px;
  transition: 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 600px;
  background: white;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
  overflow: hidden;
  animation: slideUp 0.4s ease;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Header */
.header {
  background: linear-gradient(135deg, #ff6a00, #ff8a00);
  color: white;
  padding: 25px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h1 {
  font-size: 22px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}

.header .subtitle {
  font-size: 13px;
  opacity: 0.9;
  font-weight: 400;
  margin-top: 4px;
}

.logout-btn {
  background: rgba(255, 255, 255, 0.2);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s;
  backdrop-filter: blur(10px);
}

.logout-btn:hover {
  background: rgba(255, 255, 255, 0.3);
  transform: translateY(-1px);
}

/* Form */
.form-container {
  padding: 30px;
}

.form-group {
  margin-bottom: 25px;
}

label {
  display: block;
  margin-bottom: 10px;
  font-weight: 600;
  color: #333;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

textarea {
  width: 100%;
  min-height: 150px;
  padding: 18px;
  border: 2px solid #e0e0e0;
  border-radius: 12px;
  font-size: 15px;
  line-height: 1.6;
  resize: vertical;
  transition: all 0.3s;
  font-family: 'Poppins', sans-serif;
  background: #fafafa;
}

textarea:focus {
  outline: none;
  border-color: #ff6a00;
  box-shadow: 0 0 0 4px rgba(255, 106, 0, 0.1);
  background: white;
}

textarea::placeholder {
  color: #aaa;
  font-style: italic;
}

/* Image Upload */
.image-upload {
  position: relative;
  border: 2px dashed #ddd;
  border-radius: 12px;
  padding: 30px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  background: #fafafa;
}

.image-upload:hover {
  border-color: #ff6a00;
  background: rgba(255, 106, 0, 0.05);
}

.image-upload input[type="file"] {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  opacity: 0;
  cursor: pointer;
}

.upload-icon {
  font-size: 48px;
  color: #ff6a00;
  margin-bottom: 10px;
  display: block;
}

.upload-text {
  color: #666;
  font-size: 14px;
  margin-bottom: 5px;
}

.upload-hint {
  color: #999;
  font-size: 12px;
}

/* Image Preview */
.image-preview {
  position: relative;
  max-width: 100%;
  max-height: 300px;
  margin-top: 20px;
  border-radius: 12px;
  overflow: hidden;
  display: none;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
}

.image-preview img {
  width: 100%;
  height: auto;
  max-height: 300px;
  object-fit: contain;
  display: block;
}

.remove-image {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0, 0, 0, 0.7);
  color: white;
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.remove-image:hover {
  background: rgba(0, 0, 0, 0.9);
  transform: scale(1.1);
}

/* Buttons */
.button-group {
  display: flex;
  gap: 12px;
  margin-top: 30px;
}

.post-btn,
.cancel-btn {
  flex: 1;
  padding: 16px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.post-btn {
  background: linear-gradient(135deg, #ff6a00, #ff8a00);
  color: white;
  box-shadow: 0 6px 20px rgba(255, 106, 0, 0.3);
}

.post-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(255, 106, 0, 0.4);
}

.post-btn:active {
  transform: translateY(0);
}

.post-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.cancel-btn {
  background: #f5f5f5;
  color: #666;
  border: 2px solid #e0e0e0;
}

.cancel-btn:hover {
  background: #eee;
  border-color: #ddd;
}

/* Character Count */
.char-count {
  text-align: right;
  font-size: 12px;
  color: #999;
  margin-top: 5px;
}

.char-count.warning {
  color: #ff6a00;
}

.char-count.error {
  color: #f44336;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #333;
  color: white;
  padding: 15px 25px;
  border-radius: 50px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 1000;
  opacity: 0;
  transition: all 0.3s ease;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

.toast.success {
  background: linear-gradient(135deg, #4caf50, #66bb6a);
}

.toast.error {
  background: linear-gradient(135deg, #f44336, #ef5350);
}

/* Responsive */
@media (max-width: 900px) {
  .mobile-header {
    display: flex;
  }
  
  .sidebar {
    transform: translateX(-100%);
  }
  
  .sidebar.active {
    transform: translateX(0);
  }
  
  .main {
    margin-left: 0;
    padding: 10px;
    padding-top: 70px;
  }
  
  .container {
    border-radius: 16px;
    max-width: 100%;
  }
  
  .header {
    padding: 20px;
    flex-direction: column;
    gap: 15px;
    text-align: center;
  }
  
  .header h1 {
    font-size: 20px;
    justify-content: center;
  }
  
  .form-container {
    padding: 20px;
  }
  
  textarea {
    min-height: 120px;
    padding: 15px;
    font-size: 16px; /* Prevents zoom on iOS */
  }
  
  .image-upload {
    padding: 25px 15px;
  }
  
  .upload-icon {
    font-size: 36px;
  }
  
  .button-group {
    flex-direction: column;
    gap: 10px;
  }
  
  .post-btn,
  .cancel-btn {
    width: 100%;
  }
  
  .image-preview {
    max-height: 250px;
  }
}

@media (max-width: 480px) {
  .header h1 {
    font-size: 18px;
  }
  
  .upload-text {
    font-size: 13px;
  }
  
  textarea {
    min-height: 100px;
    font-size: 16px;
  }
}
</style>
</head>

<body>

<!-- Mobile Header -->
<div class="mobile-header">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  <h1>Create Post</h1>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="logo">
    <img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
    CashClique
  </div>
  <a href="dashboard.html">🏠 Dashboard</a>
  <a href="my-content.html">📝 My Content</a>
  <a href="earnings.html">💰 Earnings</a>
  <a href="opportunities.html">🔥 Opportunities</a>
  <a href="settings.html">⚙ Settings</a>
  <a href="#" id="logout">🚪 Logout</a>
</div>

<!-- Main Content -->
<div class="main">
  <div class="container">
    <div class="header">
      <div>
        <h1>✨ Create Post</h1>
        <div class="subtitle">Share your thoughts with the community</div>
      </div>
      <button class="logout-btn" id="logout">Logout</button>
    </div>

    <div class="form-container">
      <div class="form-group">
        <label for="post-content">What's on your mind?</label>
        <textarea 
          id="post-content" 
          placeholder="Write something amazing... (minimum 10 characters)"
          maxlength="500"
        ></textarea>
        <div class="char-count" id="char-count">0 / 500</div>
      </div>

      <div class="form-group">
        <label>Add Image (optional)</label>
        <div class="image-upload" id="image-upload-area">
          <input type="file" id="post-image" accept="image/*">
          <span class="upload-icon">📷</span>
          <div class="upload-text">Click to upload image</div>
          <div class="upload-hint">JPG, PNG, GIF (max 5MB)</div>
        </div>
        
        <div class="image-preview" id="image-preview">
          <img id="preview-img" src="" alt="Preview">
          <button class="remove-image" id="remove-image">×</button>
        </div>
      </div>

      <div class="button-group">
        <button class="cancel-btn" onclick="window.history.back()">Cancel</button>
        <button class="post-btn" id="post-btn">
          <span>Publish Post</span>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  serverTimestamp, 
  doc, 
  getDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
  authDomain: "cashclique-31718.firebaseapp.com",
  projectId: "cashclique-31718",
  storageBucket: "cashclique-31718.firebasestorage.app",
  messagingSenderId: "1064282591269",
  appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// DOM Elements
const postContent = document.getElementById("post-content");
const postImage = document.getElementById("post-image");
const preview = document.getElementById("preview-img");
const previewContainer = document.getElementById("image-preview");
const removeImageBtn = document.getElementById("remove-image");
const postBtn = document.getElementById("post-btn");
const charCount = document.getElementById("char-count");
const toast = document.getElementById("toast");
const imageUploadArea = document.getElementById("image-upload-area");

let currentUser = null;
let selectedImageBase64 = null;

// Auth check
onAuthStateChanged(auth, user => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }
  currentUser = user;
});

// Character counter
postContent.addEventListener("input", () => {
  const length = postContent.value.length;
  charCount.textContent = `${length} / 500`;
  
  charCount.classList.remove('warning', 'error');
  if (length > 450) {
    charCount.classList.add('error');
  } else if (length > 400) {
    charCount.classList.add('warning');
  }
});

// Image preview
postImage.addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  
  // Validate file size (5MB max)
  if (file.size > 5 * 1024 * 1024) {
    showToast("Image too large! Max 5MB", "error");
    postImage.value = "";
    return;
  }
  
  // Validate file type
  if (!file.type.match('image.*')) {
    showToast("Please select an image file", "error");
    postImage.value = "";
    return;
  }
  
  try {
    selectedImageBase64 = await fileToBase64(file);
    preview.src = selectedImageBase64;
    previewContainer.style.display = "block";
    imageUploadArea.style.borderStyle = "solid";
    imageUploadArea.style.borderColor = "#ff6a00";
  } catch (error) {
    console.error("Image error:", error);
    showToast("Failed to load image", "error");
  }
});

// Remove image
removeImageBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  postImage.value = "";
  selectedImageBase64 = null;
  previewContainer.style.display = "none";
  imageUploadArea.style.borderStyle = "dashed";
  imageUploadArea.style.borderColor = "#ddd";
});

// Prevent drag/drop on upload area (optional enhancement)
imageUploadArea.addEventListener("dragover", (e) => {
  e.preventDefault();
  imageUploadArea.style.borderColor = "#ff6a00";
  imageUploadArea.style.background = "rgba(255, 106, 0, 0.05)";
});

imageUploadArea.addEventListener("dragleave", (e) => {
  e.preventDefault();
  imageUploadArea.style.borderColor = "#ddd";
  imageUploadArea.style.background = "#fafafa";
});

imageUploadArea.addEventListener("drop", async (e) => {
  e.preventDefault();
  imageUploadArea.style.borderColor = "#ddd";
  imageUploadArea.style.background = "#fafafa";
  
  const file = e.dataTransfer.files[0];
  if (file && file.type.match('image.*')) {
    postImage.files = e.dataTransfer.files;
    const event = new Event("change", { bubbles: true });
    postImage.dispatchEvent(event);
  }
});

// Convert file to Base64
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

// Post button
postBtn.addEventListener("click", async () => {
  const text = postContent.value.trim();
  
  // Validation
  if (!text && !selectedImageBase64) {
    showToast("Please write something or add an image", "error");
    return;
  }
  
  if (text.length < 10) {
    showToast("Post must be at least 10 characters", "error");
    return;
  }
  
  // Show loading state
  postBtn.disabled = true;
  const originalText = postBtn.innerHTML;
  postBtn.innerHTML = `<div class="spinner" style="display:inline-block;vertical-align:middle;margin-right:8px;"></div> Posting...`;
  
  try {
    // Get username from users collection
    const userRef = doc(db, "users", currentUser.uid);
    const userSnap = await getDoc(userRef);
    let username = currentUser.email?.split('@')[0] || "User";
    
    if (userSnap.exists()) {
      username = userSnap.data().username || username;
    }
    
    // Create post
    await addDoc(collection(db, "posts"), {
      userId: currentUser.uid,
      username: username,
      content: text,
      imageBase64: selectedImageBase64 || null,
      likes: 0,
      likedBy: [],
      commentCount: 0,
      timestamp: serverTimestamp()
    });
    
    showToast("✅ Post published successfully!", "success");
    
    // Redirect after delay
    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1000);
    
  } catch (error) {
    console.error("Post error:", error);
    showToast("Failed to post. Please try again.", "error");
    postBtn.disabled = false;
    postBtn.innerHTML = originalText;
  }
});

// Logout
document.getElementById("logout").addEventListener("click", async (e) => {
  e.preventDefault();
  await signOut(auth);
  window.location.href = "login.html";
});

// Toast notification
function showToast(message, type = "success") {
  toast.textContent = message;
  toast.className = `toast ${type}`;
  toast.classList.add("show");
  
  setTimeout(() => {
    toast.classList.remove("show");
  }, 3000);
}

// Prevent form submission on Enter (except in textarea)
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey && document.activeElement !== postContent) {
    e.preventDefault();
  }
});

// Mobile menu toggle
window.toggleMenu = function() {
  document.getElementById('sidebar').classList.toggle('active');
};

// Close sidebar when clicking outside on mobile
document.addEventListener('click', (e) => {
  if (window.innerWidth <= 900) {
    const sidebar = document.getElementById('sidebar');
    const menuBtn = document.querySelector('.menu-btn');
    if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
      sidebar.classList.remove('active');
    }
  }
});
</script>

</body>
</html>
