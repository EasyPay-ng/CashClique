<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Post | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%); min-height: 100vh; padding: 0; }

.mobile-header { display: none; background: #ff6a00; color: white; padding: 15px 20px; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 100; }
.mobile-header h1 { font-size: 18px; font-weight: 600; flex: 1; }
.menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 5px; }

.sidebar { width: 240px; background: #ff6a00; color: white; padding: 20px; display: flex; flex-direction: column; gap: 20px; position: fixed; height: 100%; z-index: 999; transition: 0.3s; transform: translateX(0); }
.sidebar img { width: 45px; border-radius: 10px; }
.logo { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 18px; margin-bottom: 10px; }
.sidebar a { color: white; text-decoration: none; padding: 12px 15px; border-radius: 8px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
.sidebar a:hover, .sidebar a.active { background: rgba(255, 255, 255, 0.2); }

.main { margin-left: 240px; padding: 20px; transition: 0.3s; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.container { width: 100%; max-width: 600px; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1); overflow: hidden; animation: slideUp 0.4s ease; }

@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

.header { background: linear-gradient(135deg, #ff6a00, #ff8a00); color: white; padding: 25px 30px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
.header .subtitle { font-size: 13px; opacity: 0.9; font-weight: 400; margin-top: 4px; }
.logout-btn { background: rgba(255, 255, 255, 0.2); border: none; color: white; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.3s; backdrop-filter: blur(10px); }
.logout-btn:hover { background: rgba(255, 255, 255, 0.3); transform: translateY(-1px); }

.form-container { padding: 30px; }
.form-group { margin-bottom: 25px; }
label { display: block; margin-bottom: 10px; font-weight: 600; color: #333; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Searchable Dropdown */
.category-dropdown { position: relative; }
.category-input-wrapper { position: relative; }
.category-input { width: 100%; padding: 15px 45px 15px 18px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 15px; cursor: pointer; transition: all 0.3s; background: #fafafa; display: flex; align-items: center; gap: 10px; }
.category-input:hover { border-color: #ff6a00; }
.category-input.active { border-color: #ff6a00; box-shadow: 0 0 0 4px rgba(255, 106, 0, 0.1); background: white; }
.category-input-text { flex: 1; color: #999; }
.category-input-text.selected { color: #333; }
.category-input-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); transition: transform 0.3s; font-size: 12px; color: #999; }
.category-input.active .category-input-icon { transform: translateY(-50%) rotate(180deg); }
.category-dropdown-menu { position: absolute; top: 100%; left: 0; right: 0; margin-top: 8px; background: white; border: 2px solid #e0e0e0; border-radius: 12px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15); max-height: 320px; overflow: hidden; z-index: 100; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.2s ease; }
.category-dropdown-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }
.category-search { padding: 12px 15px; border-bottom: 1px solid #f0f0f0; }
.category-search input { width: 100%; padding: 10px 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; transition: all 0.3s; }
.category-search input:focus { border-color: #ff6a00; }
.category-list { max-height: 220px; overflow-y: auto; }
.category-item { padding: 12px 18px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s; border-bottom: 1px solid #f5f5f5; }
.category-item:hover { background: #fff7ed; }
.category-item.selected { background: linear-gradient(135deg, #fff7ed, #ffedd5); }
.category-item-icon { font-size: 20px; width: 30px; text-align: center; }
.category-item-text { flex: 1; font-size: 14px; color: #333; }
.category-item-check { color: #ff6a00; opacity: 0; font-weight: bold; }
.category-item.selected .category-item-check { opacity: 1; }
.category-no-results { padding: 20px; text-align: center; color: #999; font-size: 14px; }
.category-list::-webkit-scrollbar { width: 6px; }
.category-list::-webkit-scrollbar-track { background: #f5f5f5; border-radius: 3px; }
.category-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
.category-list::-webkit-scrollbar-thumb:hover { background: #ccc; }

/* Selected Category Display */
.selected-category { background: linear-gradient(135deg, #fff7ed, #ffedd5); border: 2px solid #ff6a00; border-radius: 12px; padding: 12px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-weight: 600; color: #9a3412; font-size: 14px; }
.selected-category.hidden { display: none; }

/* Textarea */
textarea { width: 100%; min-height: 150px; padding: 18px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 15px; line-height: 1.6; resize: vertical; transition: all 0.3s; font-family: 'Poppins', sans-serif; background: #fafafa; }
textarea:focus { outline: none; border-color: #ff6a00; box-shadow: 0 0 0 4px rgba(255, 106, 0, 0.1); background: white; }
textarea::placeholder { color: #aaa; font-style: italic; }

/* Media Upload Section */
.media-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
.media-tab { flex: 1; padding: 12px; background: #f5f5f5; border: 2px solid transparent; border-radius: 12px; font-size: 14px; font-weight: 600; color: #64748b; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.media-tab:hover { background: #fff7ed; color: #ff6a00; }
.media-tab.active { background: white; border-color: #ff6a00; color: #ff6a00; }

/* Image Upload */
.image-upload { position: relative; border: 2px dashed #ddd; border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.3s; background: #fafafa; }
.image-upload:hover { border-color: #ff6a00; background: rgba(255, 106, 0, 0.05); }
.image-upload input[type="file"] { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
.upload-icon { font-size: 48px; color: #ff6a00; margin-bottom: 10px; display: block; }
.upload-text { color: #666; font-size: 14px; margin-bottom: 5px; }
.upload-hint { color: #999; font-size: 12px; }

/* Video Upload */
.video-upload { position: relative; border: 2px dashed #ddd; border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.3s; background: #fafafa; }
.video-upload:hover { border-color: #ff6a00; background: rgba(255, 106, 0, 0.05); }
.video-upload input[type="file"] { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
.video-upload.uploading { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); pointer-events: none; }
.video-progress-bar { width: 100%; height: 6px; background: #e0e0e0; border-radius: 3px; margin-top: 15px; overflow: hidden; display: none; }
.video-progress-bar.active { display: block; }
.video-progress-fill { height: 100%; background: linear-gradient(90deg, #ff6a00, #ff8a00); width: 0%; transition: width 0.3s; }
.video-progress-text { font-size: 12px; color: #666; margin-top: 8px; }

/* Previews */
.image-preview, .video-info { position: relative; max-width: 100%; margin-top: 20px; border-radius: 12px; overflow: hidden; display: none; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1); }
.image-preview img { width: 100%; height: auto; max-height: 300px; object-fit: contain; display: block; }
.video-info video { width: 100%; max-height: 300px; display: block; }
.remove-image, .remove-video { position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.7); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
.remove-image:hover, .remove-video:hover { background: rgba(0, 0, 0, 0.9); }

/* Buttons */
.button-group { display: flex; gap: 12px; margin-top: 30px; }
.post-btn, .cancel-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.post-btn { background: linear-gradient(135deg, #ff6a00, #ff8a00); color: white; box-shadow: 0 6px 20px rgba(255, 106, 0, 0.3); }
.post-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255, 106, 0, 0.4); }
.post-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
.cancel-btn { background: #f5f5f5; color: #666; border: 2px solid #e0e0e0; }
.cancel-btn:hover { background: #eee; border-color: #ddd; }

.char-count { text-align: right; font-size: 12px; color: #999; margin-top: 5px; }
.char-count.warning { color: #ff6a00; }
.char-count.error { color: #f44336; }

/* Toast */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 15px 25px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); display: flex; align-items: center; gap: 10px; z-index: 1000; opacity: 0; transition: all 0.3s ease; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.success { background: linear-gradient(135deg, #4caf50, #66bb6a); }
.toast.error { background: linear-gradient(135deg, #f44336, #ef5350); }

/* Responsive */
@media (max-width: 900px) {
  .mobile-header { display: flex; }
  .sidebar { transform: translateX(-100%); }
  .sidebar.active { transform: translateX(0); }
  .main { margin-left: 0; padding: 10px; padding-top: 70px; }
  .container { border-radius: 16px; max-width: 100%; }
  .header { padding: 20px; flex-direction: column; gap: 15px; text-align: center; }
  .header h1 { font-size: 20px; justify-content: center; }
  .form-container { padding: 20px; }
  .category-dropdown-menu { max-height: 280px; }
  .category-list { max-height: 180px; }
  textarea { min-height: 120px; padding: 15px; font-size: 16px; }
  .image-upload, .video-upload { padding: 25px 15px; }
  .upload-icon { font-size: 36px; }
  .button-group { flex-direction: column; gap: 10px; }
  .post-btn, .cancel-btn { width: 100%; }
}
</style>
</head>

<body>

<div class="mobile-header">
  <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
  <h1>Create Post</h1>
</div>

<div class="sidebar" id="sidebar">
  <div class="logo">
    <img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
    CashClique
  </div>
  <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
  <a href="my-content.html"><i class="fas fa-file-alt"></i> My Content</a>
  <a href="earnings.html"><i class="fas fa-dollar-sign"></i> Earnings</a>
  <a href="opportunities.html"><i class="fas fa-fire"></i> Opportunities</a>

  <a href="#" id="sidebar-logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<div class="main">
  <div class="container">
    <div class="header">
      <div>
        <h1><i class="fas fa-plus-circle"></i> Create Post</h1>
        <div class="subtitle">Share your thoughts with the community</div>
      </div>
      <button class="logout-btn" id="header-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <div class="form-container">
      <!-- Category Selection -->
      <div class="form-group">
        <label>Select Category <span style="color:#ef4444">*</span></label>
        <div class="selected-category hidden" id="selected-category-display">
          <i class="fas fa-folder-open" id="selected-cat-icon"></i>
          <span id="selected-cat-text">No category selected</span>
        </div>
        
        <!-- Searchable Dropdown -->
        <div class="category-dropdown" id="category-dropdown">
          <div class="category-input-wrapper">
            <div class="category-input" id="category-input" onclick="toggleCategoryDropdown()">
              <span class="category-input-text" id="category-placeholder"><i class="fas fa-search"></i> Search or select category...</span>
              <span class="category-input-icon"><i class="fas fa-chevron-down"></i></span>
            </div>
          </div>
          <div class="category-dropdown-menu" id="category-dropdown-menu">
            <div class="category-search">
              <input type="text" id="category-search-input" placeholder="Type to search categories..." oninput="filterCategories(this.value)">
            </div>
            <div class="category-list" id="category-list">
              <!-- Categories populated by JS -->
            </div>
          </div>
        </div>

      <!-- Content -->
      <div class="form-group">
        <label for="post-content"><i class="fas fa-pen"></i> What's on your mind?</label>
        <textarea id="post-content" placeholder="Write something amazing... (minimum 10 characters)" maxlength="500"></textarea>
        <div class="char-count" id="char-count">0 / 500</div>
      </div>

      <!-- Media Upload -->
      <div class="form-group">
        <label><i class="fas fa-image"></i> Add Media (optional)</label>
        
        <!-- Tabs -->
        <div class="media-tabs">
          <button type="button" class="media-tab active" onclick="switchMediaTab('image')">
            <i class="fas fa-image"></i> Image
          </button>
          <button type="button" class="media-tab" onclick="switchMediaTab('video')">
            <i class="fas fa-video"></i> Video
          </button>
        </div>

        <!-- Image Upload -->
        <div id="image-upload-section">
          <div class="image-upload" id="image-upload-area">
            <input type="file" id="post-image" accept="image/*">
            <i class="fas fa-cloud-upload-alt upload-icon"></i>
            <div class="upload-text">Click to upload image</div>
            <div class="upload-hint">JPG, PNG, GIF (max 5MB)</div>
          </div>
          <div class="image-preview" id="image-preview">
            <img id="preview-img" src="" alt="Preview">
            <button class="remove-image" id="remove-image"><i class="fas fa-times"></i> Remove</button>
          </div>
        </div>

        <!-- Video Upload -->
        <div id="video-upload-section" style="display:none;">
          <div class="video-upload" id="video-upload-area">
            <input type="file" id="post-video" accept="video/mp4,video/mov,video/webm">
            <i class="fas fa-cloud-upload-alt upload-icon"></i>
            <div class="upload-text">Click to upload video</div>
            <div class="upload-hint">MP4, MOV, WEBM (max 100MB)</div>
            <div class="video-progress-bar" id="video-progress-bar">
              <div class="video-progress-fill" id="video-progress-fill"></div>
            </div>
            <div class="video-progress-text" id="video-progress-text"></div>
          </div>
          <div class="video-info" id="video-info">
            <video id="video-preview" controls></video>
            <button class="remove-video" id="remove-video"><i class="fas fa-times"></i> Remove Video</button>
          </div>
          <input type="hidden" id="video-url">
        </div>
      </div>

      <div class="button-group">
        <button class="cancel-btn" onclick="window.history.back()"><i class="fas fa-arrow-left"></i> Cancel</button>
        <button class="post-btn" id="post-btn">
          <i class="fas fa-paper-plane"></i> <span>Publish Post</span>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
  authDomain: "cashclique-31718.firebaseapp.com",
  projectId: "cashclique-31718",
  storageBucket: "cashclique-31718.firebasestorage.app",
  messagingSenderId: "1064282591269",
  appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// Categories
const CATEGORIES = [
  { name: 'Comedy', icon: 'fa-laugh-beam' },
  { name: 'Sports', icon: 'fa-futbol' },
  { name: 'Anime', icon: 'fa-dragon' },
  { name: 'Comics', icon: 'fa-book-open' },
  { name: 'Relationship', icon: 'fa-heart' },
  { name: 'Showcasing', icon: 'fa-star' },
  { name: 'Daily Life', icon: 'fa-calendar-day' },
  { name: 'Beauty', icon: 'fa-magic' },
  { name: 'Games', icon: 'fa-gamepad' },
  { name: 'Society', icon: 'fa-landmark' },
  { name: 'Outfit', icon: 'fa-tshirt' },
  { name: 'Cars', icon: 'fa-car' },
  { name: 'Food', icon: 'fa-utensils' },
  { name: 'Animals', icon: 'fa-paw' },
  { name: 'Family', icon: 'fa-users' },
  { name: 'Drama', icon: 'fa-theater-masks' },
  { name: 'Fitness & Health', icon: 'fa-dumbbell' },
  { name: 'Education', icon: 'fa-graduation-cap' },
  { name: 'Technology', icon: 'fa-laptop-code' }
];

let currentUser = null;
let selectedCategory = null;
let selectedImageBase64 = null;
let videoDownloadUrl = null;
let uploadTask = null;
let isDropdownOpen = false;

// Initialize
function init() {
  renderCategories(CATEGORIES);
  
  document.addEventListener('click', (e) => {
    const dropdown = document.getElementById('category-dropdown');
    if (!dropdown.contains(e.target) && isDropdownOpen) {
      closeCategoryDropdown();
    }
  });

  onAuthStateChanged(auth, user => {
    if (!user) return window.location.href = "login.html";
    currentUser = user;
  });
}

function renderCategories(categories) {
  const list = document.getElementById('category-list');
  list.innerHTML = '';
  
  if (categories.length === 0) {
    list.innerHTML = '<div class="category-no-results"><i class="fas fa-search"></i> No categories found</div>';
    return;
  }
  
  categories.forEach(cat => {
    const item = document.createElement('div');
    item.className = 'category-item';
    if (selectedCategory && selectedCategory.name === cat.name) {
      item.classList.add('selected');
    }
    item.innerHTML = `
      <span class="category-item-icon"><i class="fas ${cat.icon}"></i></span>
      <span class="category-item-text">${cat.name}</span>
      <span class="category-item-check"><i class="fas fa-check"></i></span>
    `;
    item.onclick = () => selectCategory(cat);
    list.appendChild(item);
  });
}

window.toggleCategoryDropdown = function() {
  if (isDropdownOpen) {
    closeCategoryDropdown();
  } else {
    openCategoryDropdown();
  }
};

function openCategoryDropdown() {
  isDropdownOpen = true;
  document.getElementById('category-input').classList.add('active');
  document.getElementById('category-dropdown-menu').classList.add('show');
  document.getElementById('category-search-input').focus();
}

function closeCategoryDropdown() {
  isDropdownOpen = false;
  document.getElementById('category-input').classList.remove('active');
  document.getElementById('category-dropdown-menu').classList.remove('show');
  document.getElementById('category-search-input').value = '';
  filterCategories('');
}

window.filterCategories = function(searchTerm) {
  const filtered = CATEGORIES.filter(cat => 
    cat.name.toLowerCase().includes(searchTerm.toLowerCase())
  );
  renderCategories(filtered);
};

function selectCategory(cat) {
  selectedCategory = cat;
  
  const placeholder = document.getElementById('category-placeholder');
  placeholder.innerHTML = `<i class="fas ${cat.icon}"></i> ${cat.name}`;
  placeholder.classList.add('selected');
  
  document.getElementById('selected-category-display').classList.remove('hidden');
  document.getElementById('selected-cat-icon').className = `fas ${cat.icon}`;
  document.getElementById('selected-cat-text').textContent = cat.name;
  
  const searchTerm = document.getElementById('category-search-input').value;
  filterCategories(searchTerm);
  
  closeCategoryDropdown();
}

window.switchMediaTab = function(type) {
  document.querySelectorAll('.media-tab').forEach(t => t.classList.remove('active'));
  event.target.closest('.media-tab').classList.add('active');
  
  if (type === 'image') {
    document.getElementById('image-upload-section').style.display = 'block';
    document.getElementById('video-upload-section').style.display = 'none';
  } else {
    document.getElementById('image-upload-section').style.display = 'none';
    document.getElementById('video-upload-section').style.display = 'block';
  }
};

// Image Handling
document.getElementById('post-image').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) return showToast("Image too large! Max 5MB", "error");
  
  selectedImageBase64 = await fileToBase64(file);
  document.getElementById('preview-img').src = selectedImageBase64;
  document.getElementById('image-preview').style.display = 'block';
});

document.getElementById('remove-image').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('post-image').value = '';
  selectedImageBase64 = null;
  document.getElementById('image-preview').style.display = 'none';
});

// ============================================
// FIREBASE STORAGE VIDEO UPLOAD
// ============================================

document.getElementById('post-video').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  
  if (file.size > 100 * 1024 * 1024) {
    showToast("Video too large! Max 100MB", "error");
    return;
  }
  
  const allowedTypes = ['video/mp4', 'video/quicktime', 'video/webm'];
  if (!allowedTypes.includes(file.type)) {
    showToast("Invalid format. Use MP4, MOV, or WEBM", "error");
    return;
  }
  
  const uploadArea = document.getElementById('video-upload-area');
  const progressBar = document.getElementById('video-progress-bar');
  const progressFill = document.getElementById('video-progress-fill');
  const progressText = document.getElementById('video-progress-text');
  
  uploadArea.classList.add('uploading');
  progressBar.classList.add('active');
  
  try {
    showToast("Uploading video...", "success");
    
    // Create storage reference
    const fileName = `videos/${currentUser.uid}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
    const storageRef = ref(storage, fileName);
    
    // Start upload with progress tracking
    uploadTask = uploadBytesResumable(storageRef, file);
    
    uploadTask.on('state_changed',
      (snapshot) => {
        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
        progressFill.style.width = progress + '%';
        progressText.textContent = `Uploading: ${Math.round(progress)}%`;
      },
      (error) => {
        console.error('Upload error:', error);
        showToast("Upload failed: " + error.message, "error");
        uploadArea.classList.remove('uploading');
        progressBar.classList.remove('active');
      },
      async () => {
        // Upload complete, get download URL
        videoDownloadUrl = await getDownloadURL(uploadTask.snapshot.ref);
        document.getElementById('video-url').value = videoDownloadUrl;
        
        // Show preview
        const preview = document.getElementById('video-preview');
        preview.src = URL.createObjectURL(file);
        document.getElementById('video-info').style.display = 'block';
        
        showToast("Video uploaded successfully!", "success");
        uploadArea.classList.remove('uploading');
        progressBar.classList.remove('active');
        progressText.textContent = '';
      }
    );
    
  } catch (error) {
    console.error('Upload error:', error);
    showToast("Upload failed: " + error.message, "error");
    uploadArea.classList.remove('uploading');
    progressBar.classList.remove('active');
  }
});

document.getElementById('remove-video').addEventListener('click', () => {
  // Cancel ongoing upload if exists
  if (uploadTask) {
    uploadTask.cancel();
    uploadTask = null;
  }
  
  videoDownloadUrl = null;
  document.getElementById('post-video').value = '';
  document.getElementById('video-url').value = '';
  document.getElementById('video-info').style.display = 'none';
  document.getElementById('video-progress-fill').style.width = '0%';
  document.getElementById('video-progress-text').textContent = '';
});

// Character count
document.getElementById('post-content').addEventListener('input', function() {
  const len = this.value.length;
  const cc = document.getElementById('char-count');
  cc.textContent = `${len} / 500`;
  cc.className = 'char-count' + (len > 450 ? ' error' : len > 400 ? ' warning' : '');
});

// Post
document.getElementById('post-btn').addEventListener('click', async () => {
  const text = document.getElementById('post-content').value.trim();
  
  if (!selectedCategory) return showToast("Please select a category", "error");
  if (!text && !selectedImageBase64 && !videoDownloadUrl) return showToast("Please add content", "error");
  if (text.length < 10) return showToast("Post must be at least 10 characters", "error");
  
  const btn = document.getElementById('post-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Publishing...';
  
  try {
    const userRef = doc(db, "users", currentUser.uid);
    const userSnap = await getDoc(userRef);
    const username = userSnap.exists() ? (userSnap.data().username || currentUser.email.split('@')[0]) : currentUser.email.split('@')[0];
    
    await addDoc(collection(db, "posts"), {
      userId: currentUser.uid,
      username: username,
      content: text,
      category: selectedCategory.name,
      categoryIcon: selectedCategory.icon,
      imageBase64: selectedImageBase64 || null,
      videoUrl: videoDownloadUrl || null,
      likes: 0,
      likedBy: [],
      commentCount: 0,
      timestamp: serverTimestamp()
    });
    
    showToast("Post published successfully!", "success");
    setTimeout(() => window.location.href = "dashboard.html", 1000);
    
  } catch (err) {
    console.error(err);
    showToast("Failed to post", "error");
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane"></i> <span>Publish Post</span>';
  }
});

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
  });
}

function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${msg}`;
  toast.className = `toast ${type} show`;
  setTimeout(() => toast.classList.remove('show'), 3000);
}

document.getElementById('header-logout').onclick = 
document.getElementById('sidebar-logout').onclick = async (e) => {
  e.preventDefault();
  await signOut(auth);
  window.location.href = "login.html";
};

window.toggleMenu = () => document.getElementById('sidebar').classList.toggle('active');

init();
