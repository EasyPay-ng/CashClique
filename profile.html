<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | CashClique</title>
<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;min-height:100vh;}
.back-btn{position:fixed;top:20px;left:20px;background:#ff6a00;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:500;z-index:100;box-shadow:0 4px 15px rgba(255,106,0,0.3);}
.back-btn:hover{background:#e55d00;}

.profile-container{max-width:600px;margin:0 auto;padding:80px 20px 40px;}

.profile-card{background:white;border-radius:16px;padding:30px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.08);margin-bottom:30px;}
.profile-avatar{width:110px;height:110px;border-radius:50%;border:5px solid #ff6a00;margin-bottom:15px;object-fit:cover;}
.profile-name{font-size:24px;font-weight:600;margin-bottom:6px;}
.profile-bio{color:#555;font-size:14.5px;line-height:1.5;margin-bottom:20px;max-width:90%;margin-left:auto;margin-right:auto;}

.profile-stats{display:flex;justify-content:center;gap:50px;margin:25px 0;}
.stat{text-align:center;}
.stat-num{font-size:24px;font-weight:700;color:#ff6a00;}
.stat-label{font-size:13px;color:#888;text-transform:uppercase;letter-spacing:0.5px;}

.follow-btn{background:#ff6a00;color:white;border:none;padding:13px 45px;border-radius:30px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s;box-shadow:0 5px 15px rgba(255,106,0,0.3);}
.follow-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(255,106,0,0.4);}
.follow-btn.following{background:#333;}
.follow-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

.edit-btn{background:transparent;border:2.5px solid #ff6a00;color:#ff6a00;padding:12px 45px;border-radius:30px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s;}
.edit-btn:hover{background:#ff6a00;color:white;}

.section-title{font-size:17px;font-weight:600;margin:30px 0 15px;color:#222;}

.posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.post-thumb{aspect-ratio:1;background:#eee;border-radius:12px;overflow:hidden;cursor:pointer;transition:0.3s;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
.post-thumb:hover{transform:scale(1.05);box-shadow:0 8px 25px rgba(0,0,0,0.15);}
.post-thumb img{width:100%;height:100%;object-fit:cover;}
.empty-posts{text-align:center;color:#888;padding:50px 20px;background:white;border-radius:16px;font-size:15px;grid-column:1/-1;}
</style>
</head>

<body>

<button class="back-btn" onclick="history.back()">← Back</button>

<div class="profile-container">
    <div class="profile-card">
        <img class="profile-avatar" id="avatar" src="" alt="Avatar">
        <h2 class="profile-name" id="profile-name">Loading...</h2>
        <p class="profile-bio" id="profile-bio">No bio yet</p>
        
        <div class="profile-stats">
            <div class="stat">
                <div class="stat-num" id="posts-count">0</div>
                <div class="stat-label">Posts</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="followers-count">0</div>
                <div class="stat-label">Followers</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="following-count">0</div>
                <div class="stat-label">Following</div>
            </div>
        </div>
        
        <button class="follow-btn" id="action-btn" style="display:none;">Follow</button>
    </div>

    <h3 class="section-title">Posts</h3>
    <div class="posts-grid" id="posts-grid">
        <!-- Posts load here -->
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, query, where, onSnapshot, doc, getDoc, updateDoc, arrayUnion, arrayRemove, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
    authDomain: "cashclique-31718.firebaseapp.com",
    projectId: "cashclique-31718",
    storageBucket: "cashclique-31718.firebasestorage.app",
    messagingSenderId: "1064282591269",
    appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc",
    measurementId: "G-V5WHJB6LS0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
let profileUid = urlParams.get("uid");
let currentUser = null;
let currentUsername = "User";
let isOwnProfile = false;

onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "login.html"; return; }
    currentUser = user;

    const mySnap = await getDoc(doc(db, "users", user.uid));
    if (mySnap.exists()) {
        currentUsername = mySnap.data().username || user.email.split("@")[0];
    }

    if (!profileUid) profileUid = user.uid;
    isOwnProfile = profileUid === user.uid;

    loadProfile();
    loadUserPosts();
});

function loadProfile() {
    const userRef = doc(db, "users", profileUid);
    const unsub = onSnapshot(userRef, (snap) => {
        if (!snap.exists()) {
            document.getElementById("profile-name").innerText = "User not found";
            return;
        }
        const d = snap.data();
        document.getElementById("avatar").src = d.avatar || `https://i.pravatar.cc/300?u=${profileUid}`;
        document.getElementById("profile-name").innerText = d.username || "Anonymous";
        document.getElementById("profile-bio").innerText = d.bio || "No bio yet";
        document.getElementById("followers-count").innerText = (d.followers?.length || 0);
        document.getElementById("following-count").innerText = (d.following?.length || 0);

        const btn = document.getElementById("action-btn");
        btn.style.display = "inline-block";

        if (isOwnProfile) {
            btn.textContent = "Edit Profile";
            btn.className = "edit-btn";
            btn.onclick = () => location.href = "settings.html";
        } else {
            const isFollowing = d.followers?.includes(currentUser.uid) || false;
            btn.textContent = isFollowing ? "Following" : "Follow";
            btn.className = isFollowing ? "follow-btn following" : "follow-btn";
            btn.onclick = () => toggleFollow(isFollowing, d.username);
        }
    });
}

/* 100% WORKING POSTS LOADER – NO INDEX REQUIRED */
function loadUserPosts() {
    const q = query(collection(db, "posts"), where("userId", "==", profileUid));

    onSnapshot(q, (snapshot) => {
        const total = snapshot.size;
        document.getElementById("posts-count").textContent = total;

        const grid = document.getElementById("posts-grid");
        grid.innerHTML = "";

        if (total === 0) {
            grid.innerHTML = `<div class="empty-posts">No posts yet</div>`;
            return;
        }

        // Sort newest first (local sort = no index needed)
        const sorted = snapshot.docs.sort((a, b) => {
            const ta = a.data().timestamp?.seconds || 0;
            const tb = b.data().timestamp?.seconds || 0;
            return tb - ta;
        });

        sorted.forEach(doc => {
            const post = doc.data();
            const div = document.createElement("div");
            div.className = "post-thumb";

            if (post.imageBase64) {
                div.innerHTML = `<img src="${post.imageBase64}" loading="lazy">`;
            } else {
                div.style.background = "#ff6a00";
                div.style.color = "white";
                div.style.display = "flex";
                div.style.alignItems = "center";
                div.style.justifyContent = "center";
                div.style.padding = "10px";
                div.style.fontSize = "13px";
                div.textContent = post.content?.substring(0, 40) || "Post";
            }

            div.onclick = () => location.href = `post-view.html?postId=${doc.id}`;
            grid.appendChild(div);
        });
    }, (err) => {
        console.error("Posts error:", err);
        document.getElementById("posts-grid").innerHTML = `<div class="empty-posts">Failed to load posts</div>`;
    });
}

async function toggleFollow(currentlyFollowing, targetUsername) {
    const btn = document.getElementById("action-btn");
    btn.disabled = true;

    try {
        const profileRef = doc(db, "users", profileUid);
        const myRef = doc(db, "users", currentUser.uid);

        if (currentlyFollowing) {
            await updateDoc(profileRef, { followers: arrayRemove(currentUser.uid) });
            await updateDoc(myRef, { following: arrayRemove(profileUid) });
        } else {
            await updateDoc(profileRef, { followers: arrayUnion(currentUser.uid) });
            await updateDoc(myRef, { following: arrayUnion(profileUid) });

            await addDoc(collection(db, "users", profileUid, "notifications"), {
                type: "follow",
                title: `${currentUsername} started following you`,
                message: "Tap to view profile",
                fromUserId: currentUser.uid,
                fromUsername: currentUsername,
                read: false,
                timestamp: serverTimestamp()
            });
        }
    } catch (e) {
        console.error(e);
        alert("Failed to update follow status");
    }
    btn.disabled = false;
}
</script>
</body>
</html>
