<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | CashClique</title>
<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;min-height:100vh;}
.top-bar{background:#ff6a00;padding:15px 20px;color:white;display:flex;align-items:center;gap:15px;}
.top-bar a{color:white;text-decoration:none;font-size:14px;}
.profile-container{max-width:600px;margin:30px auto;padding:0 20px;}
.profile-card{background:white;border-radius:16px;padding:30px;text-align:center;box-shadow:0 5px 20px rgba(0,0,0,0.08);}
.profile-avatar{width:100px;height:100px;border-radius:50%;margin-bottom:15px;border:3px solid #ff6a00;}
.profile-name{font-size:22px;font-weight:600;margin-bottom:5px;}
.profile-handle{color:#888;font-size:14px;margin-bottom:15px;}
.profile-stats{display:flex;justify-content:center;gap:30px;margin:20px 0;}
.profile-stat{text-align:center;}
.profile-stat .num{font-size:20px;font-weight:600;color:#ff6a00;}
.profile-stat .label{font-size:12px;color:#888;}
.follow-btn{background:#ff6a00;color:white;border:none;padding:10px 40px;border-radius:25px;font-size:15px;cursor:pointer;transition:0.3s;font-family:'Poppins',sans-serif;}
.follow-btn:hover{background:#e05500;}
.follow-btn.following{background:#555;}
.follow-btn.following:hover{background:#444;}
.follow-btn:disabled{opacity:0.6;cursor:not-allowed;}
.user-posts{margin-top:25px;display:flex;flex-direction:column;gap:15px;}
.user-posts h3{text-align:center;color:#333;margin-bottom:10px;}
.post{background:white;padding:20px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.05);}
.post-image{width:100%;border-radius:12px;margin-top:10px;cursor:pointer;}
</style>
</head>
<body>

<div class="top-bar">
    <a href="dashboard.html">← Back to Dashboard</a>
</div>

<div class="profile-container">
    <div class="profile-card">
        <img class="profile-avatar" id="profile-avatar" src="https://i.pravatar.cc/150?img=3">
        <div class="profile-name" id="profile-name">Loading...</div>
        <div class="profile-handle" id="profile-handle">@username</div>

        <div class="profile-stats">
            <div class="profile-stat"><div class="num" id="post-count">—</div><div class="label">Posts</div></div>
            <div class="profile-stat"><div class="num" id="follower-count">—</div><div class="label">Followers</div></div>
            <div class="profile-stat"><div class="num" id="following-count">—</div><div class="label">Following</div></div>
        </div>

        <button class="follow-btn" id="follow-btn" disabled>Follow</button>
    </div>

    <div class="user-posts" id="user-posts">
        <h3>Recent Posts</h3>
        <!-- Posts will be inserted here -->
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, doc, onSnapshot, updateDoc, increment, serverTimestamp, query, orderBy, addDoc, arrayUnion, arrayRemove, getDoc, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey:"AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
    authDomain:"cashclique-31718.firebaseapp.com",
    projectId:"cashclique-31718",
    storageBucket:"cashclique-31718.firebasestorage.app",
    messagingSenderId:"1064282591269",
    appId:"1:1064282591269:web:17fbaf9b683d5b0dfbafcc",
    measurementId:"G-V5WHJB6LS0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const profileUid = urlParams.get("uid");
if (!profileUid) {
    document.querySelector(".profile-container").innerHTML = "<p style='text-align:center;margin-top:50px;'>No user specified.</p>";
}

onAuthStateChanged(auth, async (currentUser) => {
    if (!currentUser) { window.location.href = "login.html"; return; }

    let currentUsername = "User";
    const meDoc = await getDoc(doc(db, "users", currentUser.uid));
    if (meDoc.exists()) {
        currentUsername = meDoc.data().username || meDoc.data().displayName || currentUser.email?.split('@')[0] || "User";
    }

    // Load profile user data
    const profileRef = doc(db, "users", profileUid);
    onSnapshot(profileRef, (snap) => {
        if (!snap.exists()) {
            document.querySelector(".profile-container").innerHTML = "<p style='text-align:center;margin-top:50px;'>User not found.</p>";
            return;
        }
        const data = snap.data();
        document.getElementById("profile-name").innerText = data.username || data.displayName || "User";
        document.getElementById("profile-handle").innerText = "@" + (data.username || "user");
        document.getElementById("profile-avatar").src = data.avatar || `https://i.pravatar.cc/150?u=${profileUid}`;
        document.getElementById("follower-count").innerText = data.followersCount || 0;
        document.getElementById("following-count").innerText = data.followingCount || 0;
    });

    // Check follow status
    if (profileUid === currentUser.uid) {
        const btn = document.getElementById("follow-btn");
        btn.innerText = "This is You";
        btn.disabled = true;
        btn.style.background = "#999";
    } else {
        const myRef = doc(db, "users", currentUser.uid);
        onSnapshot(myRef, (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            const isFollowing = data.following && data.following.includes(profileUid);
            const btn = document.getElementById("follow-btn");
            btn.innerText = isFollowing ? "Unfollow" : "Follow";
            btn.className = isFollowing ? "follow-btn following" : "follow-btn";
            btn.disabled = false;
        });
    }

    // FOLLOW / UNFOLLOW BUTTON
    document.getElementById("follow-btn").addEventListener("click", async () => {
        const btn = document.getElementById("follow-btn");
        btn.disabled = true;

        const myRef = doc(db, "users", currentUser.uid);
        const theirRef = doc(db, "users", profileUid);
        const mySnap = await getDoc(myRef);
        const isFollowing = mySnap.exists() && mySnap.data().following?.includes(profileUid);

        try {
            if (!isFollowing) {
                // FOLLOW
                await updateDoc(myRef, {
                    following: arrayUnion(profileUid),
                    followingCount: increment(1)
                });
                await updateDoc(theirRef, {
                    followers: arrayUnion(currentUser.uid),
                    followersCount: increment(1)
                });

                // CREATE NOTIFICATION
                await addDoc(collection(db, "users", profileUid, "notifications"), {
                    type: "follow",
                    title: "New Follower",
                    message: `${currentUsername} started following you`,
                    fromUserId: currentUser.uid,
                    fromUsername: currentUsername,
                    read: false,
                    timestamp: serverTimestamp()
                });
            } else {
                // UNFOLLOW
                await updateDoc(myRef, {
                    following: arrayRemove(profileUid),
                    followingCount: increment(-1)
                });
                await updateDoc(theirRef, {
                    followers: arrayRemove(currentUser.uid),
                    followersCount: increment(-1)
                });
            }
        } catch(e) {
            console.error("Follow action failed:", e);
        } finally {
            btn.disabled = false;
        }
    });

    // 💡 FIX: REAL-TIME TOTAL POSTS COUNT
    const postsQuery = query(collection(db, "posts"), where("userId", "==", profileUid), orderBy("timestamp", "desc"));
    onSnapshot(postsQuery, (snapshot) => {
        // Update post count
        document.getElementById("post-count").innerText = snapshot.size;

        // Render posts
        const container = document.getElementById("user-posts");
        // Clear all except heading
        while(container.lastElementChild !== container.firstElementChild) {
            container.removeChild(container.lastElementChild);
        }

        if (snapshot.empty) {
            const div = document.createElement("div");
            div.className = "post";
            div.innerHTML = "<p style='text-align:center;color:#888;'>No posts yet.</p>";
            container.appendChild(div);
        } else {
            snapshot.forEach(postDoc => {
                const post = postDoc.data();
                const div = document.createElement("div");
                div.className = "post";
                let imgHTML = post.imageBase64 ? `<img src="${post.imageBase64}" class="post-image">` : "";
                div.innerHTML = `
                    <p>${post.content || ""}</p>
                    ${imgHTML}
                    <small style="color:#999;margin-top:8px;display:block">❤️ ${post.likes || 0} likes</small>
                `;
                container.appendChild(div);
            });
        }
    });
});
</script>
</body>
</html>
