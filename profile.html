<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;min-height:100vh;}
.back-btn{position:fixed;top:20px;left:20px;background:#ff6a00;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:500;z-index:100;}
.back-btn:hover{background:#e55d00;}

.profile-container{max-width:600px;margin:0 auto;padding:80px 20px 40px;}

.profile-card{background:white;border-radius:16px;padding:30px;text-align:center;box-shadow:0 5px 20px rgba(0,0,0,0.08);margin-bottom:25px;}
.profile-avatar{width:100px;height:100px;border-radius:50%;border:4px solid #ff6a00;margin-bottom:15px;object-fit:cover;}
.profile-name{font-size:22px;font-weight:600;margin-bottom:5px;}
.profile-bio{color:#666;font-size:14px;margin-bottom:20px;}

.profile-stats{display:flex;justify-content:center;gap:40px;margin-bottom:20px;}
.stat{text-align:center;}
.stat-num{font-size:22px;font-weight:600;color:#ff6a00;}
.stat-label{font-size:12px;color:#888;}

.follow-btn{background:#ff6a00;color:white;border:none;padding:12px 40px;border-radius:25px;font-size:15px;font-weight:500;cursor:pointer;transition:0.3s;}
.follow-btn:hover{background:#e55d00;transform:scale(1.02);}
.follow-btn.following{background:#444;}
.follow-btn:disabled{opacity:0.6;cursor:not-allowed;}

.edit-btn{background:transparent;border:2px solid #ff6a00;color:#ff6a00;padding:12px 40px;border-radius:25px;font-size:15px;font-weight:500;cursor:pointer;transition:0.3s;}
.edit-btn:hover{background:#ff6a00;color:white;}

.section-title{font-size:16px;font-weight:600;margin-bottom:15px;color:#333;}

.posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.post-thumb{aspect-ratio:1;background:#eee;border-radius:8px;overflow:hidden;cursor:pointer;}
.post-thumb img{width:100%;height:100%;object-fit:cover;}
.post-thumb:hover{opacity:0.8;}
.empty-posts{text-align:center;color:#888;padding:40px;background:white;border-radius:12px;}

.loading{text-align:center;padding:50px;color:#888;}
</style>
</head>

<body>

<button class="back-btn" onclick="history.back()">← Back</button>

<div class="profile-container">
    <div class="profile-card">
        <img class="profile-avatar" id="avatar" src="https://i.pravatar.cc/150">
        <h2 class="profile-name" id="profile-name">Loading...</h2>
        <p class="profile-bio" id="profile-bio">No bio yet</p>
        
        <div class="profile-stats">
            <div class="stat">
                <div class="stat-num" id="posts-count">0</div>
                <div class="stat-label">Posts</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="followers-count">0</div>
                <div class="stat-label">Followers</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="following-count">0</div>
                <div class="stat-label">Following</div>
            </div>
        </div>
        
        <button class="follow-btn" id="action-btn" style="display:none;">Follow</button>
    </div>

    <h3 class="section-title">📸 Posts</h3>
    <div class="posts-grid" id="posts-grid">
        <div class="loading">Loading posts...</div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, query, where, orderBy, addDoc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
    authDomain: "cashclique-31718.firebaseapp.com",
    projectId: "cashclique-31718",
    storageBucket: "cashclique-31718.firebasestorage.app",
    messagingSenderId: "1064282591269",
    appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc",
    measurementId: "G-V5WHJB6LS0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Get profile UID from URL
const urlParams = new URLSearchParams(window.location.search);
let profileUid = urlParams.get("uid");
let currentUser = null;
let currentUsername = "User";
let isOwnProfile = false;

onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "login.html"; return; }
    currentUser = user;

    // Get current user's username
    const myDoc = await getDoc(doc(db, "users", user.uid));
    if (myDoc.exists()) {
        currentUsername = myDoc.data().username || user.email?.split('@')[0] || "User";
    }

    // If no UID in URL, show own profile
    if (!profileUid) profileUid = user.uid;
    isOwnProfile = profileUid === user.uid;

    loadProfile();
    loadUserPosts();
});

function loadProfile() {
    const userRef = doc(db, "users", profileUid);
    
    onSnapshot(userRef, (snap) => {
        if (!snap.exists()) {
            document.getElementById("profile-name").innerText = "User not found";
            return;
        }

        const data = snap.data();
        document.getElementById("avatar").src = data.avatar || `https://i.pravatar.cc/150?u=${profileUid}`;
        document.getElementById("profile-name").innerText = data.username || "Anonymous";
        document.getElementById("profile-bio").innerText = data.bio || "No bio yet";
        document.getElementById("followers-count").innerText = data.followers?.length || 0;
        document.getElementById("following-count").innerText = data.following?.length || 0;

        const actionBtn = document.getElementById("action-btn");
        actionBtn.style.display = "inline-block";

        if (isOwnProfile) {
            actionBtn.innerText = "Edit Profile";
            actionBtn.className = "edit-btn";
            actionBtn.onclick = () => window.location.href = "settings.html";
        } else {
            const isFollowing = data.followers?.includes(currentUser.uid);
            actionBtn.innerText = isFollowing ? "Following" : "Follow";
            actionBtn.className = isFollowing ? "follow-btn following" : "follow-btn";
            actionBtn.onclick = () => toggleFollow(isFollowing, data.username || "User");
        }
    });
}

async function toggleFollow(isFollowing, profileUsername) {
    const actionBtn = document.getElementById("action-btn");
    actionBtn.disabled = true;

    const profileRef = doc(db, "users", profileUid);
    const myRef = doc(db, "users", currentUser.uid);

    try {
        if (isFollowing) {
            // Unfollow
            await updateDoc(profileRef, { followers: arrayRemove(currentUser.uid) });
            await updateDoc(myRef, { following: arrayRemove(profileUid) });
        } else {
            // Follow
            await updateDoc(profileRef, { followers: arrayUnion(currentUser.uid) });
            await updateDoc(myRef, { following: arrayUnion(profileUid) });

            // Send notification to the user being followed
            await addDoc(collection(db, "users", profileUid, "notifications"), {
                type: "follow",
                title: `${currentUsername} started following you`,
                message: "Tap to view their profile",
                fromUserId: currentUser.uid,
                fromUsername: currentUsername,
                read: false,
                timestamp: serverTimestamp()
            });
        }
    } catch (e) {
        console.error("Follow action failed:", e);
        alert("Action failed. Please try again.");
    }

    actionBtn.disabled = false;
}

function loadUserPosts() {
    const postsQuery = query(
        collection(db, "posts"),
        where("userId", "==", profileUid),
        orderBy("timestamp", "desc")
    );

    onSnapshot(postsQuery, (snap) => {
        const grid = document.getElementById("posts-grid");
        grid.innerHTML = "";
        document.getElementById("posts-count").innerText = snap.size;

        if (snap.empty) {
            grid.innerHTML = `<div class="empty-posts" style="grid-column:1/-1;">No posts yet</div>`;
            return;
        }

        snap.forEach(postDoc => {
            const post = postDoc.data();
            const div = document.createElement("div");
            div.className = "post-thumb";
            
            if (post.imageBase64) {
                div.innerHTML = `<img src="${post.imageBase64}">`;
            } else {
                div.style.background = "#ff6a00";
                div.style.display = "flex";
                div.style.alignItems = "center";
                div.style.justifyContent = "center";
                div.style.color = "white";
                div.style.fontSize = "12px";
                div.style.padding = "10px";
                div.style.textAlign = "center";
                div.innerText = post.content?.substring(0, 30) || "Post";
            }
            
            div.onclick = () => window.location.href = `post-view.html?postId=${postDoc.id}`;
            grid.appendChild(div);
        });
    });
}
</script>
</body>
</html>
