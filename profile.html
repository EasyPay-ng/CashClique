<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;display:flex;justify-content:center;min-height:100vh;padding:10px;}
.container{width:100%;max-width:700px;background:white;padding:20px;border-radius:20px;box-shadow:0 15px 30px rgba(0,0,0,0.08);}
.profile-header{display:flex;align-items:center;gap:15px;margin-bottom:20px;flex-wrap:wrap;}
.profile-header img{width:60px;height:60px;border-radius:50%;}
.username{font-size:18px;font-weight:600;word-break:break-word;}
.stats{display:flex;gap:15px;margin-top:5px;font-size:14px;color:#555;flex-wrap:wrap;}
.stats div{display:flex;flex-direction:column;}
.follow-btn{margin-left:auto;background:#ff6a00;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;transition:0.3s;white-space:nowrap;}
.follow-btn:hover{transform:scale(1.05);}
.posts{margin-top:20px;display:flex;flex-direction:column;gap:20px;}
.post{background:white;padding:15px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.05);cursor:pointer;}
.post-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.post-header img{width:35px;height:35px;border-radius:50%;}
.post-image{width:100%;border-radius:12px;object-fit:cover;margin-top:10px;}
.post-content{white-space:pre-wrap;}
@media(max-width:500px){
  .profile-header{flex-direction:column;align-items:flex-start;}
  .follow-btn{margin-left:0;margin-top:10px;}
  .stats{gap:10px;}
  .username{font-size:16px;}
}
</style>
</head>

<body>
<div class="container">
  <div class="profile-header">
    <img id="profile-pic" src="https://i.pravatar.cc/150?img=3">
    <div>
      <div class="username" id="profile-name">Username</div>
      <div class="stats">
        <div>Followers: <span id="followers-count">0</span></div>
        <div>Following: <span id="following-count">0</span></div>
      </div>
    </div>
    <button id="follow-btn" class="follow-btn">Follow</button>
  </div>

  <div class="posts" id="posts"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, collection, query, where, orderBy, onSnapshot, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
authDomain:"cashclique-31718.firebaseapp.com",
projectId:"cashclique-31718",
storageBucket:"cashclique-31718.firebasestorage.app",
messagingSenderId:"1064282591269",
appId:"1:1064282591269:web:17fbaf9b683d5b0dfbafcc",
measurementId:"G-V5WHJB6LS0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const profileUid = urlParams.get('uid');

const profilePic = document.getElementById("profile-pic");
const profileName = document.getElementById("profile-name");
const followersCount = document.getElementById("followers-count");
const followingCount = document.getElementById("following-count");
const followBtn = document.getElementById("follow-btn");
const postsContainer = document.getElementById("posts");

let currentUser = null;
let isFollowing = false;

onAuthStateChanged(auth, async user=>{
  if(!user) window.location.href="login.html";
  currentUser = user;
  loadProfile();
  loadPosts();
});

function loadProfile(){
  const userRef = doc(db,"users",profileUid);
  onSnapshot(userRef, snap=>{
    if(!snap.exists()) return;
    const data = snap.data();
    profilePic.src = data.profilePic || `https://i.pravatar.cc/150?u=${profileUid}`;
    profileName.innerText = data.username || data.email || "User";
    followersCount.innerText = (data.followers?.length || 0);
    followingCount.innerText = (data.following?.length || 0);

    isFollowing = data.followers?.includes(currentUser.uid);
    followBtn.innerText = isFollowing ? "Unfollow" : "Follow";
  });
}

followBtn.onclick = async ()=>{
  if(!currentUser) return;
  const profileRef = doc(db,"users",profileUid);
  const currentRef = doc(db,"users",currentUser.uid);

  if(isFollowing){
    await updateDoc(profileRef, {followers: arrayRemove(currentUser.uid)});
    await updateDoc(currentRef, {following: arrayRemove(profileUid)});
    isFollowing = false;
    followBtn.innerText = "Follow";
  } else {
    await updateDoc(profileRef, {followers: arrayUnion(currentUser.uid)});
    await updateDoc(currentRef, {following: arrayUnion(profileUid)});
    isFollowing = true;
    followBtn.innerText = "Unfollow";
  }
}

function loadPosts(){
  const postsRef = collection(db,"posts");
  const q = query(postsRef, where("userId","==",profileUid), orderBy("timestamp","desc"));
  onSnapshot(q, snap=>{
    postsContainer.innerHTML="";
    if(snap.empty){
      postsContainer.innerHTML="<p style='color:#888;'>No posts yet.</p>";
      return;
    }
    snap.forEach(postDoc=>{
      const post = postDoc.data();
      const div = document.createElement("div");
      div.className="post";
      let imgHTML = post.imageBase64 ? `<img src="${post.imageBase64}" class="post-image">` : '';
      div.innerHTML=`
        <div class="post-header">
          <img src="${post.imageBase64 || `https://i.pravatar.cc/150?u=${post.userId}`}" class="profile-pic">
          <strong>${post.username}</strong>
        </div>
        <div class="post-content">${post.content}</div>
        ${imgHTML}
      `;
      div.onclick=()=>{ window.location.href=`post-view.html?postId=${postDoc.id}`; }
      postsContainer.appendChild(div);
    });
  });
}
</script>

</body>
</html>
