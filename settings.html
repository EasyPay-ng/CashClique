<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#ff6a00;
  color:white;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px;
  position:fixed;
  height:100%;
}
.sidebar img{width:45px;border-radius:10px;}
.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:18px;}
.sidebar a{color:white;text-decoration:none;padding:10px;border-radius:8px;transition:0.3s;}
.sidebar a:hover,.sidebar a.active{background:rgba(255,255,255,0.2);}

/* MAIN */
.main{
  margin-left:240px;
  width:100%;
  padding:30px;
  max-width:900px;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}
.header h1{font-size:24px;color:#333;}

.card{
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.05);
  margin-bottom:25px;
}
.card h2{
  font-size:17px;
  margin-bottom:20px;
  color:#333;
}

.form-group{margin-bottom:18px;}
.form-group label{
  display:block;
  margin-bottom:6px;
  font-size:14px;
  color:#555;
}
.form-group input,
.form-group textarea{
  width:100%;
  padding:10px 12px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:14px;
}
.form-group textarea{resize:none;height:90px;}

.avatar-section{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:20px;
}
.avatar-preview{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #ff6a00;
}
input[type="file"]{display:none;}

.btn{
  background:#ff6a00;
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  font-weight:500;
  transition:0.3s;
}
.btn:hover{transform:translateY(-2px);}
.btn-danger{background:#e53935;}

.toggle{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}
.switch{
  position:relative;
  display:inline-block;
  width:46px;height:24px;
}
.switch input{opacity:0;width:0;height:0;}
.slider{
  position:absolute;cursor:pointer;
  top:0;left:0;right:0;bottom:0;
  background:#ccc;border-radius:20px;transition:.3s;
}
.slider:before{
  content:"";position:absolute;height:18px;width:18px;
  left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s;
}
input:checked + .slider{background:#ff6a00;}
input:checked + .slider:before{transform:translateX(22px);}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#333;
  color:white;
  padding:12px 18px;
  border-radius:8px;
  display:none;
}

@media(max-width:900px){
.sidebar{transform:translateX(-100%);}
.sidebar.active{transform:translateX(0);}
.main{margin-left:0;}
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
  <div class="logo">
    <img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
    CashClique
  </div>
  <a href="dashboard.html">🏠 Dashboard</a>
  <a href="my-content.html">📝 My Content</a>
  <a href="earnings.html">💰 Earnings</a>
  <a href="opportunities.html">🔥 Opportunities</a>
  <a href="settings.html" class="active">⚙ Settings</a>
  <a href="#" id="logout">🚪 Logout</a>
</div>

<div class="main">
<div class="header">
  <h1>Settings</h1>
  <button onclick="toggleMenu()">☰</button>
</div>

<!-- PROFILE -->
<div class="card">
<h2>Profile</h2>

<div class="avatar-section">
  <img id="avatar-preview" class="avatar-preview">
  <label class="btn">
    Change Avatar
    <input type="file" id="avatar-input" accept="image/*">
  </label>
</div>

<div class="form-group">
  <label>Username</label>
  <input type="text" id="username">
</div>

<div class="form-group">
  <label>Bio</label>
  <textarea id="bio"></textarea>
</div>

<button class="btn" onclick="saveProfile()">Save Profile</button>
</div>

<!-- PASSWORD -->
<div class="card">
<h2>Password</h2>

<div class="form-group">
  <label>Current Password</label>
  <input type="password" id="current-password">
</div>

<div class="form-group">
  <label>New Password</label>
  <input type="password" id="new-password">
</div>

<button class="btn" onclick="updatePassword()">Update Password</button>
</div>

<!-- NOTIFICATIONS -->
<div class="card">
<h2>Notifications</h2>

<div class="toggle">
  <span>Follow Notifications</span>
  <label class="switch">
    <input type="checkbox" id="notif-follow">
    <span class="slider"></span>
  </label>
</div>

<div class="toggle">
  <span>Like Notifications</span>
  <label class="switch">
    <input type="checkbox" id="notif-like">
    <span class="slider"></span>
  </label>
</div>

<button class="btn" onclick="saveNotifications()">Save Preferences</button>
</div>

<!-- DANGER -->
<div class="card">
<h2 style="color:#e53935;">Danger Zone</h2>
<button class="btn btn-danger" onclick="deleteAccount()">Delete Account</button>
</div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, updatePassword as fbUpdatePassword, reauthenticateWithCredential, EmailAuthProvider, deleteUser } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
authDomain:"cashclique-31718.firebaseapp.com",
projectId:"cashclique-31718",
storageBucket:"cashclique-31718.firebasestorage.app",
messagingSenderId:"1064282591269",
appId:"1:1064282591269:web:17fbaf9b683d5b0dfbafcc"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let currentUser;

onAuthStateChanged(auth,async(user)=>{
if(!user){window.location.href="login.html";return;}
currentUser=user;

const snap=await getDoc(doc(db,"users",user.uid));
if(snap.exists()){
const d=snap.data();
username.value=d.username||"";
bio.value=d.bio||"";
avatarPreview.src=d.avatar||`https://i.pravatar.cc/150?u=${user.uid}`;
notifFollow.checked=d.notifications?.follow??true;
notifLike.checked=d.notifications?.like??true;
}
});

avatarInput.onchange=e=>{
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=()=>avatarPreview.src=reader.result;
reader.readAsDataURL(file);
};

window.saveProfile=async()=>{
await updateDoc(doc(db,"users",currentUser.uid),{
username:username.value.trim(),
bio:bio.value.trim(),
avatar:avatarPreview.src
});
toastMsg("Profile updated ✅");
};

window.updatePassword=async()=>{
try{
const cred=EmailAuthProvider.credential(currentUser.email,currentPassword.value);
await reauthenticateWithCredential(currentUser,cred);
await fbUpdatePassword(currentUser,newPassword.value);
toastMsg("Password updated ✅");
}catch(e){toastMsg("Error updating password ❌");}
};

window.saveNotifications=async()=>{
await updateDoc(doc(db,"users",currentUser.uid),{
notifications:{
follow:notifFollow.checked,
like:notifLike.checked
}
});
toastMsg("Preferences saved ✅");
};

window.deleteAccount=async()=>{
if(!confirm("Are you sure?"))return;
await deleteDoc(doc(db,"users",currentUser.uid));
await deleteUser(currentUser);
window.location.href="login.html";
};

document.getElementById("logout").onclick=()=>{
signOut(auth).then(()=>window.location.href="login.html");
};

function toastMsg(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",3000);
}

window.toggleMenu=()=>{
document.getElementById("sidebar").classList.toggle("active");
};
</script>

</body>
</html>
