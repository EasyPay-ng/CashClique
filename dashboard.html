<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;display:flex;min-height:100vh;}
.sidebar{width:240px;background:#ff6a00;color:white;padding:20px;display:flex;flex-direction:column;gap:20px;position:fixed;height:100%;transition:0.3s;}
.sidebar img{width:45px;border-radius:10px;}
.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:18px;}
.sidebar a{color:white;text-decoration:none;padding:10px;border-radius:8px;transition:0.3s;}
.sidebar a:hover{background:rgba(255,255,255,0.2);}

.main{margin-left:240px;width:100%;padding:20px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;}
.header-right{display:flex;align-items:center;gap:15px;}
.user{display:flex;align-items:center;gap:10px;cursor:pointer;}
.user img{width:35px;height:35px;border-radius:50%;}

.notification-bell{position:relative;cursor:pointer;font-size:24px;}
.badge{position:absolute;top:-5px;right:-5px;background:#ff0000;color:white;font-size:11px;padding:2px 5px;border-radius:50%;font-weight:600;display:none;}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;margin-bottom:25px;}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.05);transition:0.3s;}
.card:hover{transform:translateY(-5px);}
.card h3{font-size:14px;color:gray;margin-bottom:10px;}
.card p{font-size:22px;font-weight:600;color:#ff6a00;}

.feed{display:flex;flex-direction:column;gap:20px;}
.post{background:white;padding:20px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.05);position:relative;}
.post-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.post-header img{width:35px;height:35px;border-radius:50%;cursor:pointer;}
.post-actions{display:flex;gap:20px;margin-top:10px;color:gray;font-size:14px;align-items:center;}
.like-btn.liked{color:#ff4444;cursor:default;}
.comments{margin-top:10px;padding-top:10px;border-top:1px solid #eee;}
.create-btn{position:fixed;bottom:25px;right:25px;background:#ff6a00;color:white;border:none;width:60px;height:60px;border-radius:50%;font-size:30px;cursor:pointer;box-shadow:0 10px 20px rgba(0,0,0,0.2);transition:0.3s;}
.create-btn:hover{transform:scale(1.1);}
.post-image{margin-top:10px;width:100%;border-radius:12px;object-fit:cover;cursor:pointer;}
.three-dot{position:absolute;top:15px;right:15px;cursor:pointer;font-size:18px;}

/* Media Viewer */
.media-modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:1000;}
.media-modal-content{max-width:90%;max-height:90%;border-radius:12px;overflow:hidden;}
.media-modal-content img{max-width:100%;max-height:90vh;display:block;}

/* Notifications */
.notification-overlay{position:fixed;top:70px;right:20px;width:320px;background:white;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.15);display:none;z-index:999;overflow:hidden;}
.notification-header{padding:12px 15px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;font-weight:500;}
.notification-panel{max-height:380px;overflow-y:auto;}
.notification-item{padding:12px 15px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:0.2s;}
.notification-item:hover{background:#f8f8f8;}
.notification-item.unread{background:#fff8e1;}
.notification-item:last-child{border-bottom:none;}
.empty-notif{padding:20px;text-align:center;color:#888;font-size:14px;}

@media(max-width:900px){
.sidebar{transform:translateX(-100%);z-index:999;}
.sidebar.active{transform:translateX(0);}
.main{margin-left:0;}
.menu-btn{display:block;font-size:22px;cursor:pointer;}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div class="logo">
<img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
CashClique
</div>
<a href="#">🏠 Dashboard</a>
<a href="my-content.html">📝 My Content</a>
<a href="earnings.html">💰 Earnings</a>
<a href="opportunities.html">🔥 Opportunities</a>
<a href="settings.html">⚙ Settings</a>
<a href="#" id="logout">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">
<div class="header">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="header-right">
        <div class="notification-bell" id="notification-bell">
            🛎️
            <span class="badge" id="notif-count">0</span>
        </div>
        <div class="user" id="current-user">
            <img src="https://i.pravatar.cc/150?img=3">
            <span id="username">Loading...</span>
        </div>
    </div>
</div>

<!-- STATS -->
<div class="stats">
    <div class="card">
        <h3>Total Posts</h3>
        <p id="total-posts">0</p>
    </div>
</div>

<!-- FEED -->
<div class="feed" id="feed"></div>
</div>

<button class="create-btn" onclick="window.location.href='post.html'">+</button>

<!-- Media Viewer -->
<div class="media-modal" id="media-modal" onclick="if(event.target.id==='media-modal') closeMediaModal()">
    <div class="media-modal-content">
        <img id="modal-image" src="" alt="Post Image">
    </div>
</div>

<!-- Notifications Overlay -->
<div class="notification-overlay" id="notification-overlay">
    <div class="notification-header">
        <span>Notifications</span>
        <span style="font-size:12px;color:#ff6a00;cursor:pointer;" onclick="markAllRead()">Mark all read</span>
    </div>
    <div class="notification-panel" id="notification-panel"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, doc, onSnapshot, updateDoc, increment, serverTimestamp, query, orderBy, addDoc, arrayUnion, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
    authDomain: "cashclique-31718.firebaseapp.com",
    projectId: "cashclique-31718",
    storageBucket: "cashclique-31718.firebasestorage.app",
    messagingSenderId: "1064282591269",
    appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc",
    measurementId: "G-V5WHJB6LS0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const feed = document.getElementById("feed");
let currentUser = null;

// ================= AUTH & USER =================
onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "login.html"; return; }
    currentUser = user;

    // Load username
    const userRef = doc(db, "users", user.uid);
    onSnapshot(userRef, (snap) => {
        const data = snap.exists() ? snap.data() : {};
        document.getElementById("username").innerText = data.username || user.email?.split('@')[0] || "User";
    });

    // Real-time feed
    const postsQuery = query(collection(db, "posts"), orderBy("timestamp", "desc"));
    onSnapshot(postsQuery, (snapshot) => {
        feed.innerHTML = "";
        document.getElementById("total-posts").innerText = snapshot.size;

        if (snapshot.empty) {
            feed.innerHTML = `<div class="post"><p>Welcome to CashClique! Create your first post to see it here.</p></div>`;
            return;
        }

        snapshot.forEach((postDoc) => {
            const post = postDoc.data();
            const postId = postDoc.id;
            const isLiked = post.likedBy && post.likedBy.includes(currentUser.uid);

            const postEl = document.createElement("div");
            postEl.className = "post";
            const imgHTML = post.imageBase64 ? 
                `<img src="${post.imageBase64}" class="post-image" onclick="viewImage('${post.imageBase64}')">` : '';

            postEl.innerHTML = `
                <div class="post-header">
                    <img src="https://i.pravatar.cc/150?u=${post.userId}" class="profile-pic">
                    <strong>${post.username || "Anonymous"}</strong>
                    <span class="three-dot" onclick="openPostView('${postId}')">⋮</span>
                </div>
                <p>${post.content}</p>
                ${imgHTML}
                <div class="post-actions">
                    <span class="like-btn ${isLiked ? 'liked' : ''}" data-id="${postId}" data-liked="${isLiked}">❤️ ${post.likes || 0}</span>
                    <span onclick="toggleComments('${postId}')">💬 Comment</span>
                </div>
                <div class="comments" id="comments-${postId}" style="display:none">
                    <div class="comment-list" id="comment-list-${postId}"></div>
                    <input placeholder="Write a comment..." id="comment-input-${postId}" style="margin-top:10px;width:100%;padding:8px;border-radius:6px;border:1px solid #ddd"/>
                    <button onclick="addComment('${postId}')" style="margin-top:5px;background:#ff6a00;color:white;border:none;padding:6px 12px;border-radius:6px">Post</button>
                </div>
            `;
            feed.appendChild(postEl);

            postEl.querySelector('.profile-pic').onclick = () => window.location.href = `profile.html?uid=${post.userId}`;

            // Comments listener
            const commentsRef = collection(db, "posts", postId, "comments");
            onSnapshot(commentsRef, (cSnap) => {
                const list = document.getElementById(`comment-list-${postId}`);
                if (!list) return;
                list.innerHTML = "";
                cSnap.forEach(c => {
                    const d = c.data();
                    const div = document.createElement("div");
                    div.style.fontSize = "13px"; div.style.marginTop = "6px";
                    div.innerHTML = `<b>${d.username || "User"}</b>: ${d.text}`;
                    list.appendChild(div);
                });
            });
        });
        attachLikeEvents();
    });

    // Real-time notifications
    const notifRef = collection(db, "users", currentUser.uid, "notifications");
    const notifQuery = query(notifRef, orderBy("timestamp", "desc"));
    onSnapshot(notifQuery, (snap) => {
        const panel = document.getElementById("notification-panel");
        panel.innerHTML = "";
        let unread = 0;

        if (snap.empty) {
            panel.innerHTML = `<div class="empty-notif">No notifications yet</div>`;
        } else {
            snap.forEach(nDoc => {
                const n = nDoc.data();
                if (!n.read) unread++;
                const div = document.createElement("div");
                div.className = `notification-item ${n.read ? '' : 'unread'}`;
                div.dataset.id = nDoc.id;
                const time = n.timestamp ? new Date(n.timestamp.seconds * 1000).toLocaleString() : "Just now";
                div.innerHTML = `<strong>${n.title || "Notification"}</strong><br><small>${n.message || ""}</small><br><small style="color:#888">${time}</small>`;
                div.onclick = () => markRead(nDoc.id);
                panel.appendChild(div);
            });
        }

        const badge = document.getElementById("notif-count");
        badge.innerText = unread;
        badge.style.display = unread > 0 ? "block" : "none";
    });
});

// ================= LIKES (1 per user) =================
function attachLikeEvents() {
    document.querySelectorAll(".like-btn").forEach(btn => {
        if (btn.dataset.liked === "true") return; // Already liked, disable
        btn.onclick = async () => {
            const postId = btn.dataset.id;
            const ref = doc(db, "posts", postId);
            try {
                await updateDoc(ref, {
                    likes: increment(1),
                    likedBy: arrayUnion(currentUser.uid)
                });
                btn.dataset.liked = "true";
                btn.classList.add("liked");
                const count = parseInt(btn.innerText.split(' ')[1]) || 0;
                btn.innerText = `❤️ ${count + 1}`;
            } catch (e) {
                console.warn("Like failed:", e.message);
            }
        };
    });
}

// ================= NOTIFICATIONS =================
const bell = document.getElementById("notification-bell");
const overlay = document.getElementById("notification-overlay");

bell.addEventListener("click", () => {
    const isOpen = overlay.style.display === "block";
    overlay.style.display = isOpen ? "none" : "block";
    if (!isOpen) markAllRead();
});

window.markRead = async function(notifId) {
    await updateDoc(doc(db, "users", currentUser.uid, "notifications", notifId), { read: true });
};

window.markAllRead = async function() {
    const snap = await getDocs(query(collection(db, "users", currentUser.uid, "notifications")));
    const batch = writeBatch(db);
    snap.forEach(d => batch.update(d.ref, { read: true }));
    await batch.commit();
};

// Helper for getDocs (not imported in module scope)
import { getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ================= MEDIA & UI =================
window.viewImage = function(src) {
    document.getElementById("modal-image").src = src;
    document.getElementById("media-modal").style.display = "flex";
};
window.closeMediaModal = function() {
    document.getElementById("media-modal").style.display = "none";
};
window.toggleMenu = function() {
    document.getElementById("sidebar").classList.toggle("active");
};
window.toggleComments = function(id) {
    const el = document.getElementById("comments-"+id);
    el.style.display = el.style.display === "none" ? "block" : "none";
};
window.addComment = async function(postId) {
    const input = document.getElementById(`comment-input-${postId}`);
    const text = input.value.trim();
    if (!text) return;
    await addDoc(collection(db, "posts", postId, "comments"), {
        userId: currentUser.uid,
        username: document.getElementById("username").innerText,
        text,
        timestamp: serverTimestamp()
    });
    input.value = "";
};
window.openPostView = function(postId) {
    window.location.href = `post-view.html?postId=${postId}`;
};

document.getElementById("logout").addEventListener("click", () => {
    signOut(auth).then(() => window.location.href = "login.html");
});

document.addEventListener("click", (e) => {
    if (!bell.contains(e.target) && !overlay.contains(e.target)) {
        overlay.style.display = "none";
    }
});
</script>
</body>
</html>
