<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f5f5;
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#ff6a00;
color:white;
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
position:fixed;
height:100%;
}

.sidebar img{
width:45px;
border-radius:10px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:600;
font-size:18px;
}

.sidebar a{
color:white;
text-decoration:none;
padding:10px;
border-radius:8px;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
}

/* MAIN */

.main{
margin-left:240px;
width:100%;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

/* HEADER RIGHT */

.header-right{
display:flex;
align-items:center;
gap:20px;
}

.user{
display:flex;
align-items:center;
gap:10px;
}

.user img{
width:35px;
height:35px;
border-radius:50%;
}

/* NOTIFICATION BELL */

.notification{
position:relative;
font-size:22px;
cursor:pointer;
}

.notification-count{
position:absolute;
top:-6px;
right:-8px;
background:red;
color:white;
font-size:11px;
padding:2px 6px;
border-radius:50%;
}

/* NOTIFICATION OVERLAY */

.notifications-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.notifications-box{
background:white;
width:420px;
max-height:80vh;
overflow:auto;
border-radius:12px;
padding:20px;
}

.notifications-box h3{
margin-bottom:15px;
}

.notification-item{
padding:10px;
border-bottom:1px solid #eee;
font-size:14px;
}

.notification-item:last-child{
border:none;
}

.notification-time{
font-size:11px;
color:gray;
margin-top:4px;
}

/* FEED */

.feed{
display:flex;
flex-direction:column;
gap:20px;
}

.post{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
transform:translateX(-100%);
}

.sidebar.active{
transform:translateX(0);
}

.main{
margin-left:0;
}

.notifications-box{
width:90%;
}

}

</style>
</head>

<body>

<!-- NOTIFICATIONS OVERLAY -->

<div class="notifications-overlay" id="notificationsOverlay" onclick="closeNotifications()">

<div class="notifications-box" onclick="event.stopPropagation()">

<h3>Notifications</h3>

<div id="notificationsList"></div>

</div>

</div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<div class="logo">
<img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
CashClique
</div>

<a href="#">🏠 Dashboard</a>
<a href="my-content.html">📝 My Content</a>
<a href="earnings.html">💰 Earnings</a>
<a href="settings.html">⚙ Settings</a>
<a href="#" id="logout">🚪 Logout</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">

<div onclick="toggleMenu()">☰</div>

<div class="header-right">

<!-- NOTIFICATION ICON -->

<div class="notification" onclick="openNotifications()">
🔔
<span class="notification-count" id="notificationCount" style="display:none">0</span>
</div>

<div class="user">
<img src="https://i.pravatar.cc/150">
<span id="username">User</span>
</div>

</div>

</div>

<div class="feed" id="feed"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
query,
where,
orderBy,
onSnapshot,
serverTimestamp,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
authDomain:"cashclique-31718.firebaseapp.com",
projectId:"cashclique-31718",
storageBucket:"cashclique-31718.firebasestorage.app",
messagingSenderId:"1064282591269",
appId:"1:1064282591269:web:17fbaf9b683d5b0dfbafcc"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let currentUser=null;

/* FORMAT DATE */

function formatDate(ts){
if(!ts) return "";
return ts.toDate().toLocaleString();
}

/* AUTH */

onAuthStateChanged(auth,(user)=>{

if(!user){
window.location.href="login.html";
return;
}

currentUser=user;

document.getElementById("username").innerText=user.email;

loadNotifications();

});

/* LOAD NOTIFICATIONS */

function loadNotifications(){

const q=query(
collection(db,"notifications"),
where("toUser","==",currentUser.uid),
orderBy("timestamp","desc")
);

onSnapshot(q,(snapshot)=>{

const list=document.getElementById("notificationsList");
const count=document.getElementById("notificationCount");

list.innerHTML="";

let unread=0;

snapshot.forEach(docSnap=>{

const data=docSnap.data();

if(!data.read) unread++;

const div=document.createElement("div");
div.className="notification-item";

div.innerHTML=`

${data.message}

<div class="notification-time">
${formatDate(data.timestamp)}
</div>

`;

list.appendChild(div);

});

if(unread>0){

count.style.display="inline";
count.innerText=unread;

}else{

count.style.display="none";

}

});

}

/* OPEN / CLOSE */

window.openNotifications=function(){

document.getElementById("notificationsOverlay").style.display="flex";

}

window.closeNotifications=function(){

document.getElementById("notificationsOverlay").style.display="none";

}

/* LOGOUT */

document.getElementById("logout").onclick=()=>{

signOut(auth).then(()=>{

window.location.href="login.html";

});

}

</script>

<script>

function toggleMenu(){

document.getElementById("sidebar").classList.toggle("active")

}

</script>

</body>
</html>
