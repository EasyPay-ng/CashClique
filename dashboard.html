<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f6f8;display:flex;min-height:100vh;}
.sidebar{width:240px;background:#ff6a00;color:white;padding:20px;display:flex;flex-direction:column;gap:20px;position:fixed;height:100%;transition:0.3s;z-index:999;}
.sidebar img{width:45px;border-radius:10px;}
.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:18px;}
.sidebar a{color:white;text-decoration:none;padding:12px;border-radius:8px;transition:0.3s;display:flex;align-items:center;gap:10px;}
.sidebar a:hover,.sidebar a.active{background:rgba(255,255,255,0.2);}
.sidebar i{width:20px;text-align:center;}
.sidebar-close{position:absolute;top:15px;right:15px;background:none;border:none;color:white;font-size:24px;cursor:pointer;display:none;}

.main{margin-left:240px;width:calc(100% - 240px);padding:20px 32px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.header-right{display:flex;align-items:center;gap:15px;}
.user{display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 12px;border-radius:25px;transition:0.2s;}
.user:hover{background:rgba(0,0,0,0.05);}
.user img{width:35px;height:35px;border-radius:50%;object-fit:cover;}
.verified-badge{background:#1DA1F2;color:white;width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;margin-left:3px;}
.verified-badge-post{background:#1DA1F2;color:white;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;margin-left:5px;vertical-align:middle;}

.notification-bell{position:relative;cursor:pointer;font-size:20px;padding:8px;color:#333;}
.notification-bell:hover{color:#ff6a00;}
.badge{position:absolute;top:0;right:0;background:#ff0000;color:white;font-size:10px;min-width:16px;height:16px;padding:2px 4px;border-radius:50%;font-weight:600;display:none;}

.controls-section{background:white;padding:15px 20px;border-radius:16px;box-shadow:0 4px 15px rgba(0,0,0,0.03);margin-bottom:25px;border:1px solid #e2e8f0;display:flex;flex-direction:column;gap:15px;}
.search-bar{display:flex;align-items:center;background:#f8fafc;border-radius:12px;padding:12px 16px;border:2px solid #e2e8f0;transition:0.3s;}

.category-filter{display:flex;gap:10px;overflow-x:auto;padding-bottom:5px;scrollbar-width:none;}

.category-chip{flex-shrink:0;padding:8px 16px;background:#f1f5f9;border:2px solid transparent;border-radius:20px;font-size:13px;font-weight:500;color:#64748b;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
.category-chip:hover{background:#e2e8f0;}
.category-chip.active{background:linear-gradient(135deg,#ff6a00,#e55d00);color:white;border-color:#ff6a00;}

.feed-tabs{display:flex;gap:15px;border-bottom:2px solid #f1f5f9;}
.feed-tab{flex:1;text-align:center;background:none;border:none;padding:10px;font-size:14px;font-weight:600;color:#64748b;cursor:pointer;position:relative;}
.feed-tab.active{color:#ff6a00;}

.feed{display:flex;flex-direction:column;gap:20px;}

/* Optimized Skeleton */
.skeleton-post{background:white;padding:20px;border-radius:16px;box-shadow:0 4px 15px rgba(0,0,0,0.03);border:1px solid #e2e8f0;animation:skeleton-pulse 1.5s ease-in-out infinite;}
@keyframes skeleton-pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.skeleton-header{display:flex;align-items:center;gap:12px;margin-bottom:15px;}
.skeleton-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.skeleton-lines{flex:1;display:flex;flex-direction:column;gap:8px;}
.skeleton-line{height:12px;background:#e2e8f0;border-radius:6px;width:40%;}
.skeleton-line.short{width:25%;}
.skeleton-content{height:100px;background:#e2e8f0;border-radius:8px;margin-bottom:15px;}

.post{background:white;padding:20px;border-radius:16px;box-shadow:0 4px 15px rgba(0,0,0,0.03);border:1px solid #e2e8f0;animation:fadeIn 0.3s ease;}

.action-item{display:flex;align-items:center;gap:6px;cursor:pointer;color:#64748b;font-size:14px;font-weight:600;}

.comments-section{margin-top:15px;padding-top:15px;border-top:1px solid #f1f5f9;display:none;}

.tip-modal{position:fixed;inset:0;background:rgba(15,23,42,0.7);display:none;align-items:center;justify-content:center;z-index:2000;}

.tip-options{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0;}

.notification-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:none;z-index:1000;align-items:flex-start;justify-content:flex-end;padding:70px 20px;}
.notification-panel-wrap{width:350px;background:white;border-radius:16px;box-shadow:0 15px 40px rgba(0,0,0,0.15);max-height:80vh;}
.notification-item{padding:15px 20px;border-bottom:1px solid #f1f5f9;cursor:pointer;}

.cs-btn{bottom:90px;right:20px;}
.create-btn{bottom:20px;right:20px;}
}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs, onSnapshot, arrayUnion, arrayRemove, orderBy, addDoc, increment, serverTimestamp, writeBatch, runTransaction, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
    apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
    authDomain: "cashclique-31718.firebaseapp.com",
    projectId: "cashclique-31718",
    storageBucket: "cashclique-31718.firebasestorage.app",
    messagingSenderId: "1064282591269",
    appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc",
    measurementId: "G-V5WHJB6LS0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const messaging = getMessaging(app);

// ==================== CATEGORIES ====================
const CATEGORIES = [
    { name: 'Comedy', icon: '😂' }, { name: 'Sports', icon: '⚽' },
    { name: 'Anime', icon: '🎌' }, { name: 'Comics', icon: '💬' },
    { name: 'Relationship', icon: '💕' }, { name: 'Showcasing', icon: '✨' },
    { name: 'Daily Life', icon: '📅' }, { name: 'Beauty', icon: '💄' },
    { name: 'Games', icon: '🎮' }, { name: 'Society', icon: '🏛️' },
    { name: 'Outfit', icon: '👗' }, { name: 'Cars', icon: '🚗' },
    { name: 'Food', icon: '🍕' }, { name: 'Animals', icon: '🐾' },
    { name: 'Family', icon: '👨‍👩‍👧‍👦' }, { name: 'Drama', icon: '🎭' },
    { name: 'Fitness & Health', icon: '💪' }, { name: 'Education', icon: '📚' },
    { name: 'Technology', icon: '💻' }
];

// ==================== AGGRESSIVE CACHING ====================
const CACHE = {
    users: new Map(),
    avatars: new Map(),
    verification: new Map(),
    posts: [],
    lastUserUpdate: 0,
    lastPostsUpdate: 0
};

// Cache duration: 5 minutes for user data, 2 minutes for posts
const CACHE_DURATION = { user: 300000, posts: 120000 };

// ==================== STATE ====================
let currentUser = null;
let currentUsername = "User";
let currentBalance = 0;
let followingList = [];
let viewedAds = [];
let currentFeedTab = localStorage.getItem('cashclique_feed_tab') || 'all';
let currentCategory = localStorage.getItem('cashclique_category') || 'all';
let searchQuery = "";
let csChatId = null;
let postsUnsubscribe = null;
let userUnsubscribe = null;
let isFirstLoad = true;

// ==================== UTILITY FUNCTIONS ====================
function showToast(message, type = "success") {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'info' ? 'info-circle' : 'exclamation-circle'}"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// Fast avatar getter with cache
async function getUserAvatar(userId, username) {
    // Check memory cache first
    if (CACHE.avatars.has(userId)) return CACHE.avatars.get(userId);
    
    // Check localStorage
    const cached = localStorage.getItem(`avatar_${userId}`);
    if (cached) {
        CACHE.avatars.set(userId, cached);
        return cached;
    }
    
    // Generate avatar
    const name = username || 'User';
    const avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=ff6a00&color=fff&size=150`;
    CACHE.avatars.set(userId, avatar);
    localStorage.setItem(`avatar_${userId}`, avatar);
    return avatar;
}

// Fast verification check with cache
async function getUserVerificationStatus(userId) {
    if (CACHE.verification.has(userId)) return CACHE.verification.get(userId);
    
    const cached = localStorage.getItem(`verified_${userId}`);
    if (cached) {
        const isVerified = cached === 'true';
        CACHE.verification.set(userId, isVerified);
        return isVerified;
    }
    
    try {
        const userDoc = await getDoc(doc(db, "users", userId));
        const isVerified = userDoc.exists() ? (userDoc.data().isVerified || userDoc.data().verified || false) : false;
        CACHE.verification.set(userId, isVerified);
        localStorage.setItem(`verified_${userId}`, isVerified);
        return isVerified;
    } catch (e) { return false; }
}

// Batch fetch user data in parallel
async function batchGetUserData(userIds) {
    const uniqueIds = [...new Set(userIds)];
    const promises = uniqueIds.map(async (uid) => {
        if (CACHE.users.has(uid)) return { uid, data: CACHE.users.get(uid) };
        
        try {
            const snap = await getDoc(doc(db, "users", uid));
            if (snap.exists()) {
                const data = snap.data();
                CACHE.users.set(uid, data);
                return { uid, data };
            }
        } catch (e) {}
        return { uid, data: null };
    });
    
    const results = await Promise.all(promises);
    return Object.fromEntries(results.map(r => [r.uid, r.data]));
}

// ==================== CATEGORY FILTER ====================
function initCategoryFilter() {
    const container = document.getElementById('category-filter');
    
    CATEGORIES.forEach(cat => {
        const chip = document.createElement('div');
        chip.className = 'category-chip';
        chip.dataset.category = cat.name;
        chip.innerHTML = `<span>${cat.icon}</span> ${cat.name}`;
        chip.onclick = () => selectCategory(cat.name, chip);
        container.appendChild(chip);
    });
    
    if (currentCategory !== 'all') {
        const chip = document.querySelector(`[data-category="${currentCategory}"]`);
        if (chip) selectCategory(currentCategory, chip);
    }
}

function selectCategory(category, chipElement) {
    document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
    
    if (currentCategory === category && category !== 'all') {
        currentCategory = 'all';
        document.querySelector('[data-category="all"]').classList.add('active');
    } else {
        currentCategory = category;
        chipElement.classList.add('active');
        if (category !== 'all') {
            document.querySelector('[data-category="all"]').classList.remove('active');
        }
    }
    
    localStorage.setItem('cashclique_category', currentCategory);
    renderFeed();
}

// Separate user data loading for faster perceived performance
async function loadUserData(uid) {
    // Use onSnapshot for real-time updates but with caching
    const userRef = doc(db, "users", uid);
    
    // Get cached data first for instant display
    const cachedUser = localStorage.getItem('current_user_data');
    if (cachedUser) {
        const data = JSON.parse(cachedUser);
        updateUserUI(data);
    }
    
    // Then subscribe to real-time updates
    userUnsubscribe = onSnapshot(userRef, (snap) => {
        if (snap.exists()) {
            const data = snap.data();
            currentUsername = data.username || currentUser.email?.split('@')[0] || "User";
            currentBalance = data.balance || 0;
            followingList = data.following || [];
            viewedAds = data.viewedAds || [];
            
            // Update UI
            updateUserUI(data);
            
            // Cache to localStorage
            localStorage.setItem('current_user_data', JSON.stringify({
                username: currentUsername,
                balance: currentBalance,
                following: followingList,
                viewedAds: viewedAds,
                avatar: data.avatar,
                isVerified: data.isVerified || data.verified
            }));
        }
    });
}

function updateUserUI(data) {
    const username = data.username || currentUser?.email?.split('@')[0] || "User";
    document.getElementById("username").innerText = username;
    
    const avatar = data.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(username)}&background=ff6a00&color=fff`;
    document.getElementById("user-avatar").src = avatar;
    
    const verifiedBadge = document.getElementById("user-verified-badge");
    if (data.isVerified || data.verified) {
        verifiedBadge.style.display = "inline-flex";
    } else {
        verifiedBadge.style.display = "none";
    }
}

// ==================== OPTIMIZED FEED LOADING ====================
async function loadFeed() {
    if (postsUnsubscribe) postsUnsubscribe();
    
    // Check cache first
    const cachedPosts = localStorage.getItem('cached_posts');
    const cacheTime = localStorage.getItem('cached_posts_time');
    const now = Date.now();
    
    // Show cached posts immediately if less than 2 minutes old
    if (cachedPosts && cacheTime && (now - parseInt(cacheTime)) < CACHE_DURATION.posts) {
        const posts = JSON.parse(cachedPosts);
        // Convert timestamp strings back to dates
        posts.forEach(p => {
            if (p.timestamp) p.timestamp = { toDate: () => new Date(p.timestamp) };
        });
        allPostsCache = posts;
        renderFeed();
        isFirstLoad = false;
    }
    
    // Then load fresh data
    const postsQuery = query(collection(db, "posts"), orderBy("timestamp", "desc"), limit(30));
    
    postsUnsubscribe = onSnapshot(postsQuery, async (snapshot) => {
        const docs = snapshot.docs;
        if (docs.length === 0 && allPostsCache.length === 0) {
            document.getElementById('feed').innerHTML = `
                <div style="text-align:center;padding:60px 20px;">
                    <i class="fas fa-inbox" style="font-size:50px;color:#cbd5e1;"></i>
                    <p style="color:#64748b;margin-top:15px;">No posts yet. Be the first to post!</p>
                </div>`;
            return;
        }
        
        // Extract all user IDs for batch fetching
        const userIds = [...new Set(docs.map(d => d.data().userId))];
        
        // Batch fetch all user data in parallel (ONE database call equivalent)
        const userDataMap = await batchGetUserData(userIds);
        
        // Process posts in parallel
        const postPromises = docs.map(async (postDoc) => {
            const post = postDoc.data();
            const postId = postDoc.id;
            const userData = userDataMap[post.userId];
            
            // Use cached/prefetched data
            const isVerified = userData ? (userData.isVerified || userData.verified) : await getUserVerificationStatus(post.userId);
            const isFromFollowed = followingList.includes(post.userId);
            const hasViewed = post.viewedBy?.includes(currentUser?.uid);
            const username = userData?.username || post.username || "Anonymous";
            const avatar = await getUserAvatar(post.userId, username);
            
            return {
                id: postId,
                ...post,
                username,
                userAvatar: avatar,
                isVerified,
                isFromFollowed,
                hasViewed,
                // Store timestamp as string for caching
                _timestamp: post.timestamp?.toDate?.() || new Date()
            };
        });
        
        const posts = await Promise.all(postPromises);
        allPostsCache = posts;
        
        // Cache to localStorage for instant load next time
        const cacheablePosts = posts.map(p => ({
            ...p,
            timestamp: p._timestamp.toISOString()
        }));
        localStorage.setItem('cached_posts', JSON.stringify(cacheablePosts));
        localStorage.setItem('cached_posts_time', Date.now().toString());
        
        isFirstLoad = false;
        renderFeed();
    }, (error) => {
        console.error("Feed error:", error);
        if (allPostsCache.length === 0) {
            document.getElementById('feed').innerHTML = `
                <div style="text-align:center;padding:40px;">
                    <i class="fas fa-exclamation-circle" style="font-size:40px;color:#ef4444;"></i>
                    <p style="color:#64748b;margin-top:15px;">Failed to load. <button onclick="loadFeed()" style="background:#ff6a00;color:white;border:none;padding:8px 16px;border-radius:8px;margin-left:10px;cursor:pointer;">Retry</button></p>
                </div>`;
        }
    });
}

// ==================== RENDERING ====================
function renderFeed() {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";
    
    let filtered = [...allPostsCache];
    
    // Apply filters
    if (currentCategory !== 'all') {
        filtered = filtered.filter(p => p.category === currentCategory);
    }
    if (currentFeedTab === 'following') {
        filtered = filtered.filter(p => p.isFromFollowed);
    }
    if (searchQuery.trim()) {
        const sq = searchQuery.toLowerCase();
        filtered = filtered.filter(p => 
            (p.content?.toLowerCase().includes(sq)) ||
            (p.username?.toLowerCase().includes(sq))
        );
    }
    
    // Sort by timestamp
    filtered.sort((a, b) => {
        const aTime = a._timestamp || new Date(0);
        const bTime = b._timestamp || new Date(0);
        return bTime - aTime;
    });
    
    // Empty state
    if (filtered.length === 0) {
        const msg = searchQuery ? "No posts match your search." : 
                   currentCategory !== 'all' ? `No ${currentCategory} posts yet.` :
                   currentFeedTab === 'following' ? "No posts from people you follow." : "No posts yet.";
        feed.innerHTML = `
            <div style="text-align:center;padding:60px 20px;">
                <i class="fas fa-${searchQuery ? 'search' : 'inbox'}" style="font-size:50px;color:#cbd5e1;"></i>
                <p style="color:#64748b;margin-top:15px;font-weight:500;">${msg}</p>
            </div>`;
        return;
    }
    
    // Render posts (use DocumentFragment for performance)
    const fragment = document.createDocumentFragment();
    filtered.forEach(post => {
        const el = createPostElement(post);
        fragment.appendChild(el);
    });
    feed.appendChild(fragment);
    
    attachEventHandlers();
}

function createPostElement(post) {
    const div = document.createElement('div');

    div.dataset.postId = post.id;
    
    const isLiked = post.likedBy?.includes(currentUser?.uid);

    const showFollow = post.userId !== currentUser?.uid;
    const timeAgo = formatTime(post._timestamp || new Date());
    const verifiedBadge = post.isVerified ? `<span class="verified-badge-post"><i class="fas fa-check"></i></span>` : '';
    const categoryBadge = post.category ? `<span style="background:#fff7ed;color:#9a3412;padding:2px 8px;border-radius:10px;font-size:11px;margin-left:6px;">${post.categoryIcon || '📁'} ${post.category}</span>` : '';
    
    div.innerHTML = `
        <div class="post-header">
            <img src="${post.userAvatar}" onclick="window.location.href='profile.html?uid=${post.userId}'" loading="lazy">
            <div class="post-author">
                <div class="post-author-name" onclick="window.location.href='profile.html?uid=${post.userId}'">
                    ${post.username}${verifiedBadge}${categoryBadge}
                </div>
                <div class="post-time">${timeAgo}</div>
            </div>
            ${showFollow ? `<button class="follow-btn ${isFollowing ? 'following' : ''}" onclick="toggleFollow('${post.userId}', this)">
                <i class="fas fa-${isFollowing ? 'check' : 'plus'}"></i> ${isFollowing ? 'Following' : 'Follow'}
            </button>` : ''}
            <i class="fas fa-ellipsis-v three-dot" onclick="window.location.href='post-view.html?postId=${post.id}'"></i>
        </div>
        <p>${post.content}</p>
        ${post.imageBase64 ? `<img src="${post.imageBase64}" class="post-image" onclick="viewImage('${post.imageBase64}')" loading="lazy">` : ''}
        <div class="post-actions">
            <span class="action-item like-btn ${isLiked ? 'liked' : ''}" data-id="${post.id}" data-owner="${post.userId}">
                <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i> ${post.likes || 0}
            </span>
            <span class="action-item" onclick="toggleComments('${post.id}')">
                <i class="far fa-comment"></i> ${post.commentCount || 0}
            </span>
            <span class="action-item"><i class="far fa-eye"></i> ${post.views || 0}</span>
            <span class="action-item tip-jar" data-id="${post.id}" data-owner="${post.userId}" data-username="${post.username}">
                <i class="fas fa-hand-holding-dollar"></i> Tip
            </span>
        </div>
        <div class="comments-section" id="comments-${post.id}">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
                <span style="font-weight:600;">Comments</span>
                <button onclick="toggleComments('${post.id}')" style="background:none;border:none;"><i class="fas fa-times"></i></button>
            </div>
            <div class="comment-list" id="comment-list-${post.id}"></div>
            <div style="display:flex;gap:10px;margin-top:10px;">
                <input type="text" id="comment-input-${post.id}" class="comment-input" placeholder="Write a comment..." onkeypress="if(event.key==='Enter')addComment('${post.id}', '${post.userId}')">
                <button class="comment-submit" onclick="addComment('${post.id}', '${post.userId}')"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    `;
    
    // Lazy load comments only when opened
    if (!post._commentsLoaded) {
        post._commentsLoaded = true;
        loadCommentsLazy(post.id);
    }
    
    return div;
}

// Lazy comment loading
function loadCommentsLazy(postId) {
    const commentsRef = query(collection(db, "posts", postId, "comments"), orderBy("timestamp", "asc"), limit(20));
    onSnapshot(commentsRef, async (snap) => {
        const list = document.getElementById(`comment-list-${postId}`);
        if (!list) return;
        
        // Update count
        const count = snap.size;
        const postEl = document.querySelector(`[data-post-id="${postId}"]`);
        if (postEl) {
            const commentBtn = postEl.querySelector('.fa-comment').parentElement;
            commentBtn.innerHTML = `<i class="far fa-comment"></i> ${count}`;
        }
        
        // Only render if comments section is open or has comments
        if (count === 0) {
            list.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:20px;">No comments yet</p>';
            return;
        }
        
        list.innerHTML = '';
        snap.forEach(doc => {
            const c = doc.data();
            const div = document.createElement('div');
            div.className = 'comment-item';
            div.innerHTML = `
                <img src="${c.userAvatar || `https://ui-avatars.com/api/?name=${c.username}&background=ff6a00&color=fff`}" class="comment-avatar">
                <div class="comment-content">
                    <div class="comment-author">${c.username}</div>
                    <div class="comment-text">${escapeHtml(c.text)}</div>
                </div>
            `;
            list.appendChild(div);
        });
    });
}

function attachEventHandlers() {
    // Like buttons
    document.querySelectorAll('.like-btn').forEach(btn => {
        btn.onclick = async () => {
            if (btn.classList.contains('liked')) return;
            const postId = btn.dataset.id;
            const ownerId = btn.dataset.owner;
            
            try {
                await updateDoc(doc(db, "posts", postId), {
                    likes: increment(1),
                    likedBy: arrayUnion(currentUser.uid)
                });
                btn.classList.add('liked');
                const currentLikes = parseInt(btn.innerText) || 0;

                        fromUserId: currentUser.uid,
                        postId: postId

document.getElementById("send-tip-btn").addEventListener("click", async () => {
    if (!currentTipData) return;
    
    const amount = parseFloat(document.querySelector(".tip-btn.selected")?.dataset.amount || document.getElementById("custom-tip").value);
    if (!amount || amount <= 0) return alert("Enter valid amount");
    if (amount > currentBalance) return alert("Insufficient balance");
    
    const btn = document.getElementById("send-tip-btn");
    btn.disabled = true;
    btn.innerText = "Sending...";
    
    try {
        const recipientAmount = amount * 0.7;
        await runTransaction(db, async (tx) => {
            tx.update(doc(db, "users", currentUser.uid), { balance: increment(-amount) });
            tx.update(doc(db, "users", currentTipData.ownerId), { balance: increment(recipientAmount) });
            tx.set(doc(collection(db, "transactions")), {
                type: "tip",
                from: currentUser.uid,
                to: currentTipData.ownerId,
                amount: amount,
                timestamp: serverTimestamp()
            });
        });
        
        showToast(`Sent $${recipientAmount.toFixed(2)} tip!`);
        closeTipModal();
    } catch (e) {
        alert("Failed to send tip");
    } finally {
        btn.disabled = false;
        btn.innerText = "Send Tip";
    }
});

// ==================== FOLLOW SYSTEM ====================
window.toggleFollow = async (userId, btn) => {
    if (userId === currentUser.uid) return showToast("Can't follow yourself!", "error");
    
    const isFollowing = followingList.includes(userId);
    const userRef = doc(db, "users", currentUser.uid);
    const targetRef = doc(db, "users", userId);
    
    try {
        if (isFollowing) {
            await updateDoc(userRef, { following: arrayRemove(userId) });
            await updateDoc(targetRef, { followers: arrayRemove(currentUser.uid) });
            followingList = followingList.filter(id => id !== userId);
            btn.classList.remove('following');
            btn.innerHTML = '<i class="fas fa-plus"></i> Follow';
        } else {
            await updateDoc(userRef, { following: arrayUnion(userId) });
            await updateDoc(targetRef, { followers: arrayUnion(currentUser.uid) });
            followingList.push(userId);
            btn.classList.add('following');
            btn.innerHTML = '<i class="fas fa-check"></i> Following';
            sendNotification(userId, { type: "follow", title: `${currentUsername} followed you`, fromUserId: currentUser.uid });
        }
    } catch (e) { showToast("Failed to update follow", "error"); }
};

// ==================== UTILITY ====================
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatTime(date) {
    if (!date || typeof date === 'string') date = new Date(date);
    const diff = Math.floor((new Date() - date) / 1000);
    if (diff < 60) return "Just now";
    if (diff < 3600) return `${Math.floor(diff/60)}m`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h`;
    if (diff < 604800) return `${Math.floor(diff/86400)}d`;
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

    const snap = await getDocs(collection(db, "users", currentUser.uid, "notifications"));
    const batch = writeBatch(db);
    snap.forEach(d => { if (!d.data().read) batch.update(d.ref, { read: true }); });
    await batch.commit();
});

// Logout
document.getElementById("logout").addEventListener("click", (e) => {
    e.preventDefault();
    // Clear caches
    localStorage.removeItem('cached_posts');
    localStorage.removeItem('current_user_data');
    signOut(auth).then(() => window.location.href = "login.html");
});

// Close modals on outside click
document.addEventListener("click", (e) => {
    if (e.target.id === "notification-overlay") document.getElementById("notification-overlay").style.display = "none";
    if (e.target.id === "tip-modal") closeTipModal();
    if (e.target.id === "media-modal") closeMediaModal();
});

// Notification bell
document.getElementById("notification-bell").addEventListener("click", (e) => {
    e.stopPropagation();
    const overlay = document.getElementById("notification-overlay");
    overlay.style.display = overlay.style.display === "flex" ? "none" : "flex";
});
</script>
</body>
</html>
