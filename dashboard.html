<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f6f8;display:flex;min-height:100vh;}
.sidebar{width:240px;background:#ff6a00;color:white;padding:20px;display:flex;flex-direction:column;gap:20px;position:fixed;height:100%;transition:0.3s;z-index:999;}
.sidebar img{width:45px;border-radius:10px;}
.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:18px;}
.sidebar a{color:white;text-decoration:none;padding:12px;border-radius:8px;transition:0.3s;display:flex;align-items:center;gap:10px;}
.sidebar a:hover{background:rgba(255,255,255,0.2);}
.sidebar a.active{background:rgba(255,255,255,0.2);}
.sidebar i{width:20px;text-align:center;}

.main{margin-left:240px;width:calc(100% - 240px);padding:20px 32px;max-width:none;margin-right:0;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.header-right{display:flex;align-items:center;gap:15px;}
.user{display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 12px;border-radius:25px;transition:0.2s;}
.user:hover{background:rgba(0,0,0,0.05);}
.user img{width:35px;height:35px;border-radius:50%;object-fit:cover;}
.user-info{display:flex;align-items:center;gap:5px;}

/* Verified Badge */
.verified-badge{background:#1DA1F2;color:white;width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;margin-left:3px;}
.verified-badge-post{background:#1DA1F2;color:white;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;margin-left:5px;vertical-align:middle;}

.notification-bell{position:relative;cursor:pointer;font-size:20px;padding:8px;transition:0.2s;color:#333;}
.notification-bell:hover{color:#ff6a00;}
.badge{position:absolute;top:0;right:0;background:#ff0000;color:white;font-size:10px;min-width:16px;height:16px;padding:2px 4px;border-radius:50%;font-weight:600;display:none;text-align:center;line-height:12px;}

/* Controls Section (Search & Tabs) */
.controls-section { background:white; padding:15px 20px; border-radius:16px; box-shadow:0 4px 15px rgba(0,0,0,0.03); margin-bottom:25px; border:1px solid #e2e8f0; display:flex; flex-direction:column; gap:15px; }
.search-bar { display:flex; align-items:center; background:#f8fafc; border-radius:12px; padding:12px 16px; border:2px solid #e2e8f0; transition:0.3s; }
.search-bar:focus-within { border-color:#ff6a00; background:white; box-shadow:0 0 0 4px rgba(255,106,0,0.1); }
.search-bar i { color:#94a3b8; margin-right:12px; font-size:16px; }
.search-bar input { border:none; background:transparent; outline:none; width:100%; font-size:14px; font-family:'Poppins', sans-serif; color:#1e2937; }
.search-bar input::placeholder { color:#94a3b8; }

.feed-tabs { display:flex; gap:15px; border-bottom:2px solid #f1f5f9; width:100%; }
.feed-tab { flex:1; text-align:center; background:none; border:none; padding:10px 5px; font-size:14.5px; font-weight:600; color:#64748b; cursor:pointer; position:relative; transition:0.3s; font-family:'Poppins', sans-serif; }
.feed-tab:hover { color:#ff6a00; }
.feed-tab.active { color:#ff6a00; }
.feed-tab.active::after { content:''; position:absolute; bottom:-2px; left:0; width:100%; height:3px; background:#ff6a00; border-radius:3px 3px 0 0; }

/* Feed */
.feed{display:flex;flex-direction:column;gap:20px;}
.post{background:white;padding:20px;border-radius:16px;box-shadow:0 4px 15px rgba(0,0,0,0.03);position:relative;border:1px solid #e2e8f0;}
.post-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;position:relative;padding-right:30px;}
.post-header img{width:40px;height:40px;border-radius:50%;cursor:pointer;object-fit:cover;}
.post-author{display:flex;flex-direction:column;flex:1;}
.post-author-name{display:flex;align-items:center;font-weight:600;color:#1e2937;font-size:15px;cursor:pointer;}
.post-author-name:hover{text-decoration:underline;}
.post-time{font-size:12px;color:#64748b;margin-top:2px;}
.post p{color:#334155;line-height:1.6;font-size:14.5px; margin-bottom:12px;}

.post-flyer{width:100%; max-height:400px; border-radius:10px; object-fit:contain; margin-bottom:15px;}
.post-actions{display:flex; gap:10px; justify-content:flex-end; margin-top:15px;}
.earn-btn{background:#ff6a00; color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:600; cursor:pointer; transition:0.2s;}
.earn-btn:hover{transform:translateY(-2px); box-shadow:0 4px 12px rgba(255,106,0,0.3);}
.earn-btn.completed{background:#10b981; cursor:default; transform:none; box-shadow:none;}

.ad-tag {
    background:#ff6a00;
    color:white;
    font-size:10px;
    padding:2px 6px;
    border-radius:4px;
    font-weight:600;
    margin-left:8px;
}

.empty{text-align:center; padding:60px 20px; color:#94a3b8}

.balance-display{font-weight:700; font-size:18px; color:#ff6a00}

.mobile-menu-btn{display:none; background:#ff6a00; border:none; color:white; font-size:18px; padding:10px;}

@media(max-width:768px){
    .mobile-menu-btn{display:block}
    .sidebar{transform:translateX(-100%)}
    .sidebar.active{transform:translateX(0)}
    .main{margin-left:0; width:100%; padding:15px}
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
    <div class="logo">
        <img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
        CashClique
    </div>

    <a href="dashboard.html" class="active"><i class="fas fa-home"></i> Home</a>
    <a href="earn.html"><i class="fas fa-wallet"></i> Earn</a>
    <a href="withdraw.html"><i class="fas fa-money-bill"></i> Withdraw</a>
    <a href="history.html"><i class="fas fa-history"></i> History</a>
    <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
</div>

<div class="main">
    <div class="header">
        <button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        
        <div>
            <div style="font-size:12px; color:#64748b">Available Balance</div>
            <div class="balance-display" id="user-balance">$0.00</div>
        </div>

        <div class="header-right">
            <div class="notification-bell">
                <i class="fas fa-bell"></i>
                <span class="badge">3</span>
            </div>
            
            <div class="user">
                <img src="https://picsum.photos/id/237/100">
                <span id="username">User</span>
            </div>
        </div>
    </div>

    <div class="controls-section">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input id="search" placeholder="Search campaigns...">
        </div>

        <div class="feed-tabs">
            <button class="feed-tab active">For You</button>
            <button class="feed-tab">Following</button>
        </div>
    </div>

    <div class="feed" id="feed">
        <div class="empty">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <div style="margin-top:15px">Loading feed...</div>
        </div>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, query, where, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
  authDomain: "cashclique-31718.firebaseapp.com",
  projectId: "cashclique-31718",
  storageBucket: "cashclique-31718.firebasestorage.app",
  messagingSenderId: "1064282591269",
  appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let allPosts = [];
let allAds = [];
let viewedAds = [];

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }
    currentUser = user;

    // Load user data
    const userDoc = await getDoc(doc(db, "users", user.uid));
    const userData = userDoc.data();
    
    document.getElementById('username').textContent = userData.displayName || user.email.split('@')[0];
    document.getElementById('user-balance').textContent = `$${(userData.balance || 0).toFixed(2)}`;
    viewedAds = userData.viewedAds || [];

    // Load organic posts
    onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(50)), snap => {
        allPosts = snap.docs.map(d => ({id: d.id, type: 'post', ...d.data()}));
        render();
    });

    // Load approved active ads from approved creators
    onSnapshot(query(collection(db, "activeAds"), orderBy("approvedAt", "desc")), snap => {
        allAds = snap.docs.map(d => ({id: d.id, type: 'ad', ...d.data()}));
        render();
    });
});


function render() {
    const feed = document.getElementById('feed');
    const searchTerm = document.getElementById('search').value.toLowerCase();

    // ✅ Mix ads and posts 50/50, never two ads in a row
    let mixedFeed = [];
    let postIndex = 0;
    let adIndex = 0;

    while(postIndex < allPosts.length || adIndex < allAds.length) {
        if(postIndex < allPosts.length) {
            mixedFeed.push(allPosts[postIndex]);
            postIndex++;
        }

        if(adIndex < allAds.length) {
            mixedFeed.push(allAds[adIndex]);
            adIndex++;
        }
    }

    if(searchTerm) {
        mixedFeed = mixedFeed.filter(c => 
            c.title?.toLowerCase().includes(searchTerm) ||
            c.description?.toLowerCase().includes(searchTerm) ||
            c.content?.toLowerCase().includes(searchTerm)
        );
    }

    if(mixedFeed.length == 0) {
        feed.innerHTML = `<div class="empty"><i class="fas fa-inbox fa-2x"></i><div style="margin-top:15px">Nothing in your feed yet</div></div>`;
        return;
    }

    feed.innerHTML = '';

    mixedFeed.forEach(item => {

        // Normal organic user post
        if(item.type === 'post') {
            const el = document.createElement('div');
            el.className = 'post';
            el.innerHTML = `
            <div class="post-header">
                <img src="${item.authorAvatar || 'https://picsum.photos/id/1/100'}">
                <div class="post-author">
                    <div class="post-author-name">
                        ${item.authorName}
                        ${item.authorVerified ? '<span class="verified-badge-post"><i class="fas fa-check"></i></span>' : ''}
                    </div>
                    <div class="post-time">2 hours ago</div>
                </div>
            </div>
            <p>${item.content}</p>
            `;
            feed.appendChild(el);
        }

        // ✅ Sponsored ad from approved creator
        if(item.type === 'ad') {
            const completed = viewedAds.includes(item.adId);
            const el = document.createElement('div');
            el.className = 'post';

            el.innerHTML = `
            <div class="post-header">
                <img src="${item.creatorAvatar || 'https://picsum.photos/id/1/100'}">
                <div class="post-author">
                    <div class="post-author-name">
                        ${item.creatorName}
                        ${item.creatorVerified ? '<span class="verified-badge-post"><i class="fas fa-check"></i></span>' : ''}
                        <span class="ad-tag">SPONSORED</span>
                    </div>
                    <div class="post-time">Promoted</div>
                </div>
            </div>

            <p><strong>${item.title}</strong><br>${item.description}</p>

            ${item.flyer ? `<img src="${item.flyer}" class="post-flyer">` : ''}

            <div class="post-actions">
                <button class="earn-btn ${completed ? 'completed' : ''}" onclick="viewAd('${item.id}', '${item.adId}', '${item.creatorId}')">
                    ${completed ? '✓ Viewed' : 'View Ad'}
                </button>
            </div>
            `;

            feed.appendChild(el);
        }

    });
}


window.viewAd = async function(activeAdId, adId, creatorId) {
    if(viewedAds.includes(adId)) return;

    if(!confirm('Watch ad for 30 seconds to earn $0.02?')) return;

    try {
        // Increment global view counter
        await updateDoc(doc(db, "opportunities", adId), {
            currentViews: increment(1)
        });

        // Increment creator earned counter
        await updateDoc(doc(db, "activeAds", activeAdId), {
            views: increment(1)
        });

        // Credit viewer
        await updateDoc(doc(db, "users", currentUser.uid), {
            viewedAds: arrayUnion(adId),
            balance: increment(0.02)
        });

        // Credit creator 50% commission
        await updateDoc(doc(db, "users", creatorId), {
            balance: increment(0.01)
        });

        viewedAds.push(adId);
        render();

        alert('✅ Success! You earned $0.02');

    } catch (error) {
        alert('Error completing ad');
        console.error(error);
    }
}

window.toggleMenu = function() {
    document.getElementById('sidebar').classList.toggle('active');
}

document.getElementById('search').addEventListener('input', render);

</script>

</body>
</html>
