<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Post | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px;}
header{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;}
header h1{font-size:22px;color:#ff6a00;}
textarea{width:100%;max-width:600px;height:150px;padding:12px;font-size:16px;border-radius:8px;border:1px solid #ddd;resize:none;margin-bottom:20px;}
button{background:#ff6a00;color:white;border:none;padding:10px 20px;font-size:16px;border-radius:8px;cursor:pointer;transition:0.3s;}
button:hover{transform:scale(1.05);}
.logout{background:#555;margin-left:10px;}
</style>
</head>

<body>

<header>
<h1>Create a New Post</h1>
<button id="logout" class="logout">Logout</button>
</header>

<textarea id="post-content" placeholder="Write your post here..."></textarea>
<button id="post-btn">Post</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
authDomain:"cashclique-31718.firebaseapp.com",
projectId:"cashclique-31718",
storageBucket:"cashclique-31718.firebasestorage.app",
messagingSenderId:"1064282591269",
appId:"1:1064282591269:web:17fbaf9b683d5b0dfbafcc",
measurementId:"G-V5WHJB6LS0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth, user => {
  if(!user) window.location.href="login.html";
  else currentUser = user;
});

// Logout button
document.getElementById("logout").addEventListener("click",()=>{
  signOut(auth).then(()=>{ window.location.href="login.html"; });
});

// Post button
document.getElementById("post-btn").addEventListener("click", async ()=>{
  const content = document.getElementById("post-content").value.trim();
  if(!content) { alert("Post content cannot be empty!"); return; }
  
  await addDoc(collection(db,"posts"),{
    userId: currentUser.uid,
    username: currentUser.email,
    content: content,
    likes: 0,
    timestamp: serverTimestamp()
  });
  
  // Redirect to dashboard
  window.location.href="dashboard.html";
});
</script>

</body>
</html>
