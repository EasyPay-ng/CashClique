<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, query, where, orderBy, getDocs, onSnapshot, doc, getDoc, updateDoc, increment, arrayUnion, arrayRemove, addDoc, serverTimestamp, limit, startAfter } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
    authDomain: "cashclique-31718.firebaseapp.com",
    projectId: "cashclique-31718",
    storageBucket: "cashclique-31718.firebasestorage.app",
    messagingSenderId: "1064282591269",
    appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ==================== GLOBAL STATE ====================
let currentUser = null;
let videos = [];
let currentVideoIndex = 0;
let currentVideoId = null;
let isPlaying = true;
let userCache = {};
let followingList = [];
let videoMetadataCache = {};
let lastDoc = null;
let isLoadingMore = false;
let hasMoreVideos = true;
const VIDEOS_PER_PAGE = 10;

// Double-tap tracking
let lastTapTime = 0;
let tapTimeout = null;

// Auth check
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }
    currentUser = user;
    
    // Load user data & sidebar
    const userDoc = await getDoc(doc(db, "users", user.uid));
    if (userDoc.exists()) {
        const data = userDoc.data();
        followingList = data.following || [];
        
        // Update sidebar user info
        document.getElementById('sidebar-username').textContent = data.username || user.email?.split('@')[0] || 'User';
        document.getElementById('sidebar-email').textContent = user.email || '';
        if (data.avatar) {
            document.getElementById('sidebar-avatar').src = data.avatar;
        }
    }
    
    loadVideos();
});

// ==================== PAGINATION: Load Videos ====================
async function loadVideos() {
    const container = document.getElementById('video-container');
    
    try {
        let q;
        if (lastDoc) {
            // Pagination: load next batch
            q = query(
                collection(db, "posts"),
                where("hasVideo", "==", true),
                orderBy("timestamp", "desc"),
                startAfter(lastDoc),
                limit(VIDEOS_PER_PAGE)
            );
        } else {
            // First load
            q = query(
                collection(db, "posts"),
                where("hasVideo", "==", true),
                orderBy("timestamp", "desc"),
                limit(VIDEOS_PER_PAGE)
            );
        }
        
        const snapshot = await getDocs(q);
        
        if (snapshot.empty) {
            hasMoreVideos = false;
            if (videos.length === 0) {
                showEmptyState();
            }
            return;
        }
        
        lastDoc = snapshot.docs[snapshot.docs.length - 1];
        
        // Build video list
        const newVideos = [];
        snapshot.docs.forEach(docSnap => {
            const data = docSnap.data();
            if (data.videoUrl && data.videoUrl.trim() !== '') {
                newVideos.push({
                    id: docSnap.id,
                    ...data
                });
            }
        });
        
        if (newVideos.length === 0 && videos.length === 0) {
            showEmptyState();
            return;
        }
        
        // Get unique user IDs
        const userIds = new Set();
        newVideos.forEach(video => userIds.add(video.userId));
        
        // Cache user data in parallel
        const userPromises = Array.from(userIds).map(async uid => {
            if (!userCache[uid]) {
                const userDoc = await getDoc(doc(db, "users", uid));
                if (userDoc.exists()) {
                    userCache[uid] = userDoc.data();
                }
            }
        });
        await Promise.all(userPromises);
        
        // Cache video metadata
        await cacheVideoMetadata(newVideos);
        
        // Append to videos array
        const startIndex = videos.length;
        videos = [...videos, ...newVideos];
        
        // Render new videos
        renderVideoBatch(newVideos, startIndex);
        
        // Setup observer if first load
        if (startIndex === 0) {
            setupIntersectionObserver();
            setupScrollObserver();
        }
        
    } catch (error) {
        console.error("Error loading videos:", error);
        showToast("Failed to load videos. Check console for details.", "error");
        
        // Show more detailed error in console
        if (error.code === 'failed-precondition') {
            console.error("FIRESTORE INDEX REQUIRED: Create a composite index for collection 'posts' with fields: hasVideo (Ascending) + timestamp (Descending)");
            console.error("Go to: https://console.firebase.google.com/project/cashclique-31718/firestore/indexes");
        }
    }
}

// ==================== CACHE VIDEO METADATA ====================
async function cacheVideoMetadata(videoList) {
    const promises = videoList.map(video => {
        return new Promise((resolve) => {
            if (videoMetadataCache[video.id]) {
                resolve();
                return;
            }
            
            const tempVideo = document.createElement('video');
            tempVideo.preload = 'metadata';
            tempVideo.src = video.videoUrl;
            tempVideo.muted = true;
            
            tempVideo.onloadedmetadata = () => {
                videoMetadataCache[video.id] = {
                    duration: tempVideo.duration,
                    width: tempVideo.videoWidth,
                    height: tempVideo.videoHeight,
                    aspectRatio: tempVideo.videoWidth / tempVideo.videoHeight
                };
                resolve();
            };
            
            tempVideo.onerror = () => {
                videoMetadataCache[video.id] = { duration: 0, width: 0, height: 0, aspectRatio: 9/16 };
                resolve();
            };
            
            setTimeout(() => {
                if (!videoMetadataCache[video.id]) {
                    videoMetadataCache[video.id] = { duration: 0, width: 0, height: 0, aspectRatio: 9/16 };
                    resolve();
                }
            }, 5000);
        });
    });
    
    await Promise.all(promises);
}

// ==================== RENDER VIDEO BATCH ====================
function renderVideoBatch(videoList, startIndex) {
    const container = document.getElementById('video-container');
    
    if (startIndex === 0) {
        container.innerHTML = '';
    }
    
    const existingTrigger = document.getElementById('load-more-trigger');
    if (existingTrigger) existingTrigger.remove();
    
    videoList.forEach((video, batchIndex) => {
        const index = startIndex + batchIndex;
        const user = userCache[video.userId] || {};
        const isLiked = video.likedBy && video.likedBy.includes(currentUser.uid);
        const isFollowing = followingList.includes(video.userId);
        const meta = videoMetadataCache[video.id] || {};
        
        const videoEl = document.createElement('div');
        videoEl.className = 'video-item';
        videoEl.dataset.index = index;
        videoEl.dataset.id = video.id;
        
        videoEl.innerHTML = `
            <div class="video-wrapper">
                <video 
                    class="video-player" 
                    src="${video.videoUrl}" 
                    loop 
                    playsinline
                    preload="metadata"
                    ${meta.aspectRatio > 1 ? 'style="object-fit: contain;"' : ''}
                ></video>
                
                <div class="double-tap-heart" id="heart-${video.id}">
                    <i class="fas fa-heart"></i>
                </div>
                
                <div class="play-overlay" id="play-overlay-${index}">
                    <i class="fas fa-play"></i>
                </div>
                
                <div class="video-progress">
                    <div class="progress-bar" id="progress-${index}"></div>
                </div>
                
                <div class="video-overlay">
                    <div class="video-author" onclick="goToProfile('${video.userId}')">
                        <img src="${user.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(video.username || 'U')}&background=ff6a00&color=fff`}" alt="" loading="lazy">
                        <div class="video-author-info">
                            <div class="video-author-name">
                                @${video.username || 'user'}
                                ${user.isVerified ? '<span class="verified-badge"><i class="fas fa-check"></i></span>' : ''}
                            </div>
                        </div>
                    </div>
                    <div class="video-caption">${escapeHtml(video.content || '')}</div>
                    <div class="video-music">
                        <i class="fas fa-music music-icon"></i>
                        <span>Original Sound - ${escapeHtml(video.username || 'Unknown')}</span>
                    </div>
                </div>
                
                <div class="video-actions">
                    <div class="action-profile" onclick="goToProfile('${video.userId}')">
                        <img src="${user.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(video.username || 'U')}&background=ff6a00&color=fff`}" alt="" loading="lazy">
                        ${!isFollowing && video.userId !== currentUser.uid ? 
                            `<div class="follow-mini" data-user-id="${video.userId}" onclick="event.stopPropagation(); toggleFollow('${video.userId}')"><i class="fas fa-plus"></i></div>` : 
                            (isFollowing ? `<div class="follow-mini following" data-user-id="${video.userId}"><i class="fas fa-check"></i></div>` : '')
                        }
                    </div>
                    
                    <div class="action-btn ${isLiked ? 'liked' : ''}" data-video-id="${video.id}" data-liked="${isLiked}">
                        <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i>
                        <span class="action-count" id="likes-${video.id}">${video.likes || 0}</span>
                    </div>
                    
                    <div class="action-btn" onclick="openComments('${video.id}')">
                        <i class="fas fa-comment-dots"></i>
                        <span class="action-count" id="comments-count-${video.id}">${video.commentCount || 0}</span>
                    </div>
                    
                    <div class="action-btn" onclick="shareVideo('${video.id}')">
                        <i class="fas fa-share"></i>
                        <span class="action-count">Share</span>
                    </div>
                    
                    <div class="action-btn" onclick="showToast('Saved to favorites!', 'success')">
                        <i class="fas fa-bookmark"></i>
                    </div>
                </div>
            </div>
        `;
        
        container.appendChild(videoEl);
        attachVideoEvents(videoEl, video, index);
    });
    
    if (hasMoreVideos) {
        const trigger = document.createElement('div');
        trigger.className = 'load-more-trigger';
        trigger.id = 'load-more-trigger';
        trigger.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading more...';
        container.appendChild(trigger);
    }
}

// ==================== ATTACH VIDEO EVENTS ====================
function attachVideoEvents(videoEl, video, index) {
    const videoPlayer = videoEl.querySelector('.video-player');
    const playOverlay = videoEl.querySelector('.play-overlay');
    const heartEl = videoEl.querySelector('.double-tap-heart');
    
    videoEl.addEventListener('click', (e) => {
        if (e.target.closest('.video-actions') || e.target.closest('.video-author') || e.target.closest('.follow-mini')) return;
        
        const currentTime = Date.now();
        const tapDiff = currentTime - lastTapTime;
        
        if (tapDiff < 300 && tapDiff > 0) {
            clearTimeout(tapTimeout);
            handleDoubleTap(video.id, heartEl, videoEl);
        } else {
            tapTimeout = setTimeout(() => {
                if (videoPlayer.paused) {
                    videoPlayer.play();
                    playOverlay.classList.remove('show');
                    isPlaying = true;
                } else {
                    videoPlayer.pause();
                    playOverlay.classList.add('show');
                    isPlaying = false;
                }
            }, 300);
        }
        
        lastTapTime = currentTime;
    });
    
    videoPlayer.addEventListener('timeupdate', () => {
        if (videoPlayer.duration) {
            const progress = (videoPlayer.currentTime / videoPlayer.duration) * 100;
            const progressBar = document.getElementById(`progress-${index}`);
            if (progressBar) progressBar.style.width = progress + '%';
        }
    });
    
    videoPlayer.addEventListener('error', () => {
        console.error('Video error, retrying...');
        setTimeout(() => {
            videoPlayer.load();
            videoPlayer.play().catch(() => {});
        }, 1500);
    });
    
    const likeBtn = videoEl.querySelector('.action-btn[data-video-id]');
    likeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleLike(video.id, likeBtn);
    });
}

// ==================== DOUBLE TAP TO LIKE ====================
function handleDoubleTap(videoId, heartEl, videoEl) {
    heartEl.classList.remove('animate');
    void heartEl.offsetWidth;
    heartEl.classList.add('animate');
    
    const likeBtn = videoEl.querySelector('.action-btn[data-video-id]');
    if (likeBtn && !likeBtn.classList.contains('liked')) {
        toggleLike(videoId, likeBtn);
    }
    
    setTimeout(() => {
        heartEl.classList.remove('animate');
    }, 800);
}

// ==================== INTERSECTION OBSERVER ====================
let videoObserver;
function setupIntersectionObserver() {
    if (videoObserver) videoObserver.disconnect();
    
    const options = {
        root: document.getElementById('video-container'),
        threshold: 0.6
    };
    
    videoObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const video = entry.target.querySelector('.video-player');
            const index = parseInt(entry.target.dataset.index);
            
            if (entry.isIntersecting) {
                currentVideoIndex = index;
                currentVideoId = entry.target.dataset.id;
                video.play().catch(() => {});
                entry.target.classList.remove('paused');
            } else {
                video.pause();
                video.currentTime = 0;
                entry.target.classList.add('paused');
            }
        });
    }, options);
    
    document.querySelectorAll('.video-item').forEach(item => {
        videoObserver.observe(item);
    });
}

// ==================== SCROLL OBSERVER (Infinite Scroll) ====================
function setupScrollObserver() {
    const container = document.getElementById('video-container');
    
    container.addEventListener('scroll', () => {
        const scrollTop = container.scrollTop;
        const scrollHeight = container.scrollHeight;
        const clientHeight = container.clientHeight;
        
        if (scrollTop + clientHeight >= scrollHeight - 200) {
            if (!isLoadingMore && hasMoreVideos) {
                isLoadingMore = true;
                loadVideos().then(() => {
                    isLoadingMore = false;
                    document.querySelectorAll('.video-item:not([data-observed])').forEach(item => {
                        item.dataset.observed = 'true';
                        videoObserver.observe(item);
                    });
                });
            }
        }
    });
    
    // Pull to refresh
    let touchStartY = 0;
    let isPulling = false;
    
    container.addEventListener('touchstart', (e) => {
        if (container.scrollTop === 0) {
            touchStartY = e.touches[0].clientY;
            isPulling = true;
        }
    }, { passive: true });
    
    container.addEventListener('touchmove', (e) => {
        if (!isPulling) return;
        const touchY = e.touches[0].clientY;
        const diff = touchY - touchStartY;
        
        if (diff > 60 && container.scrollTop <= 0) {
            document.getElementById('pull-refresh').classList.add('visible');
        }
    }, { passive: true });
    
    container.addEventListener('touchend', () => {
        if (isPulling) {
            const refreshEl = document.getElementById('pull-refresh');
            if (refreshEl.classList.contains('visible')) {
                refreshEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Refreshing...';
                setTimeout(() => {
                    videos = [];
                    lastDoc = null;
                    hasMoreVideos = true;
                    document.getElementById('video-container').innerHTML = `
                        <div class="loading-videos" id="loading">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p>Loading videos...</p>
                        </div>
                    `;
                    loadVideos();
                    refreshEl.classList.remove('visible');
                    refreshEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Pull to refresh';
                }, 800);
            }
            isPulling = false;
        }
    });
}

// ==================== FOLLOW/UNFOLLOW (Data-Driven) ====================
window.toggleFollow = async (userId) => {
    if (userId === currentUser.uid) {
        showToast("You can't follow yourself!", "error");
        return;
    }
    
    const isFollowing = followingList.includes(userId);
    const userRef = doc(db, "users", currentUser.uid);
    const targetUserRef = doc(db, "users", userId);
    
    try {
        if (isFollowing) {
            await updateDoc(userRef, { following: arrayRemove(userId) });
            await updateDoc(targetUserRef, { followers: arrayRemove(currentUser.uid) });
            followingList = followingList.filter(id => id !== userId);
            showToast("Unfollowed");
        } else {
            await updateDoc(userRef, { following: arrayUnion(userId) });
            await updateDoc(targetUserRef, { followers: arrayUnion(currentUser.uid) });
            followingList.push(userId);
            showToast("Following now!");
        }
        
        updateFollowButtons(userId);
        
    } catch (error) {
        console.error("Follow error:", error);
        showToast("Failed to update follow status", "error");
    }
};

function updateFollowButtons(userId) {
    const isFollowing = followingList.includes(userId);
    
    document.querySelectorAll(`.follow-mini[data-user-id="${userId}"]`).forEach(btn => {
        if (isFollowing) {
            btn.innerHTML = '<i class="fas fa-check"></i>';
            btn.classList.add('following');
            btn.onclick = (e) => {
                e.stopPropagation();
                toggleFollow(userId);
            };
        } else {
            btn.innerHTML = '<i class="fas fa-plus"></i>';
            btn.classList.remove('following');
            btn.onclick = (e) => {
                e.stopPropagation();
                toggleFollow(userId);
            };
        }
    });
}

// ==================== LIKE/UNLIKE ====================
window.toggleLike = async (videoId, btn) => {
    const isLiked = btn.classList.contains('liked');
    const countEl = document.getElementById(`likes-${videoId}`);
    let currentLikes = parseInt(countEl.textContent) || 0;
    
    if (isLiked) {
        btn.classList.remove('liked');
        btn.querySelector('i').classList.replace('fas', 'far');
        countEl.textContent = Math.max(0, currentLikes - 1);
    } else {
        btn.classList.add('liked');
        btn.querySelector('i').classList.replace('far', 'fas');
        countEl.textContent = currentLikes + 1;
        btn.style.transform = 'scale(1.3)';
        setTimeout(() => btn.style.transform = 'scale(1)', 200);
    }
    
    try {
        if (isLiked) {
            await updateDoc(doc(db, "posts", videoId), {
                likes: increment(-1),
                likedBy: arrayRemove(currentUser.uid)
            });
        } else {
            await updateDoc(doc(db, "posts", videoId), {
                likes: increment(1),
                likedBy: arrayUnion(currentUser.uid)
            });
        }
    } catch (error) {
        console.error("Like error:", error);
        if (isLiked) {
            btn.classList.add('liked');
            btn.querySelector('i').classList.replace('far', 'fas');
            countEl.textContent = currentLikes;
        } else {
            btn.classList.remove('liked');
            btn.querySelector('i').classList.replace('fas', 'far');
            countEl.textContent = currentLikes;
        }
    }
};

// ==================== COMMENTS ====================
let currentCommentVideoId = null;
let commentsUnsubscribe = null;

window.openComments = async (videoId) => {
    currentCommentVideoId = videoId;
    document.getElementById('drawer-backdrop').classList.add('active');
    document.getElementById('comments-drawer').classList.add('active');
    
    const currentVideo = document.querySelectorAll('.video-player')[currentVideoIndex];
    if (currentVideo) currentVideo.pause();
    
    loadComments(videoId);
};

window.closeComments = () => {
    document.getElementById('drawer-backdrop').classList.remove('active');
    document.getElementById('comments-drawer').classList.remove('active');
    
    if (commentsUnsubscribe) {
        commentsUnsubscribe();
        commentsUnsubscribe = null;
    }
    
    const currentVideo = document.querySelectorAll('.video-player')[currentVideoIndex];
    if (currentVideo) currentVideo.play().catch(() => {});
};

async function loadComments(videoId) {
    const list = document.getElementById('comments-list');
    list.innerHTML = '<div style="text-align:center;padding:20px;"><i class="fas fa-spinner fa-spin" style="color:#ff6a00;"></i> Loading...</div>';
    
    const q = query(
        collection(db, "posts", videoId, "comments"),
        orderBy("timestamp", "asc")
    );
    
    commentsUnsubscribe = onSnapshot(q, (snapshot) => {
        list.innerHTML = '';
        document.getElementById('comments-count').textContent = `${snapshot.size} comments`;
        
        const countBadge = document.getElementById(`comments-count-${videoId}`);
        if (countBadge) countBadge.textContent = snapshot.size;
        
        if (snapshot.empty) {
            list.innerHTML = '<div style="text-align:center;padding:40px;color:#94a3b8;"><i class="fas fa-comment-slash" style="font-size:40px;margin-bottom:10px;color:#cbd5e1;"></i><br>No comments yet. Be the first!</div>';
            return;
        }
        
        snapshot.forEach(docSnap => {
            const comment = docSnap.data();
            const item = document.createElement('div');
            item.className = 'comment-item';
            item.innerHTML = `
                <img src="${comment.userAvatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(comment.username || 'U')}&background=ff6a00&color=fff`}" class="comment-avatar" onclick="goToProfile('${comment.userId}')" loading="lazy">
                <div class="comment-body">
                    <div class="comment-username" onclick="goToProfile('${comment.userId}')">@${escapeHtml(comment.username || 'user')}</div>
                    <div class="comment-text">${escapeHtml(comment.text)}</div>
                    <div class="comment-time">${formatTime(comment.timestamp?.toDate())}</div>
                </div>
            `;
            list.appendChild(item);
        });
        
        list.scrollTop = list.scrollHeight;
    });
}

window.submitComment = async () => {
    const input = document.getElementById('comment-input');
    const text = input.value.trim();
    if (!text || !currentCommentVideoId) return;
    
    const video = videos.find(v => v.id === currentCommentVideoId);
    
    try {
        await addDoc(collection(db, "posts", currentCommentVideoId, "comments"), {
            userId: currentUser.uid,
            username: video?.username || currentUser.displayName || 'User',
            userAvatar: userCache[currentUser.uid]?.avatar || '',
            text: text,
            timestamp: serverTimestamp()
        });
        
        await updateDoc(doc(db, "posts", currentCommentVideoId), {
            commentCount: increment(1)
        });
        
        input.value = '';
    } catch (error) {
        console.error("Comment error:", error);
        showToast("Failed to post comment", "error");
    }
};

document.getElementById('comment-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') submitComment();
});

// ==================== SHARE ====================
window.shareVideo = async (videoId) => {
    const video = videos.find(v => v.id === videoId);
    if (!video) return;
    
    const shareUrl = window.location.origin + '/videos.html?video=' + videoId;
    
    if (navigator.share) {
        try {
            await navigator.share({
                title: 'Check out this video on CashClique',
                text: video.content || 'Watch this video!',
                url: shareUrl
            });
        } catch (err) {}
    } else {
        navigator.clipboard.writeText(shareUrl);
        showToast('Link copied to clipboard!', 'success');
    }
};

// ==================== NAVIGATION ====================
window.goToProfile = (userId) => {
    window.location.href = `profile.html?uid=${userId}`;
};

window.toggleSidebar = () => {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('sidebar-overlay').classList.toggle('active');
};

document.getElementById('logout').addEventListener('click', (e) => {
    e.preventDefault();
    signOut(auth).then(() => window.location.href = "login.html");
});

// ==================== UTILITIES ====================
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatTime(date) {
    if (!date) return 'Just now';
    const diff = Math.floor((new Date() - date) / 1000);
    if (diff < 60) return 'Just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
    return date.toLocaleDateString();
}

function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${message}`;
    toast.className = `toast show ${type}`;
    setTimeout(() => toast.classList.remove('show'), 3000);
}

function showEmptyState() {
    const container = document.getElementById('video-container');
    container.innerHTML = `
        <div class="empty-videos">
            <i class="fas fa-video-slash"></i>
            <h2>No Videos Yet</h2>
            <p>Be the first to upload a video!</p>
            <button class="upload-video-btn" onclick="window.location.href='post.html'">
                <i class="fas fa-plus"></i> Upload Video
            </button>
        </div>
    `;
}

// ==================== KEYBOARD NAVIGATION ====================
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        scrollToVideo(currentVideoIndex + 1);
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        scrollToVideo(currentVideoIndex - 1);
    } else if (e.key === ' ') {
        e.preventDefault();
        const video = document.querySelectorAll('.video-player')[currentVideoIndex];
        if (video) {
            if (video.paused) video.play().catch(() => {});
            else video.pause();
        }
    }
});

function scrollToVideo(index) {
    if (index < 0 || index >= videos.length) return;
    const videoEl = document.querySelectorAll('.video-item')[index];
    if (videoEl) {
        videoEl.scrollIntoView({ behavior: 'smooth' });
    }
}

// ==================== DEEP LINKING ====================
window.addEventListener('load', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('video');
    if (videoId) {
        const checkAndScroll = setInterval(() => {
            const index = videos.findIndex(v => v.id === videoId);
            if (index !== -1) {
                clearInterval(checkAndScroll);
                setTimeout(() => scrollToVideo(index), 500);
            }
        }, 100);
        setTimeout(() => clearInterval(checkAndScroll), 5000);
    }
});
</script>
</body>
</html>
