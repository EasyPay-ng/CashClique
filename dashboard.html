<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f5f5;
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#ff6a00;
color:white;
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
position:fixed;
height:100%;
}

.sidebar img{
width:45px;
border-radius:10px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:600;
font-size:18px;
}

.sidebar a{
color:white;
text-decoration:none;
padding:10px;
border-radius:8px;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
}

/* MAIN */

.main{
margin-left:240px;
width:100%;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.user{
display:flex;
align-items:center;
gap:10px;
}

.user img{
width:35px;
height:35px;
border-radius:50%;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.card p{
font-size:22px;
font-weight:600;
color:#ff6a00;
}

/* FEED */

.feed{
display:flex;
flex-direction:column;
gap:20px;
}

.post{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
position:relative;
}

.post-header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.post-header img{
width:35px;
height:35px;
border-radius:50%;
cursor:pointer;
}

.post-time{
font-size:12px;
color:gray;
}

.post-image{
margin-top:10px;
width:100%;
border-radius:12px;
cursor:pointer;
}

.post-video{
margin-top:10px;
width:100%;
border-radius:12px;
cursor:pointer;
}

.post-actions{
display:flex;
gap:20px;
margin-top:10px;
font-size:14px;
color:gray;
}

.comments{
margin-top:10px;
border-top:1px solid #eee;
padding-top:10px;
}

.create-btn{
position:fixed;
bottom:25px;
right:25px;
background:#ff6a00;
color:white;
border:none;
width:60px;
height:60px;
border-radius:50%;
font-size:30px;
cursor:pointer;
}

/* MEDIA VIEWER */

.media-viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.media-viewer img,
.media-viewer video{
max-width:95%;
max-height:95%;
border-radius:10px;
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
transform:translateX(-100%);
}

.sidebar.active{
transform:translateX(0);
}

.main{
margin-left:0;
}

}

</style>
</head>

<body>

<!-- MEDIA VIEWER -->
<div class="media-viewer" id="mediaViewer" onclick="closeViewer()">
<img id="viewerImg">
<video id="viewerVideo" controls></video>
</div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<div class="logo">
<img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
CashClique
</div>

<a href="#">🏠 Dashboard</a>
<a href="my-content.html">📝 My Content</a>
<a href="earnings.html">💰 Earnings</a>
<a href="opportunities.html">🔥 Opportunities</a>
<a href="settings.html">⚙ Settings</a>
<a href="#" id="logout">🚪 Logout</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">
<div onclick="toggleMenu()">☰</div>
<div class="user">
<img src="https://i.pravatar.cc/150">
<span id="username">User</span>
</div>
</div>

<div class="stats">
<div class="card"><h3>Total Earnings</h3><p id="earnings">$0</p></div>
<div class="card"><h3>Total Posts</h3><p id="total-posts">0</p></div>
<div class="card"><h3>Followers</h3><p>0</p></div>
<div class="card"><h3>Engagement</h3><p>0%</p></div>
</div>

<div class="feed" id="feed"></div>

</div>

<button class="create-btn" onclick="window.location.href='post.html'">+</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getAuth,onAuthStateChanged,signOut }

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {

getFirestore,
collection,
doc,
addDoc,
onSnapshot,
updateDoc,
increment,
serverTimestamp,
query,
orderBy,
getDoc,
setDoc

}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig={
apiKey:"AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
authDomain:"cashclique-31718.firebaseapp.com",
projectId:"cashclique-31718",
storageBucket:"cashclique-31718.firebasestorage.app",
messagingSenderId:"1064282591269",
appId:"1:1064282591269:web:17fbaf9b683d5b0dfbafcc"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let currentUser=null;
const feed=document.getElementById("feed");

function formatDate(ts){

if(!ts) return "";

return ts.toDate().toLocaleString();

}

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href="login.html";

return;

}

currentUser=user;

document.getElementById("username").innerText=user.email;

const postsQuery=query(
collection(db,"posts"),
orderBy("timestamp","desc")
);

onSnapshot(postsQuery,(snapshot)=>{

feed.innerHTML="";
document.getElementById("total-posts").innerText=snapshot.size;

snapshot.forEach((postDoc)=>{

const post=postDoc.data();
const postId=postDoc.id;

let media="";

if(post.image){

media=`<img src="${post.image}" class="post-image" onclick="openViewer('${post.image}','image')">`;
}

if(post.video){

media=`<video src="${post.video}" class="post-video" onclick="openViewer('${post.video}','video')"></video>`;
}

const div=document.createElement("div");
div.className="post";

div.innerHTML=`

<div class="post-header">

<img src="https://i.pravatar.cc/150?u=${post.userId}">

<div>
<b>${post.username}</b>
<div class="post-time">${formatDate(post.timestamp)}</div>
</div>

</div>

<p>${post.content||""}</p>

${media}

<div class="post-actions">

<span class="like-btn" data-id="${postId}">❤️ ${post.likes||0}</span>

<span>👁 ${post.views||0}</span>

<span onclick="toggleComments('${postId}')">💬 Comment</span>

</div>

<div class="comments" id="comments-${postId}" style="display:none">

<div id="comment-list-${postId}"></div>

<input id="comment-input-${postId}" placeholder="Write comment..." style="width:100%;padding:8px;margin-top:10px">

<button onclick="addComment('${postId}')">Post</button>

</div>

`;

feed.appendChild(div);

trackViews(div,postId);
loadComments(postId);

});

attachLikeEvents();

});

});

/* LIKE SYSTEM */

async function attachLikeEvents(){

document.querySelectorAll(".like-btn").forEach(btn=>{

btn.onclick=async()=>{

const postId=btn.dataset.id;

const likeRef=doc(db,"posts",postId,"likes",currentUser.uid);
const likeSnap=await getDoc(likeRef);

if(likeSnap.exists()){

alert("You already liked this post");
return;

}

await setDoc(likeRef,{userId:currentUser.uid});

await updateDoc(doc(db,"posts",postId),{
likes:increment(1)
});

};

});

}

/* VIEW SYSTEM */

function trackViews(postEl,postId){

let viewed=false;
let timer=null;

const observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

if(entry.isIntersecting && !viewed){

timer=setTimeout(async()=>{

const viewRef=doc(db,"posts",postId,"viewers",currentUser.uid);

const snap=await getDoc(viewRef);

if(!snap.exists()){

await setDoc(viewRef,{userId:currentUser.uid});

await updateDoc(doc(db,"posts",postId),{
views:increment(1)
});

}

viewed=true;

},3000);

}else{

clearTimeout(timer);

}

});

},{threshold:0.6});

observer.observe(postEl);

}

/* COMMENTS */

function loadComments(postId){

const q=query(
collection(db,"posts",postId,"comments"),
orderBy("timestamp","asc")
);

onSnapshot(q,(snap)=>{

const list=document.getElementById(`comment-list-${postId}`);
if(!list) return;

list.innerHTML="";

snap.forEach(c=>{

const data=c.data();

const div=document.createElement("div");

div.innerHTML=`<b>${data.username}</b>: ${data.text}`;

list.appendChild(div);

});

});

}

window.toggleComments=function(id){

const box=document.getElementById("comments-"+id);

box.style.display = box.style.display==="none" ? "block" : "none";

}

window.addComment=async function(postId){

const input=document.getElementById(`comment-input-${postId}`);
const text=input.value.trim();

if(!text) return;

await addDoc(collection(db,"posts",postId,"comments"),{

userId:currentUser.uid,
username:currentUser.email,
text:text,
timestamp:serverTimestamp()

});

input.value="";

}

/* MEDIA VIEWER */

window.openViewer=function(src,type){

const viewer=document.getElementById("mediaViewer");
const img=document.getElementById("viewerImg");
const vid=document.getElementById("viewerVideo");

img.style.display="none";
vid.style.display="none";

if(type==="image"){

img.src=src;
img.style.display="block";

}

if(type==="video"){

vid.src=src;
vid.style.display="block";

}

viewer.style.display="flex";

}

window.closeViewer=function(){

document.getElementById("mediaViewer").style.display="none";

document.getElementById("viewerVideo").pause();

}

/* LOGOUT */

document.getElementById("logout").onclick=()=>{
signOut(auth).then(()=>window.location.href="login.html")
}

</script>

<script>

function toggleMenu(){

document.getElementById("sidebar").classList.toggle("active")

}

</script>

</body>
</html>
