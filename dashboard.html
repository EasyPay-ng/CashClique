<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CashClique Dashboard</title>
<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#f5f5f5;display:flex;min-height:100vh;position:relative}

/* LOADING */
#loading{
  position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;color:#ff6a00;z-index:9999;
}

/* SIDEBAR */
.sidebar{width:240px;background:#ff6a00;color:white;padding:20px;height:100vh;position:fixed;display:flex;flex-direction:column;gap:20px;transition:transform 0.3s}
.sidebar a{color:white;text-decoration:none;padding:10px;border-radius:8px}
.sidebar a:hover{background:rgba(255,255,255,0.2)}
.logo{display:flex;align-items:center;gap:10px;font-weight:600}
.logo img{width:40px;border-radius:8px}

/* MAIN */
.main{margin-left:240px;padding:20px;width:100%;display:none;}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.header-right{display:flex;align-items:center;gap:20px}

/* NOTIFICATION */
.notification{font-size:22px;cursor:pointer;position:relative}
.notification-count{position:absolute;top:-6px;right:-8px;background:red;color:white;font-size:11px;padding:2px 6px;border-radius:50%;display:none}

/* STATS */
.card{background:white;padding:20px;border-radius:10px;margin-bottom:20px}
.card h3{font-size:16px}
.card p{font-size:22px;color:#ff6a00;font-weight:600}

/* FEED */
.feed{display:flex;flex-direction:column;gap:20px}
.post{background:white;padding:20px;border-radius:10px}
.post-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.post-header img{width:35px;height:35px;border-radius:50%}
.post-image{width:100%;border-radius:10px;margin-top:10px;cursor:pointer}
.post-actions{display:flex;gap:20px;margin-top:10px;color:gray;font-size:14px}

/* MEDIA VIEWER */
.media-viewer{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:9999}
.media-viewer img{max-width:95%;max-height:95%;border-radius:10px}

/* NOTIFICATIONS */
.notifications-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center}
.notifications-box{background:white;width:400px;max-height:80vh;overflow:auto;border-radius:10px;padding:20px}
.notification-item{padding:10px;border-bottom:1px solid #eee}

/* MOBILE */
@media(max-width:900px){
.sidebar{transform:translateX(-100%)}
.sidebar.active{transform:translateX(0)}
.main{margin-left:0}
}
</style>
</head>
<body>

<div id="loading">Loading dashboard...</div>

<!-- MEDIA VIEWER -->
<div class="media-viewer" id="mediaViewer" onclick="closeViewer()">
<img id="viewerImg">
</div>

<!-- NOTIFICATIONS -->
<div class="notifications-overlay" id="notificationsOverlay" onclick="closeNotifications()">
<div class="notifications-box" onclick="event.stopPropagation()">
<h3>Notifications</h3>
<div id="notificationsList"></div>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div class="logo">
<img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
CashClique
</div>
<a href="#">🏠 Dashboard</a>
<a href="my-content.html">📝 My Content</a>
<a href="settings.html">⚙ Settings</a>
<a href="#" id="logout">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">
<div class="header">
<div onclick="toggleMenu()">☰</div>
<div class="header-right">
<div class="notification" onclick="openNotifications()">
🔔<span id="notificationCount" class="notification-count">0</span>
</div>
<span id="username"></span>
</div>
</div>

<div class="card">
<h3>Total Posts</h3>
<p id="total-posts">0</p>
</div>

<div class="feed" id="feed"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore,collection,query,orderBy,onSnapshot,doc,updateDoc,increment,addDoc,serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

// --- Firebase config ---
const firebaseConfig = {
  apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
  authDomain: "cashclique-31718.firebaseapp.com",
  projectId: "cashclique-31718",
  storageBucket: "cashclique-31718.firebasestorage.app",
  messagingSenderId: "1064282591269",
  appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc",
  measurementId: "G-V5WHJB6LS0"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null;
const feed=document.getElementById("feed");
const mainContent=document.querySelector(".main");
const loadingDiv=document.getElementById("loading");

// --- Auth check ---
onAuthStateChanged(auth, (user)=>{
  if(user){
    currentUser = user;
    document.getElementById("username").innerText = user.email;
    mainContent.style.display = "block";
    loadingDiv.style.display = "none";
    loadFeed();
  } else {
    window.location.href = "login.html";
  }
});

// --- Load feed ---
function loadFeed(){
  const postsQuery=query(collection(db,"posts"),orderBy("timestamp","desc"));
  onSnapshot(postsQuery,(snapshot)=>{
    feed.innerHTML="";
    document.getElementById("total-posts").innerText=snapshot.size;

    snapshot.forEach(docSnap=>{
      const post=docSnap.data();
      const postId=docSnap.id;
      let imageHTML="";
      if(post.imageBase64){
        imageHTML=`<img src="${post.imageBase64}" class="post-image" onclick="openViewer('${post.imageBase64}')">`;
      }
      const div=document.createElement("div");
      div.className="post";
      div.innerHTML=`
        <div class="post-header">
          <img src="https://i.pravatar.cc/150?u=${post.userId}">
          <div>
            <b>${post.username}</b>
            <div style="font-size:12px;color:gray">${post.timestamp ? post.timestamp.toDate().toLocaleString() : ''}</div>
          </div>
        </div>
        <p>${post.content || ""}</p>
        ${imageHTML}
        <div class="post-actions">
          <span onclick="likePost('${postId}')">❤️ ${post.likes || 0}</span>
          <span>👁 ${post.views || 0}</span>
          <span onclick="commentPost('${postId}')">💬 Comment</span>
        </div>
      `;
      feed.appendChild(div);
    });
  });
}

// --- Like post ---
window.likePost=async function(postId){
  const ref=doc(db,"posts",postId);
  await updateDoc(ref,{likes:increment(1)});
}

// --- Comment post ---
window.commentPost=async function(postId){
  const text=prompt("Write comment");
  if(!text) return;
  await addDoc(collection(db,"posts",postId,"comments"),{
    user:currentUser.email,
    text:text,
    timestamp:serverTimestamp()
  });
}

// --- Media viewer ---
window.openViewer=function(src){
  const viewer=document.getElementById("mediaViewer");
  const img=document.getElementById("viewerImg");
  img.src=src;
  viewer.style.display="flex";
}
window.closeViewer=function(){
  document.getElementById("mediaViewer").style.display="none";
}

// --- Notifications ---
window.openNotifications=function(){document.getElementById("notificationsOverlay").style.display="flex";}
window.closeNotifications=function(){document.getElementById("notificationsOverlay").style.display="none";}

// --- Logout ---
document.getElementById("logout").onclick=()=>{
  signOut(auth).then(()=>{window.location.href="login.html";});
}

// --- Mobile menu ---
function toggleMenu(){document.getElementById("sidebar").classList.toggle("active")}
</script>

</body>
</html>
