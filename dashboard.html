<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard | CashClique</title>

<link rel="manifest" href="/manifest.json">

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f6f8;display:flex;min-height:100vh;}
.sidebar{width:240px;background:#ff6a00;color:white;padding:20px;display:flex;flex-direction:column;gap:20px;position:fixed;height:100%;transition:0.3s;z-index:999;}
.sidebar img{width:45px;border-radius:10px;}
.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:18px;}
.sidebar a{color:white;text-decoration:none;padding:12px;border-radius:8px;transition:0.3s;display:flex;align-items:center;gap:10px;}
.sidebar a:hover{background:rgba(255,255,255,0.2);}
.sidebar a.active{background:rgba(255,255,255,0.2);}
.sidebar i{width:20px;text-align:center;}
.main{margin-left:240px;width:calc(100% - 240px);padding:20px 32px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.notification-bell{position:relative;cursor:pointer;font-size:20px;}
.badge{position:absolute;top:0;right:0;background:red;color:white;font-size:10px;border-radius:50%;display:none;}
.feed{display:flex;flex-direction:column;gap:20px;}
.post{background:white;padding:20px;border-radius:16px;}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">
        <img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg"> CashClique
    </div>
</div>

<div class="main">
    <div class="header">
        <div></div>
        <div class="notification-bell">
            <i class="fas fa-bell"></i>
            <span class="badge" id="notif-count">0</span>
        </div>
    </div>

    <div class="feed" id="feed">
        <p>Loading...</p>
    </div>
</div>

<script type="module">

/* ================= FIREBASE IMPORTS ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
    getAuth, 
    onAuthStateChanged, 
    signOut 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
    getFirestore, 
    collection, 
    doc, 
    onSnapshot, 
    updateDoc, 
    increment, 
    serverTimestamp, 
    query, 
    orderBy, 
    addDoc, 
    arrayUnion, 
    writeBatch, 
    getDoc, 
    getDocs, 
    runTransaction, 
    where 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ✅ FCM IMPORT */
import { 
    getMessaging, 
    getToken, 
    onMessage 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

/* ================= CONFIG ================= */
const firebaseConfig = {
    apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
    authDomain: "cashclique-31718.firebaseapp.com",
    projectId: "cashclique-31718",
    storageBucket: "cashclique-31718.firebasestorage.app",
    messagingSenderId: "1064282591269",
    appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc"
};

/* ================= INIT ================= */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ✅ FCM INIT */
const messaging = getMessaging(app);

/* ================= PUSH ================= */
async function setupPushNotifications(currentUser) {
  try {
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') return;

    const token = await getToken(messaging, { 
      vapidKey: "BC3tPo2214pVm2EsUTT4esaS_UfDHY_Gkh948zqU7xsPztiZXE03CdPXiKncElOKXoRJC1i1KwP7RtA0Us7-qgg" 
    });

    if (token) {
      await updateDoc(doc(db, "users", currentUser.uid), {
        pushTokens: arrayUnion(token)
      });
    }

    onMessage(messaging, (payload) => {
      alert(payload.notification?.title + " - " + payload.notification?.body);
    });

  } catch (error) {
    console.error(error);
  }
}

let currentUser = null;

/* AUTH */
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    currentUser = user;

    /* ✅ FCM CALL */
    setupPushNotifications(user);

    loadFeed();
});
    function loadFeed() {
    const feed = document.getElementById("feed");

    onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
        feed.innerHTML = "";

        snap.forEach(docSnap => {
            const post = docSnap.data();

            const div = document.createElement("div");
            div.className = "post";

            div.innerHTML = `
                <p>${post.content || "No content"}</p>
                <small>${post.likes || 0} likes</small>
            `;

            feed.appendChild(div);
        });
    });
}

/* LOGOUT */
document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
        signOut(auth);
    }
});

</script>
</body>
</html>
