<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;display:flex;min-height:100vh;}
.sidebar{width:240px;background:#ff6a00;color:white;padding:20px;display:flex;flex-direction:column;gap:20px;position:fixed;height:100%;transition:0.3s;z-index:999;}
.sidebar img{width:45px;border-radius:10px;}
.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:18px;}
.sidebar a{color:white;text-decoration:none;padding:10px;border-radius:8px;transition:0.3s;}
.sidebar a:hover{background:rgba(255,255,255,0.2);}

.main{margin-left:240px;width:100%;padding:20px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;}
.header-right{display:flex;align-items:center;gap:15px;}
.user{display:flex;align-items:center;gap:10px;cursor:pointer;}
.user img{width:35px;height:35px;border-radius:50%;}

.notification-bell{position:relative;cursor:pointer;font-size:24px;}
.badge{position:absolute;top:-8px;right:-8px;background:#ff0000;color:white;font-size:11px;min-width:18px;height:18px;padding:2px 5px;border-radius:50%;font-weight:600;display:none;text-align:center;line-height:14px;}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;margin-bottom:25px;}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.05);transition:0.3s;}
.card:hover{transform:translateY(-5px);}
.card h3{font-size:14px;color:gray;margin-bottom:10px;}
.card p{font-size:22px;font-weight:600;color:#ff6a00;}

.feed{display:flex;flex-direction:column;gap:20px;}
.post{background:white;padding:20px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.05);position:relative;}
.post-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;position:relative;padding-right:30px;}
.post-header img{width:35px;height:35px;border-radius:50%;cursor:pointer;}
.post-time{font-size:11px;color:#888;margin-left:auto;}
.post-actions{display:flex;gap:15px;margin-top:15px;color:gray;font-size:14px;align-items:center;flex-wrap:wrap;}
.action-item{display:flex;align-items:center;gap:5px;cursor:pointer;transition:0.2s;}
.action-item:hover{color:#ff6a00;}
.action-item.liked{color:#ff4444;}
.comments{margin-top:15px;padding-top:15px;border-top:1px solid #eee;}
.create-btn{position:fixed;bottom:25px;right:25px;background:#ff6a00;color:white;border:none;width:60px;height:60px;border-radius:50%;font-size:30px;cursor:pointer;box-shadow:0 10px 20px rgba(0,0,0,0.2);transition:0.3s;z-index:99;}
.create-btn:hover{transform:scale(1.1);}
.post-image{margin-top:10px;width:100%;max-height:400px;border-radius:12px;object-fit:cover;cursor:pointer;}
.three-dot{position:absolute;top:15px;right:15px;cursor:pointer;font-size:18px;}

/* Priority Badge */
.priority-badge{position:absolute;top:-5px;left:-5px;background:linear-gradient(135deg,#ff6a00,#ff8c00);color:white;padding:3px 8px;border-radius:15px;font-size:10px;font-weight:600;display:flex;align-items:center;gap:4px;}

/* Tip Modal */
.tip-modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:2000;}
.tip-content{background:white;padding:25px;border-radius:16px;width:90%;max-width:400px;text-align:center;}
.tip-content h3{color:#ff6a00;margin-bottom:15px;}
.tip-options{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0;}
.tip-btn{padding:12px;background:#f5f5f5;border:2px solid #eee;border-radius:10px;cursor:pointer;font-weight:600;transition:0.2s;}
.tip-btn:hover{background:#ff6a00;color:white;border-color:#ff6a00;}
.tip-btn.selected{background:#ff6a00;color:white;border-color:#ff6a00;}
.custom-tip{width:100%;padding:12px;border:2px solid #eee;border-radius:10px;margin:15px 0;font-size:16px;outline:none;}
.custom-tip:focus{border-color:#ff6a00;}
.send-tip-btn{background:#ff6a00;color:white;border:none;padding:14px 30px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;width:100%;transition:0.2s;}
.send-tip-btn:hover{background:#e96c00;}
.send-tip-btn:disabled{opacity:0.5;cursor:not-allowed;}
.cancel-tip{margin-top:10px;color:#666;cursor:pointer;font-size:14px;}
.cancel-tip:hover{color:#ff6a00;}

/* Media Viewer */
.media-modal{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:2000;cursor:zoom-out;}
.media-modal img{max-width:95%;max-height:95vh;border-radius:8px;}
.close-modal{position:absolute;top:20px;right:25px;color:white;font-size:35px;cursor:pointer;}

/* Notifications */
.notification-overlay{position:fixed;top:70px;right:20px;width:350px;background:white;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,0.2);display:none;z-index:1000;overflow:hidden;max-height:80vh;}
.notification-header{padding:15px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;font-weight:600;background:#fafafa;}
.notification-panel{max-height:400px;overflow-y:auto;}
.notification-item{padding:12px 15px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:0.2s;display:flex;gap:12px;align-items:flex-start;}
.notification-item:hover{background:#f8f8f8;}
.notification-item.unread{background:#fff3e0;border-left:3px solid #ff6a00;}
.notification-item:last-child{border-bottom:none;}
.notif-icon{font-size:24px;flex-shrink:0;}
.notif-content{flex:1;}
.notif-content strong{display:block;font-size:13px;margin-bottom:2px;}
.notif-content small{color:#888;font-size:11px;}
.empty-notif{padding:40px 20px;text-align:center;color:#888;font-size:14px;}

.menu-btn{display:none;font-size:22px;cursor:pointer;}

@media(max-width:900px){
.sidebar{transform:translateX(-100%);}
.sidebar.active{transform:translateX(0);}
.main{margin-left:0;}
.menu-btn{display:block;}
.notification-overlay{right:10px;left:10px;width:auto;}
.post-time{display:block;margin-left:0;margin-top:5px;}
.tip-options{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div class="logo">
<img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
CashClique
</div>
<a href="#">🏠 Dashboard</a>
<a href="my-content.html">📝 My Content</a>
<a href="earnings.html">💰 Earnings</a>
<a href="opportunities.html">🔥 Opportunities</a>
<a href="settings.html">⚙ Settings</a>
<a href="#" id="logout">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">
<div class="header">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="header-right">
        <div class="notification-bell" id="notification-bell">
            🔔
            <span class="badge" id="notif-count">0</span>
        </div>
        <div class="user" onclick="window.location.href='profile.html'">
            <img id="user-avatar" src="https://i.pravatar.cc/150?img=3">
            <span id="username">Loading...</span>
        </div>
    </div>
</div>

<!-- STATS -->
<div class="stats">
    <div class="card">
        <h3>Total Posts</h3>
        <p id="total-posts">0</p>
    </div>
    <div class="card">
        <h3>Your Balance</h3>
        <p id="user-balance">$0.00</p>
    </div>
</div>

<!-- FEED -->
<div class="feed" id="feed"></div>
</div>

<button class="create-btn" onclick="window.location.href='post.html'">+</button>

<!-- Media Viewer -->
<div class="media-modal" id="media-modal" onclick="closeMediaModal()">
    <span class="close-modal">&times;</span>
    <img id="modal-image" src="">
</div>

<!-- Tip Modal -->
<div class="tip-modal" id="tip-modal">
    <div class="tip-content">
        <h3>💰 Send a Tip</h3>
        <p style="color:#666;margin-bottom:10px;">Support <span id="tip-recipient">this creator</span></p>
        <p style="font-size:14px;color:#888;margin-bottom:15px;">Your balance: <strong id="modal-balance">$0.00</strong></p>
        
        <div class="tip-options">
            <button class="tip-btn" data-amount="1">$1</button>
            <button class="tip-btn" data-amount="5">$5</button>
            <button class="tip-btn" data-amount="10">$10</button>
            <button class="tip-btn" data-amount="20">$20</button>
            <button class="tip-btn" data-amount="50">$50</button>
            <button class="tip-btn" data-amount="100">$100</button>
        </div>
        
        <input type="number" class="custom-tip" id="custom-tip" placeholder="Enter custom amount" step="0.01" min="0.01">
        
        <button class="send-tip-btn" id="send-tip-btn">Send Tip</button>
        <div class="cancel-tip" onclick="closeTipModal()">Cancel</div>
    </div>
</div>

<!-- Notifications Overlay -->
<div class="notification-overlay" id="notification-overlay">
    <div class="notification-header">
        <span>🔔 Notifications</span>
        <span style="font-size:12px;color:#ff6a00;cursor:pointer;" id="mark-all-read">Mark all read</span>
    </div>
    <div class="notification-panel" id="notification-panel"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, doc, onSnapshot, updateDoc, increment, serverTimestamp, query, orderBy, addDoc, arrayUnion, writeBatch, getDoc, getDocs, setDoc, where, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
    authDomain: "cashclique-31718.firebaseapp.com",
    projectId: "cashclique-31718",
    storageBucket: "cashclique-31718.firebasestorage.app",
    messagingSenderId: "1064282591269",
    appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc",
    measurementId: "G-V5WHJB6LS0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const feed = document.getElementById("feed");
let currentUser = null;
let currentUsername = "User";
let currentBalance = 0;
let viewTimers = {};
let followingList = [];

// ================= AUTH & USER =================
onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "login.html"; return; }
    currentUser = user;

    // Load user data
    const userRef = doc(db, "users", user.uid);
    onSnapshot(userRef, (snap) => {
        if (snap.exists()) {
            const data = snap.data();
            currentUsername = data.username || user.email?.split('@')[0] || "User";
            currentBalance = data.balance || 0;
            followingList = data.following || [];
            document.getElementById("username").innerText = currentUsername;
            document.getElementById("user-avatar").src = data.avatar || `https://i.pravatar.cc/150?u=${user.uid}`;
            document.getElementById("user-balance").innerText = `$${currentBalance.toFixed(2)}`;
            document.getElementById("modal-balance").innerText = `$${currentBalance.toFixed(2)}`;
        } else {
            currentUsername = user.email?.split('@')[0] || "User";
            document.getElementById("username").innerText = currentUsername;
        }
    });

    // Real-time feed with algorithm
    loadFeed();

    // Real-time notifications
    loadNotifications();
});

// ================= SMART FEED ALGORITHM =================
async function loadFeed() {
    const postsQuery = query(collection(db, "posts"), orderBy("timestamp", "desc"));
    
    onSnapshot(postsQuery, async (snapshot) => {
        feed.innerHTML = "";
        document.getElementById("total-posts").innerText = snapshot.size;

        if (snapshot.empty) {
            feed.innerHTML = `<div class="post"><p>Welcome to CashClique! Create your first post to see it here. 🚀</p></div>`;
            return;
        }

        // Categorize posts
        const followedUnviewed = [];
        const followedViewed = [];
        const otherPosts = [];

        for (const postDoc of snapshot.docs) {
            const post = postDoc.data();
            const postId = postDoc.id;
            
            // Check if post is from followed user
            const isFromFollowed = followingList.includes(post.userId);
            const hasViewed = post.viewedBy && post.viewedBy.includes(currentUser.uid);
            
            const postData = { id: postId, ...post, isFromFollowed };
            
            if (isFromFollowed) {
                if (!hasViewed) {
                    followedUnviewed.push(postData);
                } else {
                    followedViewed.push(postData);
                }
            } else {
                otherPosts.push(postData);
            }
        }

        // Combine in priority order: unviewed from followed → other posts → viewed from followed
        const sortedPosts = [...followedUnviewed, ...otherPosts, ...followedViewed];

        // Render posts
        for (const post of sortedPosts) {
            await renderPost(post);
        }
        
        attachEventHandlers();
    });
}

// ================= RENDER POST =================
async function renderPost(post) {
    const postId = post.id;
    const isLiked = post.likedBy && post.likedBy.includes(currentUser.uid);
    const commentCount = post.commentCount || 0;
    const viewCount = post.views || 0;
    const hasViewed = post.viewedBy && post.viewedBy.includes(currentUser.uid);
    
    // Format timestamp
    const timestamp = post.timestamp ? formatTime(post.timestamp.toDate()) : "Just now";
    
    const postEl = document.createElement("div");
    postEl.className = "post";
    postEl.dataset.postId = postId;
    postEl.dataset.viewed = hasViewed;
    
    const imgHTML = post.imageBase64 ? 
        `<img src="${post.imageBase64}" class="post-image" onclick="viewImage(this.src)">` : '';

    // Priority badge for unviewed posts from followed users
    const priorityBadge = post.isFromFollowed && !hasViewed ? 
        `<div class="priority-badge">⭐ From Following</div>` : '';

    postEl.innerHTML = `
        ${priorityBadge}
        <div class="post-header">
            <img src="${post.userAvatar || 'https://i.pravatar.cc/150?u='+post.userId}" class="profile-pic" data-uid="${post.userId}">
            <div style="flex:1">
                <strong>${post.username || "Anonymous"}</strong>
                <div class="post-time">${timestamp}</div>
            </div>
            <span class="three-dot" onclick="openPostView('${postId}')">⋮</span>
        </div>
        <p>${post.content}</p>
        ${imgHTML}
        <div class="post-actions">
            <span class="action-item like-btn ${isLiked ? 'liked' : ''}" data-id="${postId}" data-owner="${post.userId}" data-liked="${isLiked}">
                ❤️ ${post.likes || 0}
            </span>
            <span class="action-item" onclick="toggleComments('${postId}')">
                💬 ${commentCount} ${commentCount === 1 ? 'Comment' : 'Comments'}
            </span>
            <span class="action-item">
                👁️ ${viewCount} ${viewCount === 1 ? 'View' : 'Views'}
            </span>
            <span class="action-item tip-jar" data-id="${postId}" data-owner="${post.userId}" data-username="${post.username}">
                💰 Tip
            </span>
        </div>
        <div class="comments" id="comments-${postId}" style="display:none">
            <div class="comment-list" id="comment-list-${postId}"></div>
            <div style="display:flex;gap:8px;margin-top:10px;">
                <input placeholder="Write a comment..." id="comment-input-${postId}" style="flex:1;padding:10px;border-radius:8px;border:1px solid #ddd;outline:none;"/>
                <button onclick="addComment('${postId}', '${post.userId}')" style="background:#ff6a00;color:white;border:none;padding:10px 15px;border-radius:8px;cursor:pointer;">Post</button>
            </div>
        </div>
    `;
    feed.appendChild(postEl);

    // Track view after 2 seconds
    if (!hasViewed) {
        trackView(postId);
    }

    // Profile click
    postEl.querySelector('.profile-pic').onclick = (e) => {
        const uid = e.target.dataset.uid;
        window.location.href = `profile.html?uid=${uid}`;
    };

    // Comments listener
    const commentsRef = query(collection(db, "posts", postId, "comments"), orderBy("timestamp", "asc"));
    onSnapshot(commentsRef, (cSnap) => {
        const list = document.getElementById(`comment-list-${postId}`);
        if (!list) return;
        list.innerHTML = "";
        
        // Update comment count
        updateDoc(doc(db, "posts", postId), { commentCount: cSnap.size });
        
        cSnap.forEach(c => {
            const d = c.data();
            const div = document.createElement("div");
            div.style.cssText = "font-size:13px;margin-top:8px;padding:8px;background:#f9f9f9;border-radius:6px;";
            div.innerHTML = `<b style="color:#ff6a00;cursor:pointer" onclick="window.location.href='profile.html?uid=${d.userId}'">${d.username || "User"}</b>: ${d.text}`;
            list.appendChild(div);
        });
    });
}

// ================= VIEW TRACKING =================
function trackView(postId) {
    // Clear any existing timer for this post
    if (viewTimers[postId]) {
        clearTimeout(viewTimers[postId]);
    }
    
    // Set 2-second timer
    viewTimers[postId] = setTimeout(async () => {
        const postEl = document.querySelector(`[data-post-id="${postId}"]`);
        if (postEl && postEl.dataset.viewed !== "true") {
            try {
                await updateDoc(doc(db, "posts", postId), {
                    views: increment(1),
                    viewedBy: arrayUnion(currentUser.uid)
                });
                postEl.dataset.viewed = "true";
            } catch (e) {
                console.error("Failed to track view:", e);
            }
        }
    }, 2000);
}

// ================= EVENT HANDLERS =================
function attachEventHandlers() {
    // Like buttons
    document.querySelectorAll(".like-btn").forEach(btn => {
        btn.onclick = async () => {
            if (btn.dataset.liked === "true") return;
            
            const postId = btn.dataset.id;
            const ownerId = btn.dataset.owner;
            
            try {
                await updateDoc(doc(db, "posts", postId), {
                    likes: increment(1),
                    likedBy: arrayUnion(currentUser.uid)
                });
                btn.dataset.liked = "true";
                btn.classList.add("liked");
                const count = parseInt(btn.innerText.split(' ')[1]) || 0;
                btn.innerText = `❤️ ${count + 1}`;

                if (ownerId !== currentUser.uid) {
                    await sendNotification(ownerId, {
                        type: "like",
                        title: `${currentUsername} liked your post`,
                        message: "Tap to view your post",
                        fromUserId: currentUser.uid,
                        fromUsername: currentUsername,
                        postId: postId
                    });
                }
            } catch (e) {
                console.error("Like failed:", e);
            }
        };
    });

    // Tip buttons
    document.querySelectorAll(".tip-jar").forEach(btn => {
        btn.onclick = () => {
            const postId = btn.dataset.id;
            const ownerId = btn.dataset.owner;
            const username = btn.dataset.username;
            
            if (ownerId === currentUser.uid) {
                alert("You can't tip yourself!");
                return;
            }
            
            openTipModal(postId, ownerId, username);
        };
    });
}

// ================= TIP SYSTEM =================
let currentTipData = null;

function openTipModal(postId, ownerId, username) {
    currentTipData = { postId, ownerId, username };
    document.getElementById("tip-recipient").innerText = username || "this creator";
    document.getElementById("modal-balance").innerText = `$${currentBalance.toFixed(2)}`;
    document.getElementById("tip-modal").style.display = "flex";
    
    // Reset modal
    document.querySelectorAll(".tip-btn").forEach(btn => btn.classList.remove("selected"));
    document.getElementById("custom-tip").value = "";
}

window.closeTipModal = function() {
    document.getElementById("tip-modal").style.display = "none";
    currentTipData = null;
};

// Tip amount selection
document.querySelectorAll(".tip-btn").forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll(".tip-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        document.getElementById("custom-tip").value = "";
    };
});

document.getElementById("custom-tip").addEventListener("input", () => {
    document.querySelectorAll(".tip-btn").forEach(btn => btn.classList.remove("selected"));
});

document.getElementById("send-tip-btn").addEventListener("click", async () => {
    if (!currentTipData) return;
    
    let amount = 0;
    const selected = document.querySelector(".tip-btn.selected");
    if (selected) {
        amount = parseFloat(selected.dataset.amount);
    } else {
        const custom = document.getElementById("custom-tip").value;
        amount = parseFloat(custom);
    }
    
    if (!amount || amount <= 0) {
        alert("Please enter a valid amount");
        return;
    }
    
    if (amount > currentBalance) {
        alert("Insufficient balance!");
        return;
    }
    
    const btn = document.getElementById("send-tip-btn");
    btn.disabled = true;
    btn.innerText = "Sending...";
    
    try {
        await runTransaction(db, async (transaction) => {
            // Deduct from sender
            const senderRef = doc(db, "users", currentUser.uid);
            transaction.update(senderRef, {
                balance: increment(-amount)
            });
            
            // Add to recipient
            const recipientRef = doc(db, "users", currentTipData.ownerId);
            transaction.update(recipientRef, {
                balance: increment(amount)
            });
            
            // Record transaction
            const tipRef = doc(collection(db, "transactions"));
            transaction.set(tipRef, {
                type: "tip",
                from: currentUser.uid,
                fromUsername: currentUsername,
                to: currentTipData.ownerId,
                toUsername: currentTipData.username,
                amount: amount,
                postId: currentTipData.postId,
                timestamp: serverTimestamp()
            });
        });
        
        // Send notification
        await sendNotification(currentTipData.ownerId, {
            type: "earning",
            title: `${currentUsername} sent you a $${amount.toFixed(2)} tip!`,
            message: "Your balance has been updated",
            fromUserId: currentUser.uid,
            fromUsername: currentUsername,
            postId: currentTipData.postId
        });
        
        alert(`Tip of $${amount.toFixed(2)} sent successfully!`);
        closeTipModal();
    } catch (e) {
        console.error("Tip failed:", e);
        alert("Failed to send tip. Please try again.");
    } finally {
        btn.disabled = false;
        btn.innerText = "Send Tip";
    }
});

// ================= COMMENTS =================
window.addComment = async function(postId, ownerId) {
    const input = document.getElementById(`comment-input-${postId}`);
    const text = input.value.trim();
    if (!text) return;

    await addDoc(collection(db, "posts", postId, "comments"), {
        userId: currentUser.uid,
        username: currentUsername,
        text,
        timestamp: serverTimestamp()
    });

    if (ownerId !== currentUser.uid) {
        await sendNotification(ownerId, {
            type: "comment",
            title: `${currentUsername} commented on your post`,
            message: text.length > 50 ? text.substring(0, 50) + "..." : text,
            fromUserId: currentUser.uid,
            fromUsername: currentUsername,
            postId: postId
        });
    }

    input.value = "";
};

// ================= NOTIFICATIONS =================
async function sendNotification(toUserId, data) {
    try {
        await addDoc(collection(db, "users", toUserId, "notifications"), {
            ...data,
            read: false,
            timestamp: serverTimestamp()
        });
    } catch (e) {
        console.error("Failed to send notification:", e);
    }
}

window.sendNotification = sendNotification;
window.currentUsername = () => currentUsername;
window.currentUserId = () => currentUser?.uid;

function loadNotifications() {
    const notifRef = collection(db, "users", currentUser.uid, "notifications");
    const notifQuery = query(notifRef, orderBy("timestamp", "desc"));
    
    onSnapshot(notifQuery, (snap) => {
        const panel = document.getElementById("notification-panel");
        panel.innerHTML = "";
        let unread = 0;

        if (snap.empty) {
            panel.innerHTML = `<div class="empty-notif">🔕 No notifications yet</div>`;
        } else {
            snap.forEach(nDoc => {
                const n = nDoc.data();
                if (!n.read) unread++;

                const div = document.createElement("div");
                div.className = `notification-item ${n.read ? '' : 'unread'}`;
                div.dataset.id = nDoc.id;

                let icon = "🔔";
                if (n.type === "like") icon = "❤️";
                else if (n.type === "comment") icon = "💬";
                else if (n.type === "follow") icon = "👤";
                else if (n.type === "earning") icon = "💰";

                const time = n.timestamp ? formatTime(n.timestamp.toDate()) : "Just now";
                
                div.innerHTML = `
                    <span class="notif-icon">${icon}</span>
                    <div class="notif-content">
                        <strong>${n.title || "Notification"}</strong>
                        <small>${n.message || ""}</small><br>
                        <small>${time}</small>
                    </div>
                `;
                
                div.onclick = async () => {
                    await updateDoc(doc(db, "users", currentUser.uid, "notifications", nDoc.id), { read: true });
                    
                    if (n.type === "follow" && n.fromUserId) {
                        window.location.href = `profile.html?uid=${n.fromUserId}`;
                    } else if (n.postId) {
                        window.location.href = `post-view.html?postId=${n.postId}`;
                    }
                };
                panel.appendChild(div);
            });
        }

        const badge = document.getElementById("notif-count");
        badge.innerText = unread > 99 ? "99+" : unread;
        badge.style.display = unread > 0 ? "flex" : "none";
    });
}

// ================= HELPER FUNCTIONS =================
function formatTime(date) {
    const now = new Date();
    const diff = Math.floor((now - date) / 1000);
    
    if (diff < 60) return "Just now";
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
    
    return date.toLocaleDateString('en-US', { 
        month: 'short', 
        day: 'numeric',
        year: date.getFullYear() !== now.getFullYear() ? 'numeric' : undefined
    });
}

// Bell toggle
const bell = document.getElementById("notification-bell");
const overlay = document.getElementById("notification-overlay");

bell.addEventListener("click", (e) => {
    e.stopPropagation();
    overlay.style.display = overlay.style.display === "block" ? "none" : "block";
});

document.getElementById("mark-all-read").addEventListener("click", async () => {
    const snap = await getDocs(collection(db, "users", currentUser.uid, "notifications"));
    const batch = writeBatch(db);
    snap.forEach(d => {
        if (!d.data().read) batch.update(d.ref, { read: true });
    });
    await batch.commit();
});

// Close notifications when clicking outside
document.addEventListener("click", (e) => {
    if (!bell.contains(e.target) && !overlay.contains(e.target)) {
        overlay.style.display = "none";
    }
    
    // Close tip modal when clicking outside
    if (e.target.id === "tip-modal") {
        closeTipModal();
    }
});

});

// Close sidebar when clicking outside on mobile
document.addEventListener("click", (e) => {
    const sidebar = document.getElementById("sidebar");

    if (window.innerWidth <= 900 && !sidebar.contains(e.target) && !menuBtn.contains(e.target)) {

    }
