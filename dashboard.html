<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CashClique Dashboard</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{background:#f5f5f5;display:flex}

/* SIDEBAR */

.sidebar{
width:240px;
background:#ff6a00;
color:white;
padding:20px;
height:100vh;
position:fixed;
display:flex;
flex-direction:column;
gap:20px;
}

.sidebar a{
color:white;
text-decoration:none;
padding:10px;
border-radius:8px;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2)
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:600;
}

.logo img{
width:40px;
border-radius:8px;
}

/* MAIN */

.main{
margin-left:240px;
padding:20px;
width:100%;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header-right{
display:flex;
align-items:center;
gap:20px;
}

/* NOTIFICATION */

.notification{
font-size:22px;
cursor:pointer;
position:relative;
}

.notification-count{
position:absolute;
top:-6px;
right:-8px;
background:red;
color:white;
font-size:11px;
padding:2px 6px;
border-radius:50%;
}

/* STATS */

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.card h3{
font-size:16px;
}

.card p{
font-size:22px;
color:#ff6a00;
font-weight:600;
}

/* FEED */

.feed{
display:flex;
flex-direction:column;
gap:20px;
}

.post{
background:white;
padding:20px;
border-radius:10px;
}

.post-header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.post-header img{
width:35px;
height:35px;
border-radius:50%;
}

.post-image{
width:100%;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

.post-actions{
display:flex;
gap:20px;
margin-top:10px;
color:gray;
font-size:14px;
}

/* MEDIA VIEWER */

.media-viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.media-viewer img{
max-width:95%;
max-height:95%;
border-radius:10px;
}

/* NOTIFICATIONS */

.notifications-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.notifications-box{
background:white;
width:400px;
max-height:80vh;
overflow:auto;
border-radius:10px;
padding:20px;
}

.notification-item{
padding:10px;
border-bottom:1px solid #eee;
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
transform:translateX(-100%);
}

.sidebar.active{
transform:translateX(0);
}

.main{
margin-left:0;
}

}

</style>

</head>

<body>

<!-- MEDIA VIEWER -->

<div class="media-viewer" id="mediaViewer" onclick="closeViewer()">
<img id="viewerImg">
</div>

<!-- NOTIFICATIONS -->

<div class="notifications-overlay" id="notificationsOverlay" onclick="closeNotifications()">

<div class="notifications-box" onclick="event.stopPropagation()">

<h3>Notifications</h3>

<div id="notificationsList"></div>

</div>

</div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<div class="logo">
<img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
CashClique
</div>

<a href="#">🏠 Dashboard</a> <a href="my-content.html">📝 My Content</a> <a href="settings.html">⚙ Settings</a> <a href="#" id="logout">🚪 Logout</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">

<div onclick="toggleMenu()">☰</div>

<div class="header-right">

<div class="notification" onclick="openNotifications()">
🔔
<span id="notificationCount" class="notification-count" style="display:none">0</span>
</div>

<span id="username"></span>

</div>

</div>

<div class="card">
<h3>Total Posts</h3>
<p id="total-posts">0</p>
</div>

<div class="feed" id="feed"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore,collection,query,orderBy,onSnapshot,doc,updateDoc,increment,addDoc,serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let currentUser=null;
const feed=document.getElementById("feed");

function formatDate(ts){
if(!ts)return "";
return ts.toDate().toLocaleString();
}

onAuthStateChanged(auth,(user)=>{

if(!user){
window.location.href="login.html";
return;
}

currentUser=user;

document.getElementById("username").innerText=user.email;

loadFeed();

});

/* LOAD FEED */

function loadFeed(){

const postsQuery=query(
collection(db,"posts"),
orderBy("timestamp","desc")
);

onSnapshot(postsQuery,(snapshot)=>{

feed.innerHTML="";

document.getElementById("total-posts").innerText=snapshot.size;

snapshot.forEach(docSnap=>{

const post=docSnap.data();
const postId=docSnap.id;

let imageHTML="";

if(post.imageBase64){
imageHTML=`<img src="${post.imageBase64}" class="post-image" onclick="openViewer('${post.imageBase64}')">`
}

const div=document.createElement("div");
div.className="post";

div.innerHTML=`

<div class="post-header">

<img src="https://i.pravatar.cc/150?u=${post.userId}">

<div>
<b>${post.username}</b>
<div style="font-size:12px;color:gray">${formatDate(post.timestamp)}</div>
</div>

</div>

<p>${post.content || ""}</p>

${imageHTML}

<div class="post-actions">

<span onclick="likePost('${postId}')">❤️ ${post.likes || 0}</span>

<span>👁 ${post.views || 0}</span>

<span onclick="commentPost('${postId}')">💬 Comment</span>

</div>

`;

feed.appendChild(div);

});

});

}

/* LIKE */

window.likePost=async function(postId){

const ref=doc(db,"posts",postId);

await updateDoc(ref,{
likes:increment(1)
});

}

/* COMMENT */

window.commentPost=async function(postId){

const text=prompt("Write comment");

if(!text)return;

await addDoc(collection(db,"posts",postId,"comments"),{

user:currentUser.email,
text:text,
timestamp:serverTimestamp()

});

}

/* VIEWER */

window.openViewer=function(src){

const viewer=document.getElementById("mediaViewer");
const img=document.getElementById("viewerImg");

img.src=src;

viewer.style.display="flex";

}

window.closeViewer=function(){

document.getElementById("mediaViewer").style.display="none";

}

/* NOTIFICATIONS */

window.openNotifications=function(){

document.getElementById("notificationsOverlay").style.display="flex";

}

window.closeNotifications=function(){

document.getElementById("notificationsOverlay").style.display="none";

}

/* LOGOUT */

document.getElementById("logout").onclick=()=>{

signOut(auth).then(()=>{

window.location.href="login.html";

});

}

</script>

<script>

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active")
}

</script>

</body>
</html>
