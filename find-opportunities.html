<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Creator • Available Opportunities | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
  background:#f8f9fa;
  color:#1f2937;
  min-height:100vh;
}
.wrap{max-width:1140px;margin:0 auto;padding:24px 16px 100px;}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:28px;}
h1{font-size:22px;font-weight:600;letter-spacing:-0.2px;}
.sub{font-size:14px;color:#6b7280;margin-top:6px;max-width:80ch;line-height:1.5;}
.btn{border:none;border-radius:12px;padding:11px 16px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .2s ease;font-size:14px;}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-ghost{background:#fff;border:1px solid #e5e7eb;color:#374151;box-shadow:0 1px 2px rgba(0,0,0,.05);}
.btn-ghost:hover{transform:translateY(-1px);box-shadow:0 4px 8px rgba(0,0,0,.08);}
.btn-primary{background:#ff6a00;color:#fff;box-shadow:0 4px 12px rgba(255,106,0,.25);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(255,106,0,.35);}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:900px){.grid{grid-template-columns:1fr;}}

.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:16px;
  box-shadow:0 4px 12px rgba(0,0,0,.05);
  overflow:hidden;
}
.card-head{
  padding:16px 20px;
  border-bottom:1px solid #f3f4f6;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  font-weight:600;
  font-size:15px;
}
.list{padding:16px;display:flex;flex-direction:column;gap:12px;}
.opp{
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:16px;
  transition:all .2s ease;
  background:#fff;
}
.opp:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 16px rgba(0,0,0,.07);
  border-color:#d1d5db;
}
.row{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.title{font-weight:600;font-size:15px;}
.small{font-size:13px;color:#6b7280;line-height:1.4;margin-top:6px;}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.pill{
  display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:8px;
  background:#f9fafb;border:1px solid #f3f4f6;font-size:12px;font-weight:500;color:#4b5563;
}
.pill i{color:#ff6a00;font-size:11px;}
.badge{
  padding:6px 10px;border-radius:8px;font-size:12px;font-weight:500;
  display:inline-flex;align-items:center;gap:6px;
}
.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;}
.no{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;}
.pending{background:#fffbeb;color:#b45309;border:1px solid #fde68a;}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
.viewlink{background:#f9fafb;border:1px solid #e5e7eb;color:#374151;}
.viewlink:hover{transform:translateY(-1px);background:#fff;}
.empty{padding:60px 16px;text-align:center;color:#9ca3af;}
.empty i{font-size:48px;opacity:.25;margin-bottom:16px;}
hr.sep{border:none;border-top:1px solid #f3f4f6;margin:12px 0;}

/* Side icon */
.side-panel-btn{
  position:fixed;
  right:16px;
  top:50%;
  transform:translateY(-50%);
  width:56px;height:56px;
  border:none;border-radius:14px;
  background:#ff6a00;color:#fff;
  box-shadow:0 8px 20px rgba(255,106,0,.35);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:1000;
  transition:all .2s ease;
  font-size:18px;
}
.side-panel-btn:hover{
  transform:translateY(-50%) scale(1.06);
  box-shadow:0 10px 24px rgba(255,106,0,.45);
}
.side-panel-btn .dot{
  position:absolute;top:8px;right:8px;
  min-width:18px;height:18px;border-radius:999px;
  background:#1f2937;color:#fff;font-size:11px;
  display:none;align-items:center;justify-content:center;
  padding:0 6px;font-weight:600;
}

/* Full page overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);opacity:0;visibility:hidden;z-index:2000;transition:all .2s ease;}
.overlay.active{opacity:1;visibility:visible;}
.overlay-inner{
  position:absolute;
  right:0;
  top:0;
  bottom:0;
  width:100%;
  max-width:520px;
  background:#f8f9fa;
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:all .25s cubic-bezier(.2,.8,.2,1);
  box-shadow:-10px 0 40px rgba(0,0,0,.15);
}
.overlay.active .overlay-inner{transform:translateX(0);}
.overlay-head{background:#fff;border-bottom:1px solid #e5e7eb;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.overlay-title{font-weight:600;font-size:16px;}
.overlay-body{padding:16px;overflow:auto;flex:1;}
.app-item{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.app-item .top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;}

@media(max-width:768px){
  .wrap{padding:16px 12px 90px;}
  .side-panel-btn{bottom:16px;top:auto;transform:none;right:16px;width:52px;height:52px;border-radius:14px;}
  .side-panel-btn:hover{transform:scale(1.06);}
}
</style>
</head>

<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>Available Opportunities</h1>
      <div class="sub">
        This page shows approved ad campaigns you can apply to.
      </div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn btn-ghost" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button>
      <button class="btn btn-ghost" id="refreshBtn"><i class="fas fa-rotate"></i> Refresh</button>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-head">
        <div>Opportunities</div>
        <div class="pill"><i class="fas fa-circle-check"></i> Approved</div>
      </div>
      <div class="list" id="oppList">
        <div class="empty"><i class="fas fa-spinner fa-spin"></i><div style="margin-top:10px;">Loading opportunities...</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div>Your Eligibility</div>
        <div class="pill"><i class="fas fa-user-check"></i> Live</div>
      </div>
      <div class="list" id="eligibilityBox">
        <div class="empty"><i class="fas fa-spinner fa-spin"></i><div style="margin-top:10px;">Loading your stats...</div></div>
      </div>
    </div>
  </div>
</div>

<button class="side-panel-btn" id="appsBtn" title="My Applications">
  <i class="fas fa-inbox"></i>
  <span class="dot" id="appsDot">0</span>
</button>

<div class="overlay" id="overlay">
  <div class="overlay-inner">
    <div class="overlay-head">
      <div class="overlay-title"><i class="fas fa-inbox"></i> My Applications</div>
      <button class="btn btn-ghost" onclick="closeOverlay()"><i class="fas fa-xmark"></i> Close</button>
    </div>
    <div class="overlay-body" id="appsList">
      <div class="empty"><i class="fas fa-spinner fa-spin"></i><div style="margin-top:10px;">Loading your applications...</div></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore, collection, query, where, onSnapshot, doc,
  serverTimestamp, runTransaction
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
  authDomain: "cashclique-31718.firebaseapp.com",
  projectId: "cashclique-31718",
  storageBucket: "cashclique-31718.firebasestorage.app",
  messagingSenderId: "1064282591269",
  appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const oppList = document.getElementById("oppList");
const eligibilityBox = document.getElementById("eligibilityBox");
const appsBtn = document.getElementById("appsBtn");
const appsDot = document.getElementById("appsDot");
const overlay = document.getElementById("overlay");
const appsList = document.getElementById("appsList");
const refreshBtn = document.getElementById("refreshBtn");

let currentUser = null;
let myStats = { totalLikes: 0, followersCount: 0, verified: false, username: "User" };
let myAppsMap = new Map();
let opportunitiesMap = new Map();

let unsubOpp = null;
let unsubApps = null;
let unsubUser = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = "login.html"; return; }
  currentUser = user;

  listenMyStats();
  listenMyApplications();
  listenOpportunities();

  // ✅ Fail safe: if Firestore hangs after 8 seconds show error
  setTimeout(() => {
    if(oppList.innerHTML.includes("Loading opportunities")){
      showOppError(new Error("No response from server. This is almost always a Firestore permissions issue."));
    }
  }, 8000);
});

refreshBtn.onclick = () => renderOpportunities();

function listenMyStats(){
  if(unsubUser) unsubUser();
  unsubUser = onSnapshot(doc(db, "users", currentUser.uid), (snap) => {
    if (!snap.exists()) return;
    const d = snap.data();

    myStats = {
      totalLikes: Number(d.totalLikes || 0),
      followersCount: Number(d.followersCount || (d.followers?.length || 0)),
      verified: !!d.verified,
      username: d.username || currentUser.email?.split("@")[0] || "User",
    };

    renderMyStatsBox();
    renderOpportunities();
  });
}

function renderMyStatsBox(){
  eligibilityBox.innerHTML = `
    <div class="opp">
      <div class="row">
        <div>
          <div class="title">${escapeHTML(myStats.username)}</div>
          <div class="small">Eligibility is checked automatically in realtime.</div>
        </div>
        <span class="badge ${myStats.verified ? 'ok' : 'pending'}">
          <i class="fas ${myStats.verified ? 'fa-circle-check' : 'fa-circle-minus'}"></i>
          ${myStats.verified ? 'Verified' : 'Not verified'}
        </span>
      </div>

      <div class="pills">
        <span class="pill"><i class="fas fa-heart"></i> Total likes: ${fmt(myStats.totalLikes)}</span>
        <span class="pill"><i class="fas fa-user-group"></i> Followers: ${fmt(myStats.followersCount)}</span>
      </div>
    </div>
  `;
}

function listenOpportunities(){
  if (unsubOpp) unsubOpp();
  opportunitiesMap = new Map();

  const q = query(collection(db, "opportunities"), where("status", "in", ["approved", "active"]));

  unsubOpp = onSnapshot(q, (snap) => {
    opportunitiesMap.clear();
    snap.forEach(d => opportunitiesMap.set(d.id, normalizeOpp(d.id, d.data())));
    renderOpportunities();
  }, (err) => showOppError(err));
}

function showOppError(err){
  console.error("Load error:", err);
  oppList.innerHTML = `
    <div class="empty">
      <i class="fas fa-triangle-exclamation"></i>
      <div style="margin-top:10px;font-weight:600;">Failed to load opportunities</div>
      <div style="margin-top:8px;">${escapeHTML(err.message)}</div>
      <div class="small" style="margin-top:12px;">
        You need to add this rule to Firestore rules:<br>
        <code>allow read: if request.auth != null && resource.data.status in ["approved", "active"];</code>
      </div>
    </div>
  `;
}

function renderOpportunities(){
  const items = Array.from(opportunitiesMap.values())
    .sort((a,b) => getSortTime(b.createdAt) - getSortTime(a.createdAt));

  if (items.length === 0){
    oppList.innerHTML = `<div class="empty"><i class="fas fa-bullhorn"></i><div style="margin-top:10px;">No opportunities available right now.</div></div>`;
    return;
  }

  oppList.innerHTML = "";
  items.forEach((opp) => {
    const { eligible, reason } = checkEligibility(opp);
    const app = myAppsMap.get(opp.id);
    const alreadyApplied = !!app;

    const appBadge = alreadyApplied
      ? `<span class="badge ${app.status === 'approved' ? 'ok' : app.status === 'rejected' ? 'no' : 'pending'}">
           <i class="fas ${app.status === 'approved' ? 'fa-check' : app.status === 'rejected' ? 'fa-ban' : 'fa-clock'}"></i>
           ${String(app.status || "pending").toUpperCase()}
         </span>`
      : "";

    const disabled = alreadyApplied || !eligible;

    const el = document.createElement("div");
    el.className = "opp";
    el.innerHTML = `
      <div class="row">
        <div style="min-width:0;">
          <div class="title">${escapeHTML(opp.title || "Opportunity")}</div>
          <div class="small">
            Category: ${escapeHTML(opp.category || "—")}
            • Payout: $${Number(opp.cost || 0).toFixed(2)}
          </div>
        </div>

        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
          ${appBadge}
          <span class="badge ${eligible ? 'ok' : 'no'}">
            <i class="fas ${eligible ? 'fa-circle-check' : 'fa-circle-xmark'}"></i>
            ${eligible ? 'Eligible' : 'Not eligible'}
          </span>
        </div>
      </div>

      ${opp.description ? `<div class="small" style="margin-top:10px;">${escapeHTML(opp.description)}</div>` : ""}

      <div class="pills">
        <span class="pill"><i class="fas fa-heart"></i> Min likes: ${fmt(opp.requirements.minLikes)}</span>
        <span class="pill"><i class="fas fa-user-group"></i> Min followers: ${fmt(opp.requirements.minFollowers)}</span>
        <span class="pill"><i class="fas fa-shield-halved"></i> Verified: ${opp.requirements.requireVerified ? "Required" : "Any"}</span>
      </div>

      ${eligible ? "" : `<div class="small" style="margin-top:10px;color:#b91c1c;font-weight:500;">
        <i class="fas fa-circle-exclamation"></i> ${escapeHTML(reason)}
      </div>`}

      <div class="actions">
        <button class="btn btn-primary apply-btn" ${disabled ? "disabled" : ""} data-id="${opp.id}">
          <i class="fas ${alreadyApplied ? 'fa-check' : 'fa-paper-plane'}"></i>
          ${alreadyApplied ? "Applied" : "Apply"}
        </button>
        <button class="btn viewlink" data-open="${opp.id}">
          <i class="fas fa-arrow-up-right-from-square"></i> View details
        </button>
      </div>
    `;

    el.querySelector(".apply-btn").onclick = () => applyToOpportunity(opp, eligible, alreadyApplied);
    el.querySelector("[data-open]").onclick = () => openOpportunityLink(opp);

    oppList.appendChild(el);
  });
}

function normalizeOpp(id, d){
  const req = d.requirements || {};
  return {
    id,
    title: d.title || "Opportunity",
    category: d.category || "—",
    description: d.description || "",
    advertiserId: d.advertiserId || "—",
    destinationUrl: d.targetUrl || d.destinationUrl || "",
    createdAt: d.createdAt || null,
    cost: Number(d.cost ?? d.totalCost ?? 0),
    requirements: {
      minLikes: Number(req.minLikes || 0),
      minFollowers: Number(req.minFollowers || 0),
      requireVerified: !!(req.requireVerified || req.verifiedRequired)
    }
  };
}

function checkEligibility(opp){
  const minLikes = opp.requirements.minLikes;
  const minFollowers = opp.requirements.minFollowers;
  const requireVerified = opp.requirements.requireVerified;

  if (myStats.totalLikes < minLikes) return { eligible:false, reason:`You need ${fmt(minLikes)} total likes.` };
  if (myStats.followersCount < minFollowers) return { eligible:false, reason:`You need ${fmt(minFollowers)} followers.` };
  if (requireVerified && !myStats.verified) return { eligible:false, reason:`Verified creators only.` };
  return { eligible:true, reason:"" };
}

async function applyToOpportunity(opp, eligible, alreadyApplied){
  if (!eligible || alreadyApplied) return;
  if (!confirm(`Apply to "${opp.title}"?`)) return;

  try {
    const appId = `${currentUser.uid}_${opp.id}`;
    const appRef = doc(db, "opportunityApplications", appId);

    await runTransaction(db, async (tx) => {
      const existing = await tx.get(appRef);
      if (existing.exists()) return;

      tx.set(appRef, {
        opportunityId: opp.id,
        advertiserId: opp.advertiserId,
        creatorId: currentUser.uid,
        creatorUsername: myStats.username,
        status: "pending",
        adminNote: null,
        requirements: opp.requirements,
        creatorStats: myStats,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
    });

    alert("Applied successfully!");
  } catch (e) {
    alert(e.message);
  }
}

function listenMyApplications(){
  if (unsubApps) unsubApps();

  const qApps = query(collection(db, "opportunityApplications"), where("creatorId", "==", currentUser.uid));

  unsubApps = onSnapshot(qApps, (snap) => {
    myAppsMap = new Map();
    let pendingCount = 0;
    const apps = [];

    snap.forEach((d) => {
      const a = { id: d.id, ...d.data() };
      apps.push(a);
      myAppsMap.set(a.opportunityId, a);
      if (String(a.status || "pending") === "pending") pendingCount++;
    });

    appsDot.style.display = pendingCount > 0 ? "flex" : "none";
    appsDot.textContent = pendingCount > 99 ? "99+" : String(pendingCount);

    renderMyApplications(apps);
    renderOpportunities();
  });
}

function renderMyApplications(apps){
  apps.sort((a,b) => getSortTime(b.createdAt) - getSortTime(a.createdAt));

  if (apps.length === 0){
    appsList.innerHTML = `<div class="empty"><i class="fas fa-inbox"></i><div style="margin-top:10px;">No applications yet.</div></div>`;
    return;
  }

  appsList.innerHTML = "";
  apps.forEach((a) => {
    const status = String(a.status || "pending").toLowerCase();
    const statusClass = status === "approved" ? "ok" : status === "rejected" ? "no" : "pending";

    const el = document.createElement("div");
    el.className = "app-item";
    el.innerHTML = `
      <div class="top">
        <div>
          <div class="title">${escapeHTML(a.opportunityTitle || "Opportunity")}</div>
          <div class="small">Applied: ${fmtTime(a.createdAt)}</div>
        </div>
        <span class="badge ${statusClass}">
          <i class="fas ${status === 'approved' ? 'fa-check' : status === 'rejected' ? 'fa-ban' : 'fa-clock'}"></i>
          ${status.toUpperCase()}
        </span>
      </div>
    `;
    appsList.appendChild(el);
  });
}

function openOpportunityLink(opp){
  const url = opp.destinationUrl;
  if (!url) return alert("No link provided for this opportunity.");
  window.open(url, "_blank");
}

appsBtn.addEventListener("click", () => overlay.classList.add("active"));
window.closeOverlay = function(){ overlay.classList.remove("active"); };
overlay.addEventListener("click", (e) => { if (e.target.id === "overlay") closeOverlay(); });

function fmt(n){ return Number(n||0).toLocaleString(); }
function getSortTime(ts){
  if (!ts) return 0;
  if (typeof ts.seconds === "number") return ts.seconds * 1000;
  if (typeof ts.toDate === "function") return ts.toDate().getTime();
  return 0;
}
function escapeHTML(str){
  return String(str||"").replace(/[&<>"']/g, (m) => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[m]));
}
function fmtTime(ts){
  const d = ts?.toDate ? ts.toDate() : null;
  if (!d) return "—";
  return d.toLocaleString([], { month:"short", day:"numeric", hour:"numeric", minute:"2-digit" });
}
</script>
</body>
</html>
