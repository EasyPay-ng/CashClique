<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Creator • Available Opportunities | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #f8fafc;
  color: #0f172a;
  min-height: 100vh;
  font-family: 'Poppins', sans-serif;
  line-height: 1.5;
}

.wrap {
  max-width: 1180px;
  margin: 0 auto;
  padding: 24px 18px 80px;
}

.topbar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

h1 {
  font-size: 24px;
  font-weight: 700;
  color: #0f172a;
}

.sub {
  font-size: 14.5px;
  color: #64748b;
  margin-top: 6px;
  max-width: 85ch;
}

/* Buttons */
.btn {
  border: none;
  border-radius: 12px;
  padding: 11px 16px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.25s ease;
  font-size: 14px;
}

.btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.btn-ghost {
  background: white;
  border: 1.5px solid #e2e8f0;
  color: #334155;
}

.btn-ghost:hover {
  border-color: #94a3b8;
  transform: translateY(-2px);
  box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
}

.btn-primary {
  background: linear-gradient(135deg, #ff6b00, #e55a00);
  color: white;
  font-weight: 700;
  box-shadow: 0 10px 20px rgba(255, 107, 0, 0.25);
}

.btn-primary:hover:not(:disabled) {
  transform: translateY(-3px);
  box-shadow: 0 15px 25px rgba(255, 107, 0, 0.35);
}

/* Grid & Cards */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
}

.card {
  background: white;
  border: 1px solid #f1f5f9;
  border-radius: 20px;
  box-shadow: 0 15px 35px rgba(15, 23, 42, 0.06);
  overflow: hidden;
}

.card-head {
  padding: 18px 20px;
  border-bottom: 1px solid #f1f5f9;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #fafbfc;
  font-weight: 600;
  color: #1e2937;
}

/* Opportunity Cards */
.opp {
  border: 1px solid #e2e8f0;
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 14px;
  transition: all 0.3s ease;
  background: white;
}

.opp:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 40px rgba(15, 23, 42, 0.1);
  border-color: #ff6b00;
}

.title {
  font-weight: 700;
  font-size: 16.5px;
  margin-bottom: 4px;
  color: #0f172a;
}

.small {
  font-size: 13.2px;
  color: #64748b;
  line-height: 1.4;
}

.pills {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 14px;
}

.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 999px;
  font-size: 12.8px;
  font-weight: 600;
  color: #334155;
}

.pill i { color: #ff6b00; }

/* Badges */
.badge {
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 12.5px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.ok { background: #ecfdf5; color: #166534; border: 1px solid #a7f3d0; }
.no { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
.pending { background: #fffbeb; color: #b45309; border: 1px solid #fde047; }

/* Actions */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.viewlink {
  background: white;
  border: 1.5px solid #e2e8f0;
  color: #334155;
  font-weight: 600;
}

.viewlink:hover {
  border-color: #64748b;
  transform: translateY(-2px);
}

/* Side Button */
.side-panel-btn {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 58px;
  height: 58px;
  border: none;
  border-radius: 18px;
  background: #0f172a;
  color: white;
  box-shadow: 0 15px 30px rgba(15, 23, 42, 0.25);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: all 0.3s ease;
}

.side-panel-btn:hover {
  transform: translateY(-50%) scale(1.08);
  background: #1e2937;
}

.dot {
  position: absolute;
  top: 8px;
  right: 8px;
  min-width: 20px;
  height: 20px;
  background: #ff6b00;
  color: white;
  font-size: 11px;
  font-weight: 900;
  border-radius: 999px;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 0 6px;
}

/* Empty State */
.empty {
  padding: 60px 20px;
  text-align: center;
  color: #64748b;
}

.empty i {
  font-size: 48px;
  opacity: 0.15;
  margin-bottom: 12px;
}

/* Overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.7);
  display: none;
  z-index: 2000;
  backdrop-filter: blur(8px);
}

.overlay.active { display: block; }

.overlay-inner {
  position: absolute;
  inset: 0;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  max-width: 680px;
  margin-left: auto;
  box-shadow: -10px 0 30px rgba(0,0,0,0.1);
}

.overlay-head {
  background: white;
  padding: 18px 24px;
  border-bottom: 1px solid #e2e8f0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-weight: 600;
}
</style>
</head>

<body>
<!-- Rest of your HTML remains the same until the script -->

<div class="wrap">
  <div class="topbar">
    <div>
      <h1>Available Opportunities</h1>
      <div class="sub">
        This page shows <b>approved</b> ad campaigns. If your admin page sets status to <b>"approved"</b>, it will appear here.
      </div>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;">
      <button class="btn btn-ghost" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button>
      <button class="btn btn-ghost" id="refreshBtn"><i class="fas fa-rotate"></i> Refresh</button>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-head">
        <div>Opportunities</div>
        <div class="pill"><i class="fas fa-circle-check"></i> Approved</div>
      </div>
      <div class="list" id="oppList" style="padding:20px;">
        <div class="empty"><i class="fas fa-spinner fa-spin"></i><div style="margin-top:12px;">Loading opportunities...</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div>Your Eligibility</div>
        <div class="pill"><i class="fas fa-user-check"></i> Live</div>
      </div>
      <div class="list" id="eligibilityBox" style="padding:20px;">
        <div class="empty"><i class="fas fa-spinner fa-spin"></i><div style="margin-top:12px;">Loading your stats...</div></div>
      </div>
    </div>
  </div>
</div>

<!-- Side button and overlay (unchanged) -->
<button class="side-panel-btn" id="appsBtn" title="My Applications">
  <i class="fas fa-inbox"></i>
  <span class="dot" id="appsDot">0</span>
</button>

<div class="overlay" id="overlay">
  <div class="overlay-inner">
    <div class="overlay-head">
      <div><i class="fas fa-inbox"></i> My Applications</div>
      <button class="btn btn-ghost" onclick="closeOverlay()"><i class="fas fa-xmark"></i> Close</button>
    </div>
    <div class="overlay-body" id="appsList" style="padding:20px; overflow:auto; flex:1;">
      <!-- Filled by JS -->
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, query, where, onSnapshot, doc, getDoc, serverTimestamp, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = { /* your config */ };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ... [Keep all your existing JS functions] ...

async function loadMyStats(){
  const snap = await getDoc(doc(db, "users", currentUser.uid));
  if (!snap.exists()) return;

  const d = snap.data();
  
  // Improved total likes detection
  const totalLikes = Number(
    d.totalLikes ?? 
    d.likes ?? 
    d.likeCount ?? 
    d.total_likes ?? 
    d.engagement?.likes ?? 0
  );

  myStats = {
    totalLikes: totalLikes,
    followersCount: Number(d.followersCount || (d.followers?.length || 0)),
    verified: !!d.verified,
    username: d.username || currentUser.email?.split("@")[0] || "User",
  };
}

// Rest of your script remains the same...
</script>
</body>
</html>
