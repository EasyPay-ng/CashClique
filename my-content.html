<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Content | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f5f5;min-height:100vh;padding:0;}

/* Mobile Header */
.mobile-header{display:none;background:#ff6a00;color:white;padding:15px 20px;align-items:center;gap:15px;position:sticky;top:0;z-index:100;}
.mobile-header h1{font-size:18px;font-weight:600;flex:1;}
.menu-btn{background:none;border:none;color:white;font-size:24px;cursor:pointer;padding:5px;}

/* Sidebar */
.sidebar{width:240px;background:#ff6a00;color:white;padding:20px;display:flex;flex-direction:column;gap:20px;position:fixed;height:100%;z-index:999;transition:0.3s;}
.sidebar img{width:45px;border-radius:10px;}
.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:18px;margin-bottom:10px;}
.sidebar a{color:white;text-decoration:none;padding:12px 15px;border-radius:8px;transition:0.3s;display:flex;align-items:center;gap:10px;}
.sidebar a:hover, .sidebar a.active{background:rgba(255,255,255,0.2);}

/* Main Content */
.main{margin-left:240px;padding:20px;transition:0.3s;}
.container{background:white;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.08);overflow:hidden;padding:30px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding-bottom:20px;border-bottom:2px solid #f0f0f0;}
.header h1{font-size:28px;font-weight:700;color:#333;}
.create-btn{background:#ff6a00;color:white;border:none;padding:12px 25px;border-radius:10px;font-weight:600;cursor:pointer;transition:0.3s;box-shadow:0 4px 12px rgba(255,106,0,0.2);display:flex;align-items:center;gap:8px;}
.create-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,106,0,0.3);}

/* Posts Grid */
.posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:25px;margin-top:20px;}
.post-card{background:#f8f9fa;border-radius:12px;overflow:hidden;transition:0.3s;border:2px solid transparent;}
.post-card:hover{transform:translateY(-5px);border-color:#ff6a00;box-shadow:0 10px 25px rgba(0,0,0,0.1);}
.post-image-container{position:relative;height:200px;overflow:hidden;background:#eee;}
.post-image{width:100%;height:100%;object-fit:cover;}
.post-content{padding:20px;}
.post-text{font-size:15px;line-height:1.6;color:#444;margin-bottom:15px;max-height:80px;overflow:hidden;position:relative;}
.post-text::after{content:'';position:absolute;bottom:0;left:0;right:0;height:30px;background:linear-gradient(transparent,#f8f9fa);}
.post-stats{display:flex;gap:15px;margin-bottom:15px;font-size:14px;color:#666;}
.post-stat{display:flex;align-items:center;gap:5px;}
.post-actions{display:flex;gap:10px;margin-top:15px;padding-top:15px;border-top:1px solid #e0e0e0;}
.delete-btn{background:#ff4444;color:white;border:none;padding:8px 15px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:0.2s;flex:1;}
.delete-btn:hover{background:#e03333;}
.view-comments-btn{background:#666;color:white;border:none;padding:8px 15px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:0.2s;flex:1;}
.view-comments-btn:hover{background:#555;}

/* Modal & Toast */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal.active{display:flex;}
.modal-content{background:white;border-radius:16px;width:90%;max-width:600px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px;border-bottom:1px solid #eee;}
.modal-title{font-size:18px;font-weight:600;color:#333;}
.close-modal{background:none;border:none;font-size:28px;cursor:pointer;color:#999;}
.modal-body{flex:1;overflow-y:auto;padding:20px;}
.loading{text-align:center;padding:50px;color:#888;}

@media(max-width:900px){
  .mobile-header{display:flex;}
  .sidebar{transform:translateX(-100%);}
  .sidebar.active{transform:translateX(0);}
  .main{margin-left:0;padding:10px;padding-top:70px;}
  .posts-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- Mobile Header -->
<div class="mobile-header">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  <h1>My Content</h1>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
<div class="logo">
<img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
CashClique
</div>
<a href="dashboard.html">🏠 Dashboard</a>
<a href="my-content.html" class="active">📝 My Content</a>
<a href="earnings.html">💰 Earnings</a>
<a href="opportunities.html">🔥 Opportunities</a>
<a href="settings.html">⚙ Settings</a>
<a href="#" id="logout">🚪 Logout</a>
</div>

<!-- Main Content -->
<div class="main">
<div class="container">
  <div class="header">
    <h1>My Content</h1>
    <button class="create-btn" onclick="window.location.href='post.html'">+ Create New Post</button>
  </div>
  
  <div id="loading" class="loading">Loading your posts...</div>
  
  <div class="posts-grid" id="posts-grid" style="display:none;">
    <!-- Posts will be loaded here -->
  </div>
</div>
</div>

<!-- Comments Modal -->
<div class="modal" id="comments-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title">Comments</h3>
      <button class="close-modal" onclick="closeCommentsModal()">×</button>
    </div>
    <div class="modal-body" id="comments-list"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, query, where, onSnapshot, doc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
    authDomain: "cashclique-31718.firebaseapp.com",
    projectId: "cashclique-31718",
    storageBucket: "cashclique-31718.firebasestorage.app",
    messagingSenderId: "1064282591269",
    appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }
    currentUser = user;
    document.getElementById("loading").style.display = "none";
    document.getElementById("posts-grid").style.display = "grid";
    loadUserPosts();
});

function loadUserPosts() {
    // More forgiving query - removed orderBy to avoid index issues
    const postsQuery = query(
        collection(db, "posts"),
        where("userId", "==", currentUser.uid)
    );

    onSnapshot(postsQuery, (snapshot) => {
        const grid = document.getElementById("posts-grid");
        grid.innerHTML = "";

        if (snapshot.empty) {
            grid.innerHTML = `
                <div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:#888;">
                    <h3 style="font-size:24px;margin-bottom:12px;">No posts yet</h3>
                    <p style="font-size:16px;margin-bottom:25px;">You haven't created any content yet.</p>
                    <button class="create-btn" onclick="window.location.href='post.html'">Create Your First Post</button>
                </div>`;
            return;
        }

        // Sort manually by timestamp (newest first)
        const sortedPosts = snapshot.docs.sort((a, b) => {
            const timeA = a.data().timestamp?.seconds || 0;
            const timeB = b.data().timestamp?.seconds || 0;
            return timeB - timeA;
        });

        sortedPosts.forEach((postDoc) => {
            const post = postDoc.data();
            const postId = postDoc.id;

            const card = document.createElement("div");
            card.className = "post-card";
            card.innerHTML = `
                <div class="post-image-container" onclick="viewPost('${postId}')">
                    ${post.imageBase64 
                        ? `<img src="${post.imageBase64}" class="post-image">` 
                        : `<div style="width:100%;height:100%;background:linear-gradient(135deg,#ff6a00,#ff8a00);display:flex;align-items:center;justify-content:center;color:white;font-size:60px;">📝</div>`
                    }
                </div>
                <div class="post-content">
                    <div class="post-text">${post.content || 'No caption'}</div>
                    <div class="post-stats">
                        <div class="post-stat">❤️ ${post.likes || 0}</div>
                        <div class="post-stat">💬 ${post.commentCount || 0}</div>
                    </div>
                    <div class="post-actions">
                        <button class="view-comments-btn" onclick="event.stopImmediatePropagation(); openCommentsModal('${postId}')">💬 View Comments</button>
                        <button class="delete-btn" onclick="event.stopImmediatePropagation(); deletePost('${postId}')">Delete</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }, (error) => {
        console.error("Error loading posts:", error);
        document.getElementById("posts-grid").innerHTML = `
            <div style="grid-column:1/-1;text-align:center;padding:60px;color:#d32f2f;">
                Error loading your posts. Please try refreshing the page.
            </div>`;
    });
}

// Delete Post
window.deletePost = async (postId) => {
    if (!confirm("Delete this post permanently?")) return;
    
    try {
        await deleteDoc(doc(db, "posts", postId));
        showToast("Post deleted successfully", "success");
    } catch (e) {
        console.error(e);
        showToast("Failed to delete post", "error");
    }
};

// View Post
window.viewPost = (postId) => {
    window.location.href = `post-view.html?postId=${postId}`;
};

// Comments Modal Functions (kept from your version)
window.openCommentsModal = (postId) => {
    // You can expand this later
    alert("Comments feature coming in next update");
};

function showToast(message, type = "success") {
    const toast = document.createElement("div");
    toast.style.position = "fixed";
    toast.style.bottom = "20px";
    toast.style.right = "20px";
    toast.style.padding = "15px 25px";
    toast.style.borderRadius = "10px";
    toast.style.color = "white";
    toast.style.background = type === "success" ? "#4caf50" : "#f44336";
    toast.style.boxShadow = "0 5px 15px rgba(0,0,0,0.2)";
    toast.style.zIndex = "10000";
    toast.textContent = message;
    document.body.appendChild(toast);
    
    setTimeout(() => toast.remove(), 3000);
}

// Mobile Menu
window.toggleMenu = () => {
    document.getElementById("sidebar").classList.toggle("active");
};

// Logout
document.getElementById("logout").addEventListener("click", async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = "login.html";
});
</script>
</body>
</html>
