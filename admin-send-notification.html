<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Notification | CashClique</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  width: 400px;
}

h2 {
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.status {
  margin-top: 10px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h2>📡 Send Notification</h2>

  <input type="text" id="token" placeholder="User FCM Token">
  <input type="text" id="title" placeholder="Notification Title">
  <textarea id="body" placeholder="Notification Body"></textarea>
  <input type="text" id="link" placeholder="Click URL (e.g. /dashboard.html)">

  <button onclick="sendNotification()">Send Notification</button>

  <div class="status" id="status"></div>
</div>

<script>
async function sendNotification() {
  const token = document.getElementById("token").value;
  const title = document.getElementById("title").value;
  const body = document.getElementById("body").value;
  const link = document.getElementById("link").value;

  if (!token || !title || !body) {
    alert("Fill all fields");
    return;
  }

  document.getElementById("status").innerText = "Sending...";

  try {
    const response = await fetch("https://fcm.googleapis.com/fcm/send", {
      method: "POST",
      headers: {
        "Authorization": "key=YOUR_SERVER_KEY_HERE",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        to: token,
        notification: {
          title: title,
          body: body
        },
        data: {
          click_action: link || "/"
        }
      })
    });

    const data = await response.json();

    if (data.success === 1) {
      document.getElementById("status").innerText = "✅ Sent successfully!";
    } else {
      document.getElementById("status").innerText = "❌ Failed to send";
      console.log(data);
    }

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "❌ Error occurred";
  }
}
</script>

</body>
</html>
