<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Deposit | CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
:root {
    --primary: #ff6a00;
    --primary-hover: #e55d00;
    --bg: #f5f6f8;
    --card-bg: #ffffff;
    --border: #e2e8f0;
    --text-dark: #1e2937;
    --text-light: #64748b;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body { background:var(--bg); min-height:100vh; color:var(--text-dark); overflow-x:hidden; }

/* Sidebar */
.sidebar { width:260px; background:#1e2937; color:white; padding:25px; display:flex; flex-direction:column; gap:10px; position:fixed; height:100%; z-index:100; transition:transform 0.3s ease; }
.sidebar h2 { font-size:22px; margin-bottom:30px; font-weight:700; color:var(--primary); display:flex; align-items:center; gap:10px; }
.sidebar a { color:#cbd5e1; text-decoration:none; padding:14px 16px; border-radius:10px; transition:0.3s; font-weight:500; display:flex; align-items:center; gap:10px; }
.sidebar a:hover, .sidebar a.active { background:var(--primary); color:white; }

/* Main Content */
.main-content { margin-left:260px; padding:30px; min-height:100vh; }
.page-header { margin-bottom:30px; }
.page-title { font-size:28px; font-weight:700; color:var(--text-dark); margin-bottom:8px; }
.page-subtitle { font-size:14px; color:var(--text-light); }

/* Form Card */
.deposit-card { background:var(--card-bg); border-radius:16px; border:1px solid var(--border); padding:30px; max-width:600px; box-shadow:0 4px 15px rgba(0,0,0,0.03); }
.form-group { margin-bottom:20px; }
.form-group label { display:block; margin-bottom:8px; font-weight:600; font-size:14px; color:var(--text-dark); }
.form-input { width:100%; padding:12px 14px; border:2px solid var(--border); border-radius:10px; font-size:15px; outline:none; transition:0.3s; background:#fafbfc; }
.form-input:focus { border-color:var(--primary); background:white; }
.form-input[readonly] { background:#f1f5f9; cursor:not-allowed; }
.form-hint { font-size:12px; color:var(--text-light); margin-top:6px; }

.submit-btn { width:100%; background:var(--primary); color:white; padding:14px; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; transition:0.3s; display:flex; align-items:center; justify-content:center; gap:8px; }
.submit-btn:hover:not(:disabled) { background:var(--primary-hover); }
.submit-btn:disabled { opacity:0.6; cursor:not-allowed; }

/* Status Box */
.status-box { margin-top:20px; padding:15px; border-radius:10px; font-size:14px; display:none; }
.status-box.show { display:block; }
.status-box.success { background:#ecfdf5; border:1px solid #a7f3d0; color:#065f46; }
.status-box.error { background:#fef2f2; border:1px solid #fecaca; color:#991b1b; }
.status-box.info { background:#eff6ff; border:1px solid #bfdbfe; color:#1e40af; }
.status-line { margin:4px 0; display:flex; align-items:center; gap:6px; }

/* Responsive */
@media(max-width:900px) {
    .sidebar { transform:translateX(-100%); }
    .main-content { margin-left:0; padding:20px; }
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2><i class="fas fa-shield-halved"></i> CashClique</h2>
    <a href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
    <a href="#" class="active"><i class="fas fa-wallet"></i> Make Deposit</a>
    <a href="withdraw.html"><i class="fas fa-money-bill-wave"></i> Withdraw</a>
    <a href="#" onclick="handleLogout()" style="margin-top:auto;"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- Main Content -->
<main class="main-content">
    <div class="page-header">
        <h1 class="page-title">Submit Deposit</h1>
        <p class="page-subtitle">Upload your transfer receipt for automatic verification</p>
    </div>

    <div class="deposit-card">
        <div class="form-group">
            <label>Deposit Amount</label>
            <input type="number" id="expected-amount" class="form-input" step="0.01" placeholder="e.g. 5000.00" required>
        </div>

        <div class="form-group">
            <label>Transaction Remark</label>
            <input type="text" id="expected-remark" class="form-input" placeholder="e.g. CQ-8F9X2P" required style="font-family:monospace; letter-spacing:1px;">
            <div class="form-hint">Must match exactly what appears on your bank receipt. Do not add extra text.</div>
        </div>

        <div class="form-group">
            <label>Receipt Screenshot</label>
            <input type="file" id="receipt-file" class="form-input" accept="image/*" required style="padding:10px;">
            <div class="form-hint">Ensure timestamp, amount, and remark are clearly visible. Max size: ~700KB after compression.</div>
        </div>

        <button id="submit-btn" class="submit-btn" onclick="processReceipt()">
            <i class="fas fa-check-circle"></i> Validate & Submit
        </button>

        <div id="status-box" class="status-box"></div>
    </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
    authDomain: "cashclique-31718.firebaseapp.com",
    projectId: "cashclique-31718",
    storageBucket: "cashclique-31718.firebasestorage.app",
    messagingSenderId: "1064282591269",
    appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let isAuthReady = false;

// 🔐 Auth Guard
onAuthStateChanged(auth, (user) => {
    if (!user) {
        if (isAuthReady) window.location.href = "login.html";
        return;
    }
    isAuthReady = true;
    // Pre-fill email if needed, or just allow form access
});

window.handleLogout = async () => {
    if (confirm('Logout of your account?')) {
        await signOut(auth);
        window.location.href = "login.html";
    }
};

// 🌍 GMT+1 Helper
function getGMT1Now() {
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    return new Date(utc + 3600000); // UTC + 1 hour
}

// 🗜️ Compress & Base64
function compressAndConvertToBase64(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const maxWidth = 700;
                const scale = Math.min(1, maxWidth / img.width);
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', 0.65));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

// 🔍 Parse OCR Data
function parseReceiptData(text, expectedAmount, expectedRemark) {
    // Time
    const timeMatch = text.match(/\b(\d{1,2}:\d{2}(?::\d{2})?)\b/);
    let receiptTime = null;
    if (timeMatch) {
        const [h, m, s] = timeMatch[1].split(':').map(Number);
        const gmt1Now = getGMT1Now();
        receiptTime = new Date(gmt1Now);
        receiptTime.setHours(h, m, s || 0, 0);
    }

    // Amount (closest match)
    const numMatches = text.match(/[\d,]+\.?\d*/g) || [];
    let detectedAmount = null;
    let minDiff = Infinity;
    for (let m of numMatches) {
        const val = parseFloat(m.replace(/,/g, ''));
        if (!isNaN(val) && val > 0) {
            const diff = Math.abs(val - expectedAmount);
            if (diff < minDiff) {
                minDiff = diff;
                detectedAmount = val;
            }
        }
    }

    // Remark (OCR-tolerant exact match)
    const normalize = str => str.replace(/[^a-z0-9]/gi, '').toLowerCase();
    const normExpected = normalize(expectedRemark);
    const normText = normalize(text);
    const remarkMatch = normText.includes(normExpected);

    return { receiptTime, detectedAmount, remarkMatch, rawText: text };
}

// ✅ Validation
function validateSubmission(data, expectedAmount) {
    const flags = { success: [], warnings: [], blockers: [] };

    // Time
    if (data.receiptTime) {
        const gmt1Now = getGMT1Now();
        const diffMins = Math.abs((gmt1Now - data.receiptTime) / 60000);
        if (diffMins > 30) {
            flags.blockers.push(`Timestamp is >30 mins old (GMT+1)`);
        } else {
            flags.success.push(`Time verified within 30 mins`);
        }
    } else {
        flags.blockers.push(`Could not detect timestamp on receipt`);
    }

    // Amount
    if (data.detectedAmount !== null) {
        const diff = Math.abs(data.detectedAmount - expectedAmount);
        if (diff <= 1.0) {
            flags.success.push(`Amount matches (${data.detectedAmount.toFixed(2)})`);
        } else {
            flags.blockers.push(`Amount mismatch: Expected ${expectedAmount.toFixed(2)}, found ${data.detectedAmount.toFixed(2)}`);
        }
    } else {
        flags.blockers.push(`Could not detect amount on receipt`);
    }

    // Remark
    if (data.remarkMatch) {
        flags.success.push(`Transaction remark matches exactly`);
    } else {
        flags.blockers.push(`Remark not found or mismatched`);
    }

    return flags;
}

function showStatus(flags, type = 'info') {
    const box = document.getElementById('status-box');
    box.className = `status-box show ${type}`;
    let html = '';
    flags.success.forEach(s => html += `<div class="status-line"><i class="fas fa-check-circle" style="color:var(--success)"></i> ${s}</div>`);
    flags.warnings.forEach(w => html += `<div class="status-line"><i class="fas fa-info-circle" style="color:var(--warning)"></i> ${w}</div>`);
    flags.blockers.forEach(b => html += `<div class="status-line"><i class="fas fa-times-circle" style="color:var(--danger)"></i> ${b}</div>`);
    box.innerHTML = html;
}

// 🚀 Main Process
window.processReceipt = async function() {
    const fileInput = document.getElementById('receipt-file');
    const submitBtn = document.getElementById('submit-btn');
    const statusBox = document.getElementById('status-box');
    
    const expectedAmount = parseFloat(document.getElementById('expected-amount').value);
    const expectedRemark = document.getElementById('expected-remark').value.trim();

    if (!fileInput.files[0] || isNaN(expectedAmount) || !expectedRemark) {
        showStatus({ blockers: ['Please fill all fields and select a receipt.'] }, 'error');
        return;
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
    statusBox.className = 'status-box';

    try {
        // 1. Compress
        statusBox.className = 'status-box show info';
        statusBox.innerHTML = '<div class="status-line"><i class="fas fa-compress"></i> Compressing image...</div>';
        const base64Image = await compressAndConvertToBase64(fileInput.files[0]);
        
        const base64SizeKB = Math.round((base64Image.length * 0.75) / 1024);
        if (base64SizeKB > 700) {
            showStatus({ blockers: [`Image too large (${base64SizeKB}KB). Crop unnecessary UI and try again.`] }, 'error');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> Validate & Submit';
            return;
        }

        // 2. OCR
        statusBox.innerHTML = '<div class="status-line"><i class="fas fa-search"></i> Scanning receipt... (5-10s)</div>';
        const { data: { text } } = await Tesseract.recognize(base64Image, 'eng', {
            logger: m => {
                if (m.status === 'recognizing text') {
                    statusBox.innerHTML = `<div class="status-line"><i class="fas fa-search"></i> Scanning... ${Math.round(m.progress * 100)}%</div>`;
                }
            }
        });

        // 3. Parse & Validate
        const extracted = parseReceiptData(text, expectedAmount, expectedRemark);
        const validation = validateSubmission(extracted, expectedAmount);
        
        if (validation.blockers.length > 0) {
            showStatus(validation, 'error');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> Validate & Submit';
            return;
        }

        // 4. Save to Firestore
        statusBox.innerHTML = '<div class="status-line"><i class="fas fa-cloud-upload-alt"></i> Saving to database...</div>';
        const depositData = {
            userId: auth.currentUser.uid,
            userEmail: auth.currentUser.email,
            amount: expectedAmount,
            remark: expectedRemark,
            proofBase64: base64Image,
            status: 'pending',
            validationFlags: validation,
            extractedPreview: text.substring(0, 400),
            submittedAt: serverTimestamp()
        };

        await addDoc(collection(db, "deposits"), depositData);

        showStatus({ success: ['Deposit submitted successfully! Pending admin review.'] }, 'success');
        fileInput.value = '';
        document.getElementById('expected-amount').value = '';
        document.getElementById('expected-remark').value = '';

    } catch (err) {
        console.error('Processing failed:', err);
        showStatus({ blockers: ['Failed to process receipt. Try a clearer, well-lit screenshot.'] }, 'error');
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> Validate & Submit';
    }
};
</script>
</body>
</html>
