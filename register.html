<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Register • CashClique</title>

<!-- Favicon -->
<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --primary: #ff7a00;
    --primary-dark: #e96c00;
    --primary-light: #fff5eb;
    --text-dark: #1a1a2e;
    --text-light: #666;
    --text-lighter: #999;
    --white: #fff;
    --error: #e74c3c;
    --error-light: rgba(231, 76, 60, 0.1);
    --success: #27ae60;
    --success-light: rgba(39, 174, 96, 0.1);
    --border: #e0e0e0;
    --shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    --shadow-hover: 0 15px 50px rgba(0, 0, 0, 0.15);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

html {
    height: 100%;
}

body {
    background: linear-gradient(135deg, #fff5eb 0%, #ffe6d5 100%);
    min-height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
}

/* Background Decorations */
body::before {
    content: '';
    position: fixed;
    top: -50%;
    right: -50%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,122,0,0.05) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
}

body::after {
    content: '';
    position: fixed;
    bottom: -50%;
    left: -50%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,122,0,0.05) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
}

/* Main Container */
.container {
    width: 100%;
    max-width: 450px;
    background: var(--white);
    border-radius: 24px;
    padding: 35px 30px;
    box-shadow: var(--shadow);
    text-align: center;
    position: relative;
    z-index: 1;
    transition: box-shadow 0.3s ease;
}

.container:hover {
    box-shadow: var(--shadow-hover);
}

/* Logo */
.logo-container {
    margin-bottom: 15px;
}

.logo {
    width: 70px;
    height: 70px;
    border-radius: 18px;
    object-fit: cover;
    box-shadow: 0 8px 25px rgba(255, 122, 0, 0.2);
    transition: transform 0.3s ease;
}

.logo:hover {
    transform: scale(1.05);
}

/* Header */
.header {
    margin-bottom: 20px;
}

h2 {
    color: var(--primary);
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 3px;
}

.tag {
    font-size: 14px;
    color: var(--text-light);
    font-weight: 400;
}

/* Message Container */
.message-container {
    min-height: 40px;
    margin-bottom: 15px;
}

.message {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.3s ease;
    text-align: left;
}

.message.show {
    opacity: 1;
    transform: translateY(0);
}

.message.error {
    background: var(--error-light);
    color: var(--error);
    border: 1px solid rgba(231, 76, 60, 0.2);
}

.message.success {
    background: var(--success-light);
    color: var(--success);
    border: 1px solid rgba(39, 174, 96, 0.2);
}

/* Form */
.form {
    margin-bottom: 15px;
}

/* Input Groups */
.input-group {
    position: relative;
    margin-bottom: 14px;
}

.input-group label {
    display: block;
    text-align: left;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dark);
    margin-bottom: 6px;
}

.input-wrapper {
    position: relative;
}

.input-wrapper input {
    width: 100%;
    padding: 13px 45px;
    border-radius: 12px;
    border: 2px solid var(--border);
    font-size: 16px;
    color: var(--text-dark);
    outline: none;
    transition: all 0.3s ease;
    background: var(--white);
    -webkit-appearance: none;
}

.input-wrapper input::placeholder {
    color: var(--text-lighter);
}

.input-wrapper input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(255, 122, 0, 0.1);
}

.input-wrapper input.error {
    border-color: var(--error);
    box-shadow: 0 0 0 4px var(--error-light);
}

.input-wrapper input.valid {
    border-color: var(--success);
}

.input-icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-lighter);
    font-size: 16px;
    transition: color 0.3s ease;
    pointer-events: none;
}

.input-wrapper input:focus ~ .input-icon {
    color: var(--primary);
}

.toggle-password {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-lighter);
    font-size: 16px;
    padding: 8px;
    transition: color 0.3s ease;
    -webkit-tap-highlight-color: transparent;
}

.toggle-password:hover,
.toggle-password:active {
    color: var(--primary);
}

/* Password Strength */
.password-strength {
    margin-top: 6px;
}

.strength-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 4px;
}

.strength-segment {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    transition: background 0.3s ease;
}

.strength-segment.active.weak {
    background: var(--error);
}

.strength-segment.active.medium {
    background: orange;
}

.strength-segment.active.strong {
    background: var(--success);
}

.strength-text {
    font-size: 11px;
    font-weight: 500;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.strength-text.weak { color: var(--error); }
.strength-text.medium { color: orange; }
.strength-text.strong { color: var(--success); }

/* Password Requirements */
.password-requirements {
    margin-top: 6px;
    text-align: left;
    font-size: 11px;
    color: var(--text-lighter);
}

.requirement {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 2px;
    transition: color 0.3s ease;
}

.requirement i {
    font-size: 9px;
    transition: all 0.3s ease;
}

.requirement.valid {
    color: var(--success);
}

.requirement.valid i {
    color: var(--success);
}

/* Invite Code */
.invite-hint {
    font-size: 10px;
    color: var(--text-lighter);
    margin-top: 4px;
    text-align: left;
}

/* Terms Checkbox */
.terms-box {
    margin: 16px 0;
    text-align: left;
}

.terms-label {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13px;
    color: var(--text-light);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
}

.terms-label input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--primary);
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
}

.terms-label a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.3s ease;
}

.terms-label a:hover,
.terms-label a:active {
    color: var(--primary-dark);
    text-decoration: underline;
}

.terms-label.error {
    color: var(--error);
}

/* Register Button */
.register-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    border: none;
    padding: 15px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

.register-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s ease;
}

.register-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(255, 122, 0, 0.3);
}

.register-btn:hover::before {
    left: 100%;
}

.register-btn:active {
    transform: translateY(0);
}

.register-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
}

.spinner {
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-top: 3px solid white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Divider */
.divider {
    display: flex;
    align-items: center;
    margin: 16px 0;
    color: var(--text-lighter);
    font-size: 12px;
}

.divider::before,
.divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
}

.divider span {
    padding: 0 12px;
}

/* Social Register */
.social-register {
    display: flex;
    gap: 12px;
    margin-bottom: 15px;
}

.social-btn {
    flex: 1;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: var(--white);
    cursor: pointer;
    font-size: 18px;
    color: var(--text-dark);
    transition: all 0.3s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

.social-btn:hover,
.social-btn:active {
    border-color: var(--primary);
    color: var(--primary);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
}

.social-btn.google:hover,
.social-btn.google:active {
    border-color: #ea4335;
    color: #ea4335;
}

.social-btn.apple:hover,
.social-btn.apple:active {
    border-color: #000;
    color: #000;
}

/* Login Link */
.login-link {
    font-size: 13px;
    color: var(--text-light);
}

.login-link a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
}

.login-link a:hover,
.login-link a:active {
    color: var(--primary-dark);
    text-decoration: underline;
}

/* Shake Animation */
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
    20%, 40%, 60%, 80% { transform: translateX(5px); }
}

.shake {
    animation: shake 0.5s ease;
}

/* Success Animation */
@keyframes successPop {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
}

.success-icon {
    width: 50px;
    height: 50px;
    background: var(--success-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 15px;
    animation: successPop 0.5s ease;
}

.success-icon i {
    font-size: 24px;
    color: var(--success);
}

<div class="container">
    <div class="logo-container">
        <img class="logo" src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg" alt="CashClique Logo">

        <p class="tag">Join CashClique today</p>

    <div class="message-container">
        <div class="message" id="message" role="alert"></div>
    </div>

    <form class="form" id="registerForm">
        <!-- Username -->
        <div class="input-group">
            <label for="username">Username</label>
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="username" 
                    placeholder="Choose a username"
                    autocomplete="username"
                    aria-label="Username"
                >
                <i class="fas fa-user input-icon"></i>
            </div>
        </div>

        <!-- Email -->
        <div class="input-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
                <input 
                    type="email" 
                    id="email" 
                    placeholder="Enter your email"
                    autocomplete="email"
                    aria-label="Email address"
                >
                <i class="fas fa-envelope input-icon"></i>
            </div>
        </div>

        <!-- Password -->
        <div class="input-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Create a strong password"
                    autocomplete="new-password"
                    aria-label="Password"
                >
                <i class="fas fa-lock input-icon"></i>
                <button type="button" class="toggle-password" onclick="togglePassword('password')" aria-label="Toggle password visibility">
                    <i class="fas fa-eye" id="passwordEye"></i>
                </button>
            </div>
            <div class="password-strength" id="passwordStrength">
                <div class="strength-bar">
                    <div class="strength-segment" id="seg1"></div>
                    <div class="strength-segment" id="seg2"></div>
                    <div class="strength-segment" id="seg3"></div>
                    <div class="strength-segment" id="seg4"></div>
                </div>
                <div class="strength-text" id="strengthText">
                    <span>Password strength</span>
                </div>
            </div>
            <div class="password-requirements" id="requirements">
                <div class="requirement" id="reqLength">
                    <i class="fas fa-circle"></i>
                    <span>At least 8 characters</span>
                </div>
                <div class="requirement" id="reqUpper">
                    <i class="fas fa-circle"></i>
                    <span>One uppercase letter</span>
                </div>
                <div class="requirement" id="reqLower">
                    <i class="fas fa-circle"></i>
                    <span>One lowercase letter</span>
                </div>
                <div class="requirement" id="reqNumber">
                    <i class="fas fa-circle"></i>
                    <span>One number</span>
                </div>
                <div class="requirement" id="reqSpecial">
                    <i class="fas fa-circle"></i>
                    <span>One special character</span>
                </div>
            </div>
        </div>

        <!-- Confirm Password -->
        <div class="input-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-wrapper">
                <input 
                    type="password" 
                    id="confirmPassword" 
                    placeholder="Confirm your password"
                    autocomplete="new-password"
                    aria-label="Confirm password"
                >
                <i class="fas fa-lock input-icon"></i>
                <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')" aria-label="Toggle password visibility">
                    <i class="fas fa-eye" id="confirmEye"></i>
                </button>
            </div>
            <div class="password-requirements" id="matchStatus"></div>
        </div>

        <!-- Invite Code -->
        <div class="input-group">
            <label for="inviteCode">Invite Code <span style="color: var(--text-lighter); font-weight: 400;">(Optional)</span></label>
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="inviteCode" 
                    placeholder="Enter invite code"
                    aria-label="Invite code"
                >
                <i class="fas fa-gift input-icon"></i>
            </div>
            <p class="invite-hint"><i class="fas fa-info-circle"></i> Get rewarded when you use a friend's invite code!</p>
        </div>

        <!-- Terms -->
        <div class="terms-box">
            <label class="terms-label" id="termsLabel">
                <input type="checkbox" id="terms">
                <span>I agree to the <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a></span>
            </label>
        </div>

        <!-- Register Button -->
        <button type="submit" class="register-btn" id="registerBtn">
            <span id="btnText">Create Account</span>
            <div class="spinner" id="spinner"></div>
        </button>

        <div class="divider">
            <span>or continue with</span>
        </div>

        <!-- Social Register -->
        <div class="social-register">
            <button type="button" class="social-btn google" onclick="signUpWithGoogle()" aria-label="Sign up with Google">
                <i class="fab fa-google"></i>
            </button>
            <button type="button" class="social-btn apple" onclick="signUpWithApple()" aria-label="Sign up with Apple">
                <i class="fab fa-apple"></i>
            </button>
        </div>
    </form>

    <div class="login-link">
        Already have an account? <a href="login.html">Sign in</a>
    </div>
</div>

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const confirmPasswordInput = document.getElementById("confirmPassword");
const inviteInput = document.getElementById("inviteCode");
const termsInput = document.getElementById("terms");
const termsLabel = document.getElementById("termsLabel");
const registerBtn = document.getElementById("registerBtn");
const spinner = document.getElementById("spinner");
const btnText = document.getElementById("btnText");
const message = document.getElementById("message");

// Password Requirements Elements
const reqLength = document.getElementById("reqLength");
const reqUpper = document.getElementById("reqUpper");
const reqLower = document.getElementById("reqLower");
const reqNumber = document.getElementById("reqNumber");
const reqSpecial = document.getElementById("reqSpecial");
const strengthSegments = [document.getElementById("seg1"), document.getElementById("seg2"), document.getElementById("seg3"), document.getElementById("seg4")];
const strengthText = document.getElementById("strengthText");
const matchStatus = document.getElementById("matchStatus");

// Password Validation
function validatePassword(password) {
    return {
        length: password.length >= 8,
        upper: /[A-Z]/.test(password),
        lower: /[a-z]/.test(password),
        number: /[0-9]/.test(password),
        special: /[!@#$%^&*(),.?":{}|<>]/.test(password)
    };
}

function updatePasswordUI(password) {
    const checks = validatePassword(password);
    const validCount = Object.values(checks).filter(Boolean).length;
    
    // Update requirement indicators
    const updateReq = (el, valid) => {
        el.className = `requirement ${valid ? 'valid' : ''}`;
        el.querySelector('i').className = valid ? 'fas fa-check-circle' : 'fas fa-circle';
    };
    
    updateReq(reqLength, checks.length);
    updateReq(reqUpper, checks.upper);
    updateReq(reqLower, checks.lower);
    updateReq(reqNumber, checks.number);
    updateReq(reqSpecial, checks.special);
    
    // Update strength bar
    strengthSegments.forEach((seg, i) => {
        seg.className = 'strength-segment';
        if (i < validCount) {
            const level = validCount <= 2 ? 'weak' : validCount <= 3 ? 'medium' : 'strong';
            seg.classList.add('active', level);
        }
    });
    
    // Update strength text
    if (password.length === 0) {
        strengthText.innerHTML = '<span>Password strength</span>';
        strengthText.className = 'strength-text';
    } else if (validCount <= 2) {
        strengthText.innerHTML = '<span>Weak</span>';
        strengthText.className = 'strength-text weak';
    } else if (validCount <= 3) {
        strengthText.innerHTML = '<span>Medium</span>';
        strengthText.className = 'strength-text medium';
    } else {
        strengthText.innerHTML = '<span>Strong!</span>';
        strengthText.className = 'strength-text strong';
    }
    
    return validCount >= 3;
}

function updateMatchStatus() {
    const password = passwordInput.value;
    const confirm = confirmPasswordInput.value;
    
    if (confirm.length === 0) {
        matchStatus.innerHTML = '';
        confirmPasswordInput.classList.remove('valid', 'error');
        return;
    }
    
    if (password === confirm) {
        matchStatus.innerHTML = '<span style="color: var(--success);"><i class="fas fa-check-circle"></i> Passwords match!</span>';
        confirmPasswordInput.classList.add('valid');
        confirmPasswordInput.classList.remove('error');
    } else {
        matchStatus.innerHTML = '<span style="color: var(--error);"><i class="fas fa-times-circle"></i> Passwords do not match</span>';
        confirmPasswordInput.classList.add('error');
        confirmPasswordInput.classList.remove('valid');
    }
}

passwordInput.addEventListener("input", () => updatePasswordUI(passwordInput.value));
confirmPasswordInput.addEventListener("input", updateMatchStatus);

// Show Message
function showMessage(text, type) {
    message.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${text}`;
    message.className = `message ${type} show`;
    setTimeout(() => message.classList.remove("show"), 5000);
}

function hideMessage() {
    message.classList.remove("show");
}

function setLoading(isLoading) {
    spinner.style.display = isLoading ? "inline-block" : "none";
    btnText.textContent = isLoading ? "Creating account..." : "Create Account";
    registerBtn.disabled = isLoading;
}

function getErrorMessage(errorCode) {
    const errors = {
        'auth/email-already-in-use': 'This email is already registered. Try signing in.',
        'auth/invalid-email': 'Please enter a valid email address.',
        'auth/weak-password': 'Password is too weak. Please choose a stronger password.',
        'auth/network-request-failed': 'Network error. Please check your connection.',
        'auth/operation-not-allowed': 'Email/password sign-in is not enabled.'
    };
    return errors[errorCode] || 'Registration failed. Please try again.';
}

function showSuccessState() {
    document.querySelector(".container").innerHTML = `
        <div class="success-icon"><i class="fas fa-check"></i></div>
        <h2 style="color: var(--success);">Account Created!</h2>
        <p class="tag" style="margin-bottom: 20px;">Please check your email to verify your account.</p>
        <p style="color: var(--text-light); font-size: 14px;">Redirecting you to login...</p>
    `;
    setTimeout(() => window.location.href = "login.html", 3000);
}

// Google Sign Up
window.signUpWithGoogle = async () => {
    const provider = new GoogleAuthProvider();
    setLoading(true);
    hideMessage();
    
    try {
        const result = await signInWithPopup(auth, provider);
        const userQuery = query(collection(db, "users"), where("email", "==", result.user.email));
        const userSnap = await getDocs(userQuery);
        
        if (userSnap.empty) {
            await setDoc(doc(db, "users", result.user.uid), {
                username: result.user.displayName || result.user.email.split('@')[0],
                email: result.user.email,
                inviteCode: result.user.uid.substring(0, 6),
                invitedBy: null,
                createdAt: Date.now(),
                provider: 'google'
            });
        }
        
        showMessage("Account created successfully!", "success");
        setTimeout(() => window.location.href = "dashboard.html", 1500);
    } catch (error) {
        setLoading(false);
        if (error.code !== 'auth/popup-closed-by-user') {
            showMessage(getErrorMessage(error.code), "error");
        }
    }
};

// Apple Sign Up
window.signUpWithApple = async () => {
    const provider = new OAuthProvider('apple.com');
    provider.addScope('email');
    provider.addScope('name');
    setLoading(true);
    hideMessage();
    
    try {
        const result = await signInWithPopup(auth, provider);
        const userQuery = query(collection(db, "users"), where("email", "==", result.user.email));
        const userSnap = await getDocs(userQuery);
        
        if (userSnap.empty) {
            await setDoc(doc(db, "users", result.user.uid), {
                username: result.user.email?.split('@')[0] || 'user',
                email: result.user.email,
                inviteCode: result.user.uid.substring(0, 6),
                invitedBy: null,
                createdAt: Date.now(),
                provider: 'apple'
            });
        }
        
        showMessage("Account created successfully!", "success");
        setTimeout(() => window.location.href = "dashboard.html", 1500);
    } catch (error) {
        setLoading(false);
        if (error.code !== 'auth/popup-closed-by-user') {
            showMessage(getErrorMessage(error.code), "error");
        }
    }
};

function shakeContainer() {
    const container = document.querySelector(".container");
    container.classList.add("shake");
    setTimeout(() => container.classList.remove("shake"), 500);
}

// Form Submit Handler
form.addEventListener("submit", async (e) => {
    e.preventDefault();
    
    const username = usernameInput.value.trim().toLowerCase();
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    const confirmPassword = confirmPasswordInput.value;
    const invite = inviteInput.value.trim();
    const terms = termsInput.checked;
    
    [usernameInput, emailInput, passwordInput, confirmPasswordInput].forEach(input => input.classList.remove('error'));
    termsLabel.classList.remove('error');
    hideMessage();
    
    if (!username || !email || !password || !confirmPassword) {
        showMessage("Please fill in all required fields.", "error");
        if (!username) usernameInput.classList.add("error");
        if (!email) emailInput.classList.add("error");
        if (!password) passwordInput.classList.add("error");
        if (!confirmPassword) confirmPasswordInput.classList.add("error");
        shakeContainer();
        return;
    }
    
    if (username.length < 3) {
        showMessage("Username must be at least 3 characters.", "error");
        usernameInput.classList.add("error");
        shakeContainer();
        return;
    }
    
    if (!/^[a-z0-9_]+$/.test(username)) {
        showMessage("Username can only contain letters, numbers, and underscores.", "error");
        usernameInput.classList.add("error");
        shakeContainer();
        return;
    }
    
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showMessage("Please enter a valid email address.", "error");
        emailInput.classList.add("error");
        shakeContainer();
        return;
    }
    
    const passwordValid = validatePassword(password);
    if (!passwordValid.length || !passwordValid.upper || !passwordValid.lower || !passwordValid.number) {
        showMessage("Password does not meet requirements.", "error");
        shakeContainer();
        return;
    }
    
    if (password !== confirmPassword) {
        showMessage("Passwords do not match.", "error");
        confirmPasswordInput.classList.add("error");
        shakeContainer();
        return;
    }
    
    if (!terms) {
        showMessage("You must accept the terms to continue.", "error");
        termsLabel.classList.add('error');
        return;
    }
    
    setLoading(true);
    
    try {
        const usernameSnap = await getDocs(query(collection(db, "users"), where("username", "==", username)));
        if (!usernameSnap.empty) {
            setLoading(false);
            showMessage("Username is already taken.", "error");
            usernameInput.classList.add("error");
            shakeContainer();
            return;
        }
        
        let inviterUID = null;
        if (invite) {
            const inviteSnap = await getDocs(query(collection(db, "users"), where("inviteCode", "==", invite)));
            if (inviteSnap.empty) {
                setLoading(false);
                showMessage("Invalid invite code.", "error");
                inviteInput.classList.add("error");
                shakeContainer();
                return;
            }
            inviterUID = inviteSnap.docs[0].id;
        }
        
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        await updateProfile(user, { displayName: username });
        
        await setDoc(doc(db, "users", user.uid), {
            username: username,
            email: email,
            inviteCode: user.uid.substring(0, 6),
            invitedBy: inviterUID,
            createdAt: Date.now(),
            provider: 'email'
        });
        
        await sendEmailVerification(user);
        
        setLoading(false);
        showSuccessState();
        
    } catch (error) {
        setLoading(false);
        showMessage(getErrorMessage(error.code), "error");
        shakeContainer();
    }
});

[usernameInput, emailInput, passwordInput, confirmPasswordInput, inviteInput].forEach(input => {
    input.addEventListener("input", () => input.classList.remove("error"));
});

document.addEventListener("keypress", (e) => {
    if (e.key === "Enter" && !registerBtn.disabled) registerBtn.click();
});
</script>

<script>
window.togglePassword = function(inputId) {
    const input = document.getElementById(inputId);
    const eyeIcon = input.nextElementSibling.nextElementSibling.querySelector('i');
    
    if (input.type === "password") {
        input.type = "text";
        eyeIcon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        input.type = "password";
        eyeIcon.classList.replace("fa-eye-slash", "fa-eye");
    }
};
</script>
