<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register • CashClique</title>

<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#fff;
border-radius:14px;
padding:35px 25px;
box-shadow:0 10px 35px rgba(0,0,0,0.1);
text-align:center;
}

.logo{
width:70px;
margin-bottom:10px;
}

h2{
color:#ff7a00;
margin-bottom:5px;
}

.tag{
font-size:13px;
color:#666;
margin-bottom:25px;
}

.input-group{
position:relative;
margin-bottom:18px;
}

.input-group input{
width:100%;
padding:12px 40px 12px 12px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
outline:none;
}

.input-group input:focus{
border-color:#ff7a00;
}

.eye{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:14px;
color:#999;
}

.strength{
font-size:12px;
text-align:left;
margin-top:4px;
}

.weak{color:red}
.medium{color:orange}
.strong{color:green}

.terms-box{
margin:15px 0;
text-align:left;
}

.terms-label{
display:flex;
gap:10px;
align-items:flex-start;
font-size:13px;
}

.terms-label a{
color:#ff7a00;
font-weight:500;
text-decoration:none;
}

button{
width:100%;
background:#ff7a00;
color:white;
border:none;
padding:12px;
border-radius:8px;
font-size:15px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

button:hover{
background:#e96c00;
}

.spinner{
width:16px;
height:16px;
border:2px solid rgba(255,255,255,0.4);
border-top:2px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
display:none;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

.login-link{
margin-top:15px;
font-size:13px;
}

.login-link a{
color:#ff7a00;
text-decoration:none;
font-weight:500;
}

.error{
color:red;
font-size:13px;
margin-bottom:10px;
display:none;
}

.success{
color:green;
font-size:13px;
margin-bottom:10px;
display:none;
}

</style>

</head>

<body>

<div class="container">

<img class="logo" src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772726030/logo2_drw2fc.jpg">

<h2>Create Account</h2>
<p class="tag">Where Content Meets Cash</p>

<div class="error" id="error"></div>
<div class="success" id="success"></div>

<div class="input-group">
<input type="text" id="username" placeholder="Username">
</div>

<div class="input-group">
<input type="email" id="email" placeholder="Email address">
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password">
<span class="eye" onclick="togglePassword('password')">👁</span>
<div id="strength" class="strength"></div>
</div>

<div class="input-group">
<input type="password" id="confirmPassword" placeholder="Confirm Password">
<span class="eye" onclick="togglePassword('confirmPassword')">👁</span>
</div>

<div class="input-group">
<input type="text" id="inviteCode" placeholder="Invite Code (optional)">
</div>

<div class="terms-box">
<label class="terms-label">
<input type="checkbox" id="terms">
<span>I accept the <a href="terms.html">Terms and Conditions</a></span>
</label>
</div>

<button id="registerBtn">
<span id="btnText">Register</span>
<div class="spinner" id="spinner"></div>
</button>

<div class="login-link">
Already have an account? <a href="login.html">Login</a>
</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
sendEmailVerification
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
query,
where,
getDocs,
collection
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
  authDomain: "cashclique-31718.firebaseapp.com",
  projectId: "cashclique-31718",
  storageBucket: "cashclique-31718.firebasestorage.app",
  messagingSenderId: "1064282591269",
  appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc",
  measurementId: "G-V5WHJB6LS0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const btn=document.getElementById("registerBtn");
const spinner=document.getElementById("spinner");
const error=document.getElementById("error");
const success=document.getElementById("success");

btn.onclick=async()=>{

error.style.display="none";
success.style.display="none";

const username=document.getElementById("username").value.trim().toLowerCase();
const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value;
const confirmPassword=document.getElementById("confirmPassword").value;
const invite=document.getElementById("inviteCode").value.trim();
const terms=document.getElementById("terms").checked;

if(!username || !email || !password || !confirmPassword){

error.innerText="Please fill all required fields";
error.style.display="block";
return;

}

if(password!==confirmPassword){

error.innerText="Passwords do not match";
error.style.display="block";
return;

}

if(!terms){

error.innerText="You must accept the terms";
error.style.display="block";
return;

}

spinner.style.display="inline-block";

try{

/* USERNAME CHECK */

const usernameQuery=query(
collection(db,"users"),
where("username","==",username)
);

const usernameSnap=await getDocs(usernameQuery);

if(!usernameSnap.empty){

spinner.style.display="none";
error.innerText="Username already taken";
error.style.display="block";
return;

}


/* INVITE CHECK */

let inviterUID=null;

if(invite){

const inviteQuery=query(
collection(db,"users"),
where("inviteCode","==",invite)
);

const inviteSnap=await getDocs(inviteQuery);

if(inviteSnap.empty){

spinner.style.display="none";
error.innerText="Invalid invite code";
error.style.display="block";
return;

}

inviterUID=inviteSnap.docs[0].id;

}


/* CREATE ACCOUNT */

const userCredential=await createUserWithEmailAndPassword(auth,email,password);

const user=userCredential.user;

const inviteCode=user.uid.substring(0,6);


/* SAVE USER */

await setDoc(doc(db,"users",user.uid),{

username:username,
email:email,
inviteCode:inviteCode,
invitedBy:inviterUID,
createdAt:Date.now()

});


/* VERIFY EMAIL */

await sendEmailVerification(user);

spinner.style.display="none";

success.innerText="Account created! Check your email to verify.";
success.style.display="block";

setTimeout(()=>{
window.location.href="login.html";
},3000);

}
catch(err){

spinner.style.display="none";
error.innerText=err.message;
error.style.display="block";

}

};

</script>


<script>

function togglePassword(id){

const field=document.getElementById(id);

field.type = field.type === "password" ? "text" : "password";

}

const passwordInput=document.getElementById("password");
const strength=document.getElementById("strength");

passwordInput.addEventListener("input",()=>{

const val=passwordInput.value;

if(val.length<6){
strength.innerHTML="<span class='weak'>Weak password</span>";
}
else if(val.match(/[A-Z]/) && val.match(/[0-9]/)){
strength.innerHTML="<span class='strong'>Strong password</span>";
}
else{
strength.innerHTML="<span class='medium'>Medium password</span>";
}

});

</script>

</body>
</html>
