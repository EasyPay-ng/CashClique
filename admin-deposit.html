<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { 
    getFirestore, 
    doc, 
    getDoc, 
    updateDoc, 
    setDoc, 
    serverTimestamp, 
    collection, 
    addDoc, 
    query, 
    orderBy, 
    limit, 
    onSnapshot,
    getDocs,
    where 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
    authDomain: "cashclique-31718.firebaseapp.com",
    projectId: "cashclique-31718",
    storageBucket: "cashclique-31718.firebasestorage.app",
    messagingSenderId: "1064282591269",
    appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ONLY THESE TWO EMAILS ALLOWED
const ALLOWED_ADMINS = [
    "beniwealth70@gmail.com",
    "baasituoppor01@gmail.com"
];

let currentUser = null;
let currentRates = {
    bank: 1300,
    crypto: {
        USDT: 1.00,
        TRX: 0.12,
        ETH: 3000,
        BTC: 65000,
        TON: 5.50
    }
};

// Default rates for all 5 cryptos
const DEFAULT_CRYPTO_RATES = {
    USDT: 1.00,
    TRX: 0.12,
    ETH: 3000,
    BTC: 65000,
    TON: 5.50
};

// Check auth on load
onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        if (isAdmin(user.email)) {
            document.getElementById('adminContent').style.display = 'block';
            document.getElementById('accessDenied').style.display = 'none';
            document.getElementById('adminEmail').innerText = user.email;
            initializeAdmin();
        } else {
            document.getElementById('adminContent').style.display = 'none';
            document.getElementById('accessDenied').style.display = 'block';
        }
    } else {
        window.location.href = "login.html";
    }
});

function isAdmin(email) {
    if (!email) return false;
    return ALLOWED_ADMINS.includes(email.toLowerCase().trim());
}

function initializeAdmin() {
    loadCurrentRates();
    listenToRateChanges();
    loadRateHistory();
    loadTodayStats();
    setupInputListeners();
}

// Load both bank and all crypto rates
async function loadCurrentRates() {
    try {
        // Load Bank Rate
        const bankDoc = await getDoc(doc(db, "settings", "bankRate"));
        if (bankDoc.exists()) {
            currentRates.bank = bankDoc.data().rate || 1300;
            updateBankRateDisplay(currentRates.bank, bankDoc.data().updatedAt);
        } else {
            await setDoc(doc(db, "settings", "bankRate"), {
                rate: 1300,
                updatedAt: serverTimestamp(),
                updatedBy: currentUser.email,
                updatedByUid: currentUser.uid
            });
            updateBankRateDisplay(1300, null);
        }

        // Load ALL 5 Crypto Rates
        const cryptoDoc = await getDoc(doc(db, "settings", "cryptoRates"));
        if (cryptoDoc.exists()) {
            const data = cryptoDoc.data();
            currentRates.crypto = {
                USDT: data.USDT || 1.00,
                TRX: data.TRX || 0.12,
                ETH: data.ETH || 3000,
                BTC: data.BTC || 65000,
                TON: data.TON || 5.50
            };
            updateCryptoRatesDisplay(currentRates.crypto, data.updatedAt);
        } else {
            // Create default if doesn't exist
            await setDoc(doc(db, "settings", "cryptoRates"), {
                ...DEFAULT_CRYPTO_RATES,
                updatedAt: serverTimestamp(),
                updatedBy: currentUser.email,
                updatedByUid: currentUser.uid
            });
            updateCryptoRatesDisplay(DEFAULT_CRYPTO_RATES, null);
        }
    } catch (error) {
        console.error("Error loading rates:", error);
        showToast("Failed to load rates", "error");
    }
}

// Real-time listeners
function listenToRateChanges() {
    // Bank rate listener
    onSnapshot(doc(db, "settings", "bankRate"), (doc) => {
        if (doc.exists()) {
            currentRates.bank = doc.data().rate;
            updateBankRateDisplay(doc.data().rate, doc.data().updatedAt);
        }
    });

    // All crypto rates listener
    onSnapshot(doc(db, "settings", "cryptoRates"), (doc) => {
        if (doc.exists()) {
            const data = doc.data();
            currentRates.crypto = {
                USDT: data.USDT || 1.00,
                TRX: data.TRX || 0.12,
                ETH: data.ETH || 3000,
                BTC: data.BTC || 65000,
                TON: data.TON || 5.50
            };
            updateCryptoRatesDisplay(currentRates.crypto, data.updatedAt);
        }
    });
}

function updateBankRateDisplay(rate, timestamp) {
    document.getElementById('bankRateDisplay').innerText = `₦${rate.toLocaleString()}`;
    
    const timeElement = document.getElementById('bankLastUpdated');
    if (timestamp && timestamp.toDate) {
        timeElement.innerText = 'Updated: ' + timestamp.toDate().toLocaleString();
    } else if (timestamp) {
        timeElement.innerText = 'Updated: ' + new Date(timestamp).toLocaleString();
    } else {
        timeElement.innerText = "Never updated";
    }
}

// Update display for ALL 5 cryptos
function updateCryptoRatesDisplay(rates, timestamp) {
    document.getElementById('usdtRateDisplay').innerText = `$${rates.USDT.toFixed(2)}`;
    document.getElementById('trxRateDisplay').innerText = `$${rates.TRX.toFixed(4)}`;
    document.getElementById('ethRateDisplay').innerText = `$${rates.ETH.toFixed(2)}`;
    document.getElementById('btcRateDisplay').innerText = `$${rates.BTC.toFixed(2)}`;
    document.getElementById('tonRateDisplay').innerText = `$${rates.TON.toFixed(2)}`;

    const timeStr = timestamp ? (timestamp.toDate ? timestamp.toDate().toLocaleString() : new Date(timestamp).toLocaleString()) : 'Never';
    document.getElementById('usdtLastUpdated').innerText = timeStr;
    document.getElementById('trxLastUpdated').innerText = timeStr;
    document.getElementById('ethLastUpdated').innerText = timeStr;
    document.getElementById('btcLastUpdated').innerText = timeStr;
    document.getElementById('tonLastUpdated').innerText = timeStr;
}

function setupInputListeners() {
    // Bank rate input
    document.getElementById('bankRateInput').addEventListener('input', function() {
        const rate = parseFloat(this.value) || 0;
        document.getElementById('bankRatePreview').innerText = `₦${(rate * 100).toLocaleString()}`;
    });

    // All crypto rate inputs - update preview
    const cryptoInputs = ['usdtRateInput', 'trxRateInput', 'ethRateInput', 'btcRateInput', 'tonRateInput'];
    cryptoInputs.forEach(id => {
        document.getElementById(id).addEventListener('input', updateCryptoPreview);
    });
}

function updateCryptoPreview() {
    const usdt = parseFloat(document.getElementById('usdtRateInput').value) || currentRates.crypto.USDT;
    const trx = parseFloat(document.getElementById('trxRateInput').value) || currentRates.crypto.TRX;
    const eth = parseFloat(document.getElementById('ethRateInput').value) || currentRates.crypto.ETH;
    const btc = parseFloat(document.getElementById('btcRateInput').value) || currentRates.crypto.BTC;
    const ton = parseFloat(document.getElementById('tonRateInput').value) || currentRates.crypto.TON;
    
    document.getElementById('cryptoPreview').innerHTML = 
        `100 USDT = $${(100 * usdt).toFixed(2)}<br>` +
        `100 TRX = $${(100 * trx).toFixed(2)}<br>` +
        `0.1 ETH = $${(0.1 * eth).toFixed(2)}<br>` +
        `0.001 BTC = $${(0.001 * btc).toFixed(2)}<br>` +
        `10 TON = $${(10 * ton).toFixed(2)}`;
}

window.switchTab = (tab) => {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.closest('.tab-btn').classList.add('active');
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    document.getElementById(`${tab}Tab`).classList.add('active');
};

// Update bank rate
window.updateRate = async (type) => {
    if (type !== 'bank') return;
    
    const newRate = parseFloat(document.getElementById('bankRateInput').value);
    if (!newRate || newRate < 1) {
        showToast("Please enter a valid rate", "error");
        return;
    }
    if (newRate === currentRates.bank) {
        showToast("New rate must be different", "error");
        return;
    }
    if (!isAdmin(currentUser.email)) {
        showToast("Unauthorized", "error");
        return;
    }

    showLoader(true);
    try {
        const previousRate = currentRates.bank;
        await updateDoc(doc(db, "settings", "bankRate"), {
            rate: newRate,
            updatedAt: serverTimestamp(),
            updatedBy: currentUser.email,
            updatedByUid: currentUser.uid
        });

        await addDoc(collection(db, "rateHistory"), {
            rateType: 'bank',
            previousRate: previousRate,
            newRate: newRate,
            changedBy: currentUser.email,
            changedByUid: currentUser.uid,
            timestamp: serverTimestamp()
        });

        document.getElementById('bankRateInput').value = '';
        showLoader(false);
        showToast(`Bank rate updated to ₦${newRate.toLocaleString()}`, "success");
        loadRateHistory();
    } catch (error) {
        console.error(error);
        showLoader(false);
        showToast("Failed to update", "error");
    }
};

// Update ALL 5 crypto rates
window.updateCryptoRates = async () => {
    const newRates = {
        USDT: parseFloat(document.getElementById('usdtRateInput').value) || currentRates.crypto.USDT,
        TRX: parseFloat(document.getElementById('trxRateInput').value) || currentRates.crypto.TRX,
        ETH: parseFloat(document.getElementById('ethRateInput').value) || currentRates.crypto.ETH,
        BTC: parseFloat(document.getElementById('btcRateInput').value) || currentRates.crypto.BTC,
        TON: parseFloat(document.getElementById('tonRateInput').value) || currentRates.crypto.TON
    };

    // Validate all rates
    for (const [coin, rate] of Object.entries(newRates)) {
        if (!rate || rate <= 0) {
            showToast(`Invalid rate for ${coin}`, "error");
            return;
        }
    }

    if (!isAdmin(currentUser.email)) {
        showToast("Unauthorized", "error");
        return;
    }

    showLoader(true);
    try {
        await updateDoc(doc(db, "settings", "cryptoRates"), {
            ...newRates,
            updatedAt: serverTimestamp(),
            updatedBy: currentUser.email,
            updatedByUid: currentUser.uid
        });

        await addDoc(collection(db, "rateHistory"), {
            rateType: 'crypto',
            previousRates: currentRates.crypto,
            newRates: newRates,
            changedBy: currentUser.email,
            changedByUid: currentUser.uid,
            timestamp: serverTimestamp()
        });

        // Clear all inputs
        ['usdtRateInput', 'trxRateInput', 'ethRateInput', 'btcRateInput', 'tonRateInput'].forEach(id => {
            document.getElementById(id).value = '';
        });

        showLoader(false);
        showToast("All crypto rates updated", "success");
        loadRateHistory();
    } catch (error) {
        console.error(error);
        showLoader(false);
        showToast("Failed to update", "error");
    }
};

window.resetRate = async (type) => {
    if (type === 'bank') {
        if (!confirm("Reset bank rate to ₦1,300?")) return;
        document.getElementById('bankRateInput').value = '1300';
        await updateRate('bank');
    }
};

window.resetCryptoRates = async () => {
    if (!confirm("Reset ALL crypto rates to defaults?")) return;
    document.getElementById('usdtRateInput').value = '1.00';
    document.getElementById('trxRateInput').value = '0.12';
    document.getElementById('ethRateInput').value = '3000';
    document.getElementById('btcRateInput').value = '65000';
    document.getElementById('tonRateInput').value = '5.50';
    await updateCryptoRates();
};

async function loadRateHistory() {
    try {
        const historyQuery = query(
            collection(db, "rateHistory"),
            orderBy("timestamp", "desc"),
            limit(20)
        );
        
        const snapshot = await getDocs(historyQuery);
        const historyList = document.getElementById('historyList');
        
        if (snapshot.empty) {
            historyList.innerHTML = `
                <div style="text-align:center; color:#94a3b8; padding:20px;">
                    <i class="fas fa-inbox" style="font-size:40px; margin-bottom:10px;"></i>
                    <p>No rate changes yet</p>
                </div>
            `;
            return;
        }

        let html = '';
        snapshot.forEach((doc) => {
            const data = doc.data();
            const time = data.timestamp ? data.timestamp.toDate().toLocaleString() : 'Unknown';
            
            if (data.rateType === 'bank') {
                html += `
                    <div class="history-item">
                        <div>
                            <div class="history-type bank">BANK</div>
                            <div class="history-details">
                                ₦${data.previousRate?.toLocaleString()} → ₦${data.newRate?.toLocaleString()}
                            </div>
                            <div class="history-admin">by ${data.changedBy || 'Unknown'}</div>
                        </div>
                        <div class="history-time">${time}</div>
                    </div>
                `;
            } else {
                html += `
                    <div class="history-item">
                        <div>
                            <div class="history-type crypto">CRYPTO</div>
                            <div class="history-details">All 5 cryptos updated</div>
                            <div class="history-admin">by ${data.changedBy || 'Unknown'}</div>
                        </div>
                        <div class="history-time">${time}</div>
                    </div>
                `;
            }
        });
        
        historyList.innerHTML = html;
    } catch (error) {
        console.error(error);
    }
}

async function loadTodayStats() {
    try {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        const transactionsQuery = query(
            collection(db, "transactions"),
            where("timestamp", ">=", today),
            where("type", "==", "deposit")
        );
        
        const snapshot = await getDocs(transactionsQuery);
        let count = 0;
        let volume = 0;
        
        snapshot.forEach((doc) => {
            count++;
            volume += doc.data().amountUSD || 0;
        });
        
        document.getElementById('totalDeposits').innerText = count;
        document.getElementById('totalVolume').innerText = `$${volume.toLocaleString()}`;
    } catch (error) {
        console.error(error);
    }
}

function showLoader(show) {
    const loader = document.getElementById('mainLoader');
    if (show) loader.classList.add('active');
    else loader.classList.remove('active');
}

function showToast(message, type = 'info') {
    const toast = document.getElementById('toastBox');
    document.getElementById('toastMsg').innerText = message;
    toast.className = 'toast show ' + type;
    setTimeout(() => toast.classList.remove('show'), 3000);
}

// Security check every 30 seconds
setInterval(() => {
    if (currentUser && !isAdmin(currentUser.email)) {
        showToast("Admin access revoked", "error");
        setTimeout(() => window.location.href = 'dashboard.html', 2000);
    }
}, 30000);
</script>
</body>
</html>
