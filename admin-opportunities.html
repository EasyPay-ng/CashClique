<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | CashClique</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#f5f6f8;color:#1e2937}

/* Mobile Menu */
.menu-toggle{display:none; background:#ff6a00; color:white; border:none; padding:12px; font-size:18px; position:fixed; top:0; left:0; width:100%; z-index:101}

/* Sidebar */
.sidebar{width:260px;background:#1e2937;color:#fff;position:fixed;height:100%;padding:20px; z-index:100}
.sidebar h2{margin-bottom:30px;color:#ff6a00}
.sidebar a{display:block;color:#cbd5e1;padding:12px;border-radius:8px;margin-bottom:5px;text-decoration:none;transition:0.2s}
.sidebar a.active,.sidebar a:hover{background:#ff6a00;color:#fff}

/* Main */
.main{margin-left:260px;padding:25px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.refresh-btn{background:#ff6a00;color:white;border:none;padding:10px 16px;border-radius:8px;cursor:pointer}

/* Filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:15px}
.filter{padding:6px 14px;border:1px solid #cbd5e1;border-radius:999px;cursor:pointer;background:white;transition:0.2s}
.filter.active{background:#ff6a00;color:#fff;border-color:#ff6a00}

#search{padding:12px 16px;width:100%;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:20px;font-size:14px}

/* List */
.list{margin-top:20px}
.item{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;border:1px solid #e2e8f0;transition:0.2s}
.item:hover{box-shadow:0 3px 10px rgba(0,0,0,0.05)}
.row{display:flex;justify-content:space-between;align-items:center; gap:12px}
.title{font-weight:600;font-size:16px}
.small{font-size:12px;color:#666; margin-top:4px}
.list-thumb{width:60px; height:60px; border-radius:6px; object-fit:cover}

.badge{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500}
.badge.approved{background:#d1e7dd;color:#0f5132}
.badge.rejected{background:#f8d7da;color:#721c24}
.badge.pending{background:#fff3cd;color:#856404}

.actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.actions button{padding:6px 12px; border:none; border-radius:6px; cursor:pointer}

.empty{text-align:center; padding:40px; color:#999}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:200}
.modal.active{display:flex}
.modal-box{background:#fff;padding:25px;border-radius:12px;width:95%;max-width:600px;max-height:90vh;overflow-y:auto}

.btn{padding:10px 16px;border:none;border-radius:6px;cursor:pointer;font-weight:500}
.btn.green{background:#10b981;color:#fff}
.btn.red{background:#ef4444;color:#fff}

textarea{width:100%;padding:12px;margin-top:10px;border:1px solid #e2e8f0;border-radius:8px;min-height:80px}

/* Mobile Responsive */
@media(max-width:768px){
    .menu-toggle{display:block}
    .sidebar{left:-260px; transition:0.3s; padding-top:70px}
    .sidebar.active{left:0}
    .main{margin-left:0; padding-top:70px}
}
</style>
</head>

<body>

<button class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>

<div class="sidebar" id="sidebar">
  <h2>CashClique Admin</h2>
  <a href="#" class="active"><i class="fas fa-ad"></i> Manage Ads</a>
  <a href="applications.html"><i class="fas fa-users"></i> Applicants</a>
  <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<div class="main" id="main-content" style="display:none">
  <div class="header">
    <h1>Review Campaigns</h1>
    <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
  </div>

  <div class="filters" id="filters">
    <button class="filter active" data-status="all">All</button>
    <button class="filter" data-status="pending">Pending</button>
    <button class="filter" data-status="approved">Approved</button>
    <button class="filter" data-status="rejected">Rejected</button>
  </div>

  <input id="search" placeholder="Search ad title, category or advertiser...">

  <div class="list" id="list">
    <div class="empty">Loading...</div>
  </div>
</div>

<!-- Review Modal -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Review Campaign</h3>

    <img id="modalFlyer" style="display:none; width:100%; max-height:350px; object-fit:contain; border-radius:8px; margin:15px 0;">

    <textarea id="adminNote" placeholder="Admin note (optional)"></textarea>

    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:15px">
      <button onclick="closeModal()">Cancel</button>
      <button onclick="setStatus('rejected')" class="btn red">Reject</button>
      <button onclick="setStatus('approved')" class="btn green">Approve</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, query, onSnapshot, doc, runTransaction, serverTimestamp, deleteDoc, addDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsgofM76EpbQTQBhipIpMNBJZYLwi2Pyg",
  authDomain: "cashclique-31718.firebaseapp.com",
  projectId: "cashclique-31718",
  storageBucket: "cashclique-31718.firebasestorage.app",
  messagingSenderId: "1064282591269",
  appId: "1:1064282591269:web:17fbaf9b683d5b0dfbafcc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ALLOWED_EMAILS = ["beniwealth70@gmail.com", "baasituoppor01@gmail.com"];

const listEl = document.getElementById("list");
const searchEl = document.getElementById("search");
const filtersEl = document.getElementById("filters");
const refreshBtn = document.getElementById("refreshBtn");
const logoutBtn = document.getElementById("logoutBtn");
const modalEl = document.getElementById("modal");

let all = [];
let activeStatus = "all";
let unsubscribe = null;
let selectedId = null;

/* AUTH */
onAuthStateChanged(auth, (user) => {
  if (!user) return location.href = "login.html";

  if (!ALLOWED_EMAILS.includes(user.email.toLowerCase())) {
    alert("Access denied");
    return location.href = "dashboard.html";
  }

  document.getElementById("sidebar").style.display = "block";
  document.getElementById("main-content").style.display = "block";

  attachUI();
  startListener();
});

/* UI EVENTS */
function attachUI(){
  filtersEl.querySelectorAll(".filter").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll(".filter").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeStatus = btn.dataset.status;
      render();
    };
  });

  searchEl.oninput = render;

  refreshBtn.onclick = () => {
    if (unsubscribe) unsubscribe();
    startListener();
  };

  logoutBtn.onclick = async () => {
    if(confirm("Logout?")){
      await signOut(auth);
      location.href = "login.html";
    }
  };
}

/* FIRESTORE LISTENER */
function startListener(){
  const q = query(collection(db, "opportunities"));

  if (unsubscribe) unsubscribe();

  unsubscribe = onSnapshot(q, snap => {
    all = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
}

/* RENDER */
function render(){
  let items = [...all];

  if (activeStatus !== "all")
    items = items.filter(x => x.status === activeStatus);

  const term = searchEl.value.toLowerCase();
  if (term)
    items = items.filter(x =>
      x.title?.toLowerCase().includes(term) ||
      x.category?.toLowerCase().includes(term) ||
      x.advertiserName?.toLowerCase().includes(term)
    );

  if (!items.length){
    listEl.innerHTML = `<div class="empty">No campaigns</div>`;
    return;
  }

  listEl.innerHTML = "";

  items.forEach(c => {
    const el = document.createElement("div");
    el.className = "item";

    el.innerHTML = `
      <div class="row">
        ${c.flyer ? `<img src="${c.flyer}" class="list-thumb">` : ''}
        <div style="flex:1">
          <div class="title">${escapeHTML(c.title || "Untitled")}</div>
          <div class="small">${escapeHTML(c.advertiserName || 'Unknown')} • ${escapeHTML(c.category || "General")} • ${c.targetViews?.toLocaleString()} views • $${c.cost?.toFixed(2)}</div>
        </div>

        ${badge(c.status)}
      </div>

      <div class="actions">
        <button onclick="handleAction('review','${c.id}')">Review</button>
        <button onclick="handleAction('delete','${c.id}')">Delete</button>
      </div>
    `;

    listEl.appendChild(el);
  });
}

/* BADGE */
function badge(status){
  if (status === "approved") return `<span class="badge approved">Approved</span>`;
  if (status === "rejected") return `<span class="badge rejected">Rejected</span>`;
  return `<span class="badge pending">Pending</span>`;
}

/* ACTION HANDLER */
window.handleAction = async (action, id) => {
  const ref = doc(db, "opportunities", id);

  if (action === "review"){
    selectedId = id;
    document.getElementById("adminNote").value = '';

    const campaign = all.find(c => c.id === id);
    const flyerEl = document.getElementById('modalFlyer');

    if(campaign.flyer) {
      flyerEl.src = campaign.flyer;
      flyerEl.style.display = 'block';
    } else {
      flyerEl.style.display = 'none';
    }

    document.getElementById("modal").classList.add("active");
    return;
  }

  if (action === "delete"){
    if (!confirm("⚠️ Permanently delete this campaign? This cannot be undone.")) return;

    try {
      await deleteDoc(ref);
    } catch(e){
      alert("Delete failed");
    }
  }
};

/* UPDATE STATUS */
async function setStatus(status){
  const id = selectedId;
  const ref = doc(db, "opportunities", id);
  const note = document.getElementById("adminNote").value || null;

  const confirmMessage = status === 'approved' 
    ? "Approve this campaign? It will become visible to all creators immediately."
    : "Reject this campaign? The advertiser will be automatically 100% refunded.";

  if(!confirm(confirmMessage)) return;

  try {
    await runTransaction(db, async (tx) => {
      const snap = await tx.get(ref);
      if (!snap.exists()) throw "Campaign not found";

      const campaign = snap.data();

      tx.update(ref, {
        status,
        adminNote: note,
        reviewedAt: serverTimestamp()
      });

      if(status === 'rejected') {
        tx.update(doc(db, "users", campaign.advertiserId), {
          balance: increment(campaign.cost)
        });

        tx.add(collection(db, "transactions"), {
          type: 'refund',
          userId: campaign.advertiserId,
          amount: campaign.cost,
          description: `Refund for rejected campaign: ${campaign.title}`,
          reference: id,
          timestamp: serverTimestamp()
        });
      }

    });

    closeModal();
    alert(status === 'approved' ? 'Campaign approved ✅' : 'Campaign rejected, user refunded ✅');

  } catch(e){
    console.error(e);
    alert("Update failed, please try again");
  }
}

/* MODAL */
window.closeModal = () => {
  document.getElementById("modal").classList.remove("active");
  selectedId = null;
};

/* MENU (MOBILE) */
window.toggleMenu = () => {
  document.getElementById("sidebar").classList.toggle("active");
};

/* ESCAPE HTML (SECURITY) */
function escapeHTML(str){
  return String(str || "").replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[m]));
}

</script>

</body>
</html>
